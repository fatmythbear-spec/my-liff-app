<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>บัตรสมาชิก Fat Myth Bear</title>
    <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/qrcode@1.5.3/build/qrcode.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Kanit', sans-serif; background: #f0f0f0; min-height: 100vh; }

        /* ── Loading ── */
        #loading {
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            height: 100vh; gap: 12px; color: #666;
        }
        .spinner {
            width: 40px; height: 40px;
            border: 4px solid #ddd;
            border-top-color: #06c755;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* ── Card ── */
        #app { display: none; padding: 16px; }

        .member-card {
            border-radius: 20px;
            padding: 24px;
            color: white;
            position: relative;
            overflow: hidden;
            margin-bottom: 16px;
            min-height: 200px;
        }
        .card-bronze  { background: linear-gradient(135deg, #cd7f32, #a0522d, #cd7f32); }
        .card-silver  { background: linear-gradient(135deg, #a8a9ad, #d6d6d6, #a8a9ad); }
        .card-gold    { background: linear-gradient(135deg, #ffd700, #daa520, #ffd700); }
        .card-platinum { background: linear-gradient(135deg, #667eea, #764ba2, #66d9e8); }

        .card-shine {
            position: absolute; top: -50%; left: -50%;
            width: 200%; height: 200%;
            background: linear-gradient(45deg, transparent 30%, rgba(255,255,255,0.15) 50%, transparent 70%);
            animation: shine 3s infinite;
        }
        @keyframes shine { 0%,100%{transform:translateX(-100%)} 50%{transform:translateX(100%)} }

        .card-tier { font-size: 13px; opacity: 0.85; letter-spacing: 2px; text-transform: uppercase; }
        .card-name { font-size: 22px; font-weight: 700; margin: 8px 0 4px; }
        .card-id   { font-size: 11px; opacity: 0.7; margin-bottom: 20px; }

        .card-points-row { display: flex; justify-content: space-between; align-items: flex-end; }
        .card-points-label { font-size: 12px; opacity: 0.8; }
        .card-points-val   { font-size: 28px; font-weight: 700; }
        .card-points-unit  { font-size: 12px; opacity: 0.8; }

        /* Progress Bar */
        .progress-section { margin-top: 16px; }
        .progress-label {
            display: flex; justify-content: space-between;
            font-size: 12px; color: #666; margin-bottom: 6px;
        }
        .progress-track {
            background: #ddd; border-radius: 99px; height: 10px; overflow: hidden;
        }
        .progress-fill {
            height: 100%; border-radius: 99px;
            background: linear-gradient(90deg, #06c755, #00a843);
            transition: width 0.8s ease;
        }

        /* QR Button */
        .qr-btn {
            width: 100%; padding: 14px;
            background: #06c755; color: white;
            border: none; border-radius: 12px;
            font-size: 16px; font-weight: 600;
            cursor: pointer; margin: 12px 0;
        }

        /* Tier perks */
        .perks-card {
            background: white; border-radius: 16px;
            padding: 16px; margin-bottom: 16px;
        }
        .perks-title { font-size: 15px; font-weight: 600; color: #333; margin-bottom: 10px; }
        .perk-item {
            display: flex; align-items: flex-start; gap: 8px;
            font-size: 13px; color: #555; margin-bottom: 8px;
        }
        .perk-dot { color: #06c755; font-size: 16px; flex-shrink: 0; }

        /* QR Modal */
        .modal-overlay {
            display: none; position: fixed; inset: 0;
            background: rgba(0,0,0,0.7); z-index: 999;
            align-items: center; justify-content: center;
        }
        .modal-overlay.show { display: flex; }
        .modal-box {
            background: white; border-radius: 20px;
            padding: 28px; text-align: center; width: 280px;
        }
        .modal-title { font-size: 16px; font-weight: 600; margin-bottom: 16px; color: #333; }
        .modal-close {
            margin-top: 16px; width: 100%; padding: 12px;
            background: #f0f0f0; border: none; border-radius: 10px;
            font-size: 15px; cursor: pointer; color: #333;
        }
    </style>
</head>
<body>

<div id="loading">
    <div class="spinner"></div>
    <p>กำลังโหลดบัตรสมาชิก...</p>
</div>

<div id="app">
    <!-- Member Card -->
    <div class="member-card" id="member-card">
        <div class="card-shine"></div>
        <div class="card-tier" id="card-tier">BRONZE MEMBER</div>
        <div class="card-name" id="card-name">-</div>
        <div class="card-id"  id="card-id">ID: -</div>
        <div class="card-points-row">
            <div>
                <div class="card-points-label">แต้มสะสม</div>
                <span class="card-points-val" id="card-points">0</span>
                <span class="card-points-unit"> แต้ม</span>
            </div>
            <div style="text-align:right">
                <div class="card-points-label">EXP</div>
                <span class="card-points-val" id="card-exp">0</span>
            </div>
        </div>
    </div>

    <!-- Progress Bar -->
    <div class="perks-card">
        <div class="progress-section">
            <div class="progress-label">
                <span id="progress-current">0 EXP</span>
                <span id="progress-next">อีก 0 EXP ถึง Silver</span>
            </div>
            <div class="progress-track">
                <div class="progress-fill" id="progress-fill" style="width:0%"></div>
            </div>
        </div>
    </div>

    <!-- QR Button -->
    <button class="qr-btn" onclick="showQR()">แสดง QR Code สำหรับสะสมแต้ม</button>

    <!-- Tier Perks -->
    <div class="perks-card">
        <div class="perks-title" id="perks-title">สิทธิพิเศษของคุณ</div>
        <div id="perks-list"></div>
    </div>
</div>

<!-- QR Modal -->
<div class="modal-overlay" id="qr-modal">
    <div class="modal-box">
        <div class="modal-title">QR Code ของคุณ</div>
        <canvas id="qr-canvas"></canvas>
        <button class="modal-close" onclick="closeQR()">ปิด</button>
    </div>
</div>

<script>
    const LIFF_ID      = "2010298031-TOsCbkzl";
    const SUPABASE_URL = "https://iberkiyorordyculsjyu.supabase.co";
    const SUPABASE_KEY = "sb_publishable_f3Knp7KLRxfHiOJQXaXU1w_uylu5zov";

    const { createClient } = supabase;
    const db = createClient(SUPABASE_URL, SUPABASE_KEY);

    const TIER_CONFIG = {
        Bronze:   { min: 0,    max: 999,  next: "Silver",   perks: ["ส่วนลด 10% ในเดือนเกิด"] },
        Silver:   { min: 1000, max: 2999, next: "Gold",     perks: ["เครื่องดื่ม/ท็อปปิงฟรี 1 สิทธิ์/เดือน", "Early Access เมนูใหม่ก่อนใคร"] },
        Gold:     { min: 3000, max: 4999, next: "Platinum", perks: ["ส่วนลดถาวร 5% ทุกบิล", "คูปองบิงซูฟรีรายไตรมาส"] },
        Platinum: { min: 5000, max: 9999, next: null,       perks: ["ส่วนลดถาวร 10% ทุกบิล", "สิทธิ์สำรองโต๊ะ VIP", "คูปองของขวัญพิเศษประจำปี"] }
    };

    const CARD_CLASS = {
        Bronze: "card-bronze", Silver: "card-silver",
        Gold: "card-gold", Platinum: "card-platinum"
    };

    let currentUserId = "";

    async function init() {
        try {
            await liff.init({ liffId: LIFF_ID });
            if (!liff.isLoggedIn()) { liff.login(); return; }

            const profile = await liff.getProfile();
            currentUserId = profile.userId;

            const { data, error } = await db
                .from("profiles")
                .select("full_name, line_user_id, current_points, current_exp, tier")
                .eq("line_user_id", currentUserId)
                .single();

            if (error || !data) {
                alert("ไม่พบข้อมูลสมาชิก กรุณาสมัครก่อนครับ");
                return;
            }

            renderCard(data);
            document.getElementById("loading").style.display = "none";
            document.getElementById("app").style.display = "block";

        } catch (err) {
            document.getElementById("loading").innerHTML =
                `<p style="color:red">เกิดข้อผิดพลาด: ${err.message}</p>`;
        }
    }

    function renderCard(data) {
        const tier   = data.tier || "Bronze";
        const points = data.current_points || 0;
        const exp    = data.current_exp    || 0;
        const cfg    = TIER_CONFIG[tier];

        // Card
        document.getElementById("member-card").className = `member-card ${CARD_CLASS[tier]}`;
        document.getElementById("card-tier").textContent  = `${tier.toUpperCase()} MEMBER`;
        document.getElementById("card-name").textContent  = data.full_name || "-";
        document.getElementById("card-id").textContent    = `ID: ${data.line_user_id.slice(-8).toUpperCase()}`;
        document.getElementById("card-points").textContent = points.toLocaleString();
        document.getElementById("card-exp").textContent    = exp.toLocaleString();

        // Progress Bar
        const rangeMin  = cfg.min;
        const rangeMax  = cfg.next ? TIER_CONFIG[cfg.next].min : cfg.max;
        const pct       = cfg.next ? Math.min(100, Math.round((exp - rangeMin) / (rangeMax - rangeMin) * 100)) : 100;
        const remaining = cfg.next ? Math.max(0, rangeMax - exp) : 0;

        document.getElementById("progress-fill").style.width = pct + "%";
        document.getElementById("progress-current").textContent = `${exp.toLocaleString()} EXP`;
        document.getElementById("progress-next").textContent = cfg.next
            ? `อีก ${remaining.toLocaleString()} EXP ถึง ${cfg.next}`
            : "ถึงระดับสูงสุดแล้ว!";

        // Perks
        document.getElementById("perks-title").textContent = `สิทธิพิเศษระดับ ${tier}`;
        document.getElementById("perks-list").innerHTML = cfg.perks
            .map(p => `<div class="perk-item"><span class="perk-dot">✓</span><span>${p}</span></div>`)
            .join("");
    }

    function showQR() {
        document.getElementById("qr-modal").classList.add("show");
        // เพิ่มความสว่างหน้าจอ (ถ้าอยู่ใน LINE)
        try { screen.orientation && (document.documentElement.style.filter = "brightness(1)"); } catch(e){}
        QRCode.toCanvas(document.getElementById("qr-canvas"), currentUserId, {
            width: 200, margin: 2,
            color: { dark: "#000000", light: "#ffffff" }
        });
    }

    function closeQR() {
        document.getElementById("qr-modal").classList.remove("show");
    }

    init();
</script>
</body>
</html>
