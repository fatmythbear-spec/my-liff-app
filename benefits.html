<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>คอมมูนิตี้ & สิทธิพิเศษ - Fat Myth Bear</title>
    <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    
    <style>
        :root {
            --primary: #06c755;
            --primary-dark: #05b04b;
            --bg-color: #f4f6f9;
            --card-shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
            
            /* Metallic Rank Colors */
            --bronze-grad: linear-gradient(135deg, #70483c 0%, #b5826f 50%, #543126 100%);
            --silver-grad: linear-gradient(135deg, #8a9ba8 0%, #b3c6d4 50%, #61717e 100%);
            --gold-grad: linear-gradient(135deg, #bf953f 0%, #fcf6ba 25%, #b38728 50%, #fbf5b7 75%, #aa771c 100%);
            --platinum-grad: linear-gradient(135deg, #3a6073 0%, #b7b7b7 50%, #16222a 100%);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Kanit', sans-serif; }
        body { background-color: var(--bg-color); color: #333; padding-bottom: 30px; }

        /* Loading View */
        #loading-screen {
            position: fixed; inset: 0; background: #ffffff; z-index: 9999;
            display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 15px;
        }
        .spinner { width: 45px; height: 45px; border: 4px solid #f3f3f3; border-top: 4px solid var(--primary); border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        .container { padding: 16px; max-width: 500px; margin: 0 auto; }
        
        /* Top Navigation Tabs */
        .nav-tabs { display: flex; background: white; border-radius: 12px; padding: 4px; margin-bottom: 20px; box-shadow: var(--card-shadow); }
        .nav-tab-btn { flex: 1; padding: 10px; border: none; background: transparent; font-size: 14px; font-weight: 500; color: #718096; cursor: pointer; border-radius: 8px; transition: all 0.2s; }
        .nav-tab-btn.active { background: var(--primary); color: white; font-weight: 600; }

        .view-section { display: none; }
        .view-section.active { display: block; }

        /* Community Feed Elements */
        .feed-card { background: white; border-radius: 16px; padding: 16px; margin-bottom: 16px; box-shadow: var(--card-shadow); border: 1px solid #edf2f7; }
        .author-info { display: flex; align-items: center; gap: 12px; margin-bottom: 12px; }
        .author-avatar { width: 42px; height: 42px; border-radius: 50%; object-fit: cover; background: #e2e8f0; }
        .author-name { font-weight: 600; font-size: 15px; color: #1a202c; }
        .post-time { font-size: 11px; color: #a0aec0; margin-top: 1px; }
        
        .badge-official { background: #e0f2fe; color: #0284c7; font-size: 10px; padding: 1px 6px; border-radius: 4px; font-weight: 600; margin-left: 6px; }

        .post-content { font-size: 14px; color: #4a5568; line-height: 1.5; margin-bottom: 12px; white-space: pre-line; }
        .post-media { width: 100%; border-radius: 12px; margin-bottom: 12px; display: block; object-fit: cover; max-height: 250px; background: #f7fafc; }

        .interaction-bar { display: flex; gap: 20px; border-top: 1px solid #edf2f7; border-bottom: 1px solid #edf2f7; padding: 8px 4px; margin-bottom: 12px; }
        .action-btn { background: none; border: none; font-size: 13px; color: #718096; cursor: pointer; display: flex; align-items: center; gap: 6px; transition: all 0.2s; }
        .action-btn i { font-size: 16px; }
        
        /* Active Permanent Interaction Colors */
        .action-btn.liked { color: #22c55e; font-weight: 600; }
        .action-btn.hearted { color: #ef4444; font-weight: 600; }

        /* Comments List section */
        .comments-section { background: #f8fafc; border-radius: 12px; padding: 10px; margin-top: 8px; }
        .comment-item { font-size: 13px; margin-bottom: 6px; padding-bottom: 6px; border-bottom: 1px dashed #e2e8f0; }
        .comment-item:last-child { margin-bottom: 0; padding-bottom: 0; border: none; }
        .comment-user { font-weight: 600; color: #2d3748; }
        .comment-text { color: #4a5568; margin-left: 4px; }

        .comment-input-box { display: flex; gap: 8px; margin-top: 10px; }
        .comment-input { flex: 1; padding: 8px 12px; border: 1px solid #cbd5e1; border-radius: 20px; font-size: 13px; background: white; outline: none; }
        .comment-submit-btn { background: #4a5568; color: white; border: none; padding: 0 14px; border-radius: 20px; font-size: 12px; font-weight: 500; cursor: pointer; }

        /* Privilege Promo Card Elements */
        .promo-card { background: white; border-radius: 16px; overflow: hidden; margin-bottom: 16px; box-shadow: var(--card-shadow); border: 1px solid #edf2f7; }
        .promo-img-wrap { width: 100%; height: 160px; background: #e2e8f0; position: relative; }
        .promo-img { width: 100%; height: 100%; object-fit: cover; }
        .promo-tag { position: absolute; top: 12px; right: 12px; background: rgba(0,0,0,0.6); color: white; padding: 3px 10px; border-radius: 20px; font-size: 11px; backdrop-filter: blur(4px); }
        .promo-body { padding: 16px; }
        .promo-title { font-size: 16px; font-weight: 600; color: #1a202c; margin-bottom: 6px; }
        .promo-desc { font-size: 13px; color: #718096; line-height: 1.4; }
    </style>
</head>
<body>

<div id="loading-screen">
    <div class="spinner"></div>
    <p style="color: #718096; font-size: 14px;">กำลังโหลดศูนย์รวมคอมมูนิตี้ Fat Myth Bear...</p>
</div>

<div class="container">
    <div class="nav-tabs">
        <button class="nav-tab-btn active" onclick="switchMainTab('community', this)"><i class="fa-solid fa-users"></i> คอมมูนิตี้หมี</button>
        <button class="nav-tab-btn" onclick="switchMainTab('promotions', this)"><i class="fa-solid fa-bullhorn"></i> ข่าวสาร & โปรโมชั่น</button>
        <button class="nav-tab-btn" onclick="switchMainTab('reviews', this)"><i class="fa-solid fa-star" style="color: #eab308;"></i> รีวิวจากลูกค้า</button>
    </div>

    <div id="view-community" class="view-section active">
        <div id="box-community-feed"></div>
    </div>

    <div id="view-promotions" class="view-section">
        <div id="box-promotions-list"></div>
    </div>

    <div id="view-reviews" class="view-section">
        <div id="box-reviews-list"></div>
    </div>
</div>

<script>
    var LIFF_ID = "2010298031-TOsCbkzl"; 
    var SUPABASE_URL = "https://iberkiyorordyculsjyu.supabase.co";
    var SUPABASE_KEY = "sb_publishable_f3Knp7KLRxfHiOJQXaXU1w_uylu5zov";
    var { createClient } = supabase;
    var db = createClient(SUPABASE_URL, SUPABASE_KEY);

    var lineUserId = "";
    var lineDisplayName = "สมาชิกร้านหมี";

    // โครงสร้าง Mock Data หลักของโพสต์คอมมูนิตี้
    var localMemoryFeed = [
        {
            id: "post_001",
            author: "Fat Myth Bear Official",
            avatar: "https://images.unsplash.com/photo-1544005313-94ddf0286df2?q=80&w=120",
            isOfficial: true,
            timeStr: "เมื่อวานนี้ 14:20 น.",
            content: "🎉 เปิดตัวเมนูใหม่ฉลองหน้าฝน! 'บิงซูทุเรียนหมอนทองพรีเมียม' เสิร์ฟพร้อมซอสครีมกะทิเข้มข้น และเนื้อทุเรียนเน้นๆ เต็มๆ คำ แวะมาลิ้มลองความฟินได้แล้ววันนี้ทุกสาขาครับ! 🍓🍧",
            mediaUrl: "https://images.unsplash.com/photo-1563729784474-d77dbb933a9e?q=80&w=500",
            likes: 42,
            hearts: 28,
            comments: [
                { user: "คุณมนัสวี", text: "ไปลองมาแล้วค่ะ อร่อยฟินละลายในปากมากกก" },
                { user: "เอกชัย สายกิน", text: "เดี๋ยวเย็นนี้เลิกงานจะพาลูกๆ ไปจัดชุดใหญ่เลยครับ" }
            ]
        },
        {
            id: "post_002",
            author: "NongPloy_Vip",
            avatar: "https://images.unsplash.com/photo-1534528741775-53994a69daeb?q=80&w=120",
            isOfficial: false,
            timeStr: "วันนี้ 10:05 น.",
            content: "วันนี้มาใช้สิทธิ์คูปองวันเกิด ฟรีบิงซูถ้วยเล็กที่สาขาสยาม พนักงานบริการดีมากกก บิงซูนุ่มฟูเหมือนปุยเมฆ แนะนำร้านนี้เลยค่ะ รักเลยยยย 🧸✨",
            mediaUrl: "https://images.unsplash.com/photo-1517093157656-b9ecedd1f20b?q=80&w=500",
            likes: 18,
            hearts: 12,
            comments: []
        }
    ];

    // โครงสร้าง ข่าวสารโปรโมชั่น
    var masterPromotions = [
        {
            title: "โปรโมชั่นสะสมแต้มคูณสอง! (Double Points)",
            desc: "สิทธิพิเศษสำหรับวันอังคาร-พฤหัสบดี ตลอดเดือนนี้ เมื่อสั่งซื้อเมนูบิงซูขนาด L ขึ้นไป รับแต้มสะสมระบบ VIP ทันที 2 เท่าจากยอดบิลสุทธิ",
            imgUrl: "https://images.unsplash.com/photo-1504674900247-0877df9cc836?q=80&w=500",
            tag: "HOT PROMO"
        },
        {
            title: "ต้อนรับสมาชิกระดับ Platinum Rank ใหม่",
            desc: "สมาชิกระดับพลาตินัมรับฟรีเมนูเครื่องดื่ม Signature Month 2 แก้วฟรีทุกเดือน พร้อมส่วนลดท้ายบิลทันที 15% ไม่มีขั้นต่ำในการเข้าใช้บริการ",
            imgUrl: "https://images.unsplash.com/photo-1498837167922-ddd27525d352?q=80&w=500",
            tag: "VIP EXCLUSIVE"
        }
    ];

    // โครงสร้าง ข้อมูลรีวิว
    var masterReviews = [
        {
            title: "รีวิวจาก คุณกิตติศักดิ์ (ระดับ Gold)",
            desc: "รสชาติบิงซูชาไทยเข้มข้นสะใจมากครับ ไม่หวานตัดขา ท็อปปิ้งเฉาก๊วยหนึบหนับกำลังดี บรรยากาศร้านตกแต่งน่ารัก ถ่ายรูปสวยทุกมุมเลย",
            imgUrl: "https://images.unsplash.com/photo-1555507036-ab1f4038808a?q=80&w=500",
            tag: "⭐ 5 ดาวเต็ม"
        }
    ];

    async function initializeLIFF() {
        try {
            await liff.init({ liffId: LIFF_ID });
            if (!liff.isLoggedIn()) {
                liff.login();
                return;
            }
            var profile = await liff.getProfile();
            lineUserId = profile.userId;
            lineDisplayName = profile.displayName || "สมาชิก VIP ร้านหมี";
            
            // สั่งประมวลผลเรนเดอร์หน้าจอหลัก
            renderCommunityFeedUI();
            renderPromotionsAndReviews();

            document.getElementById("loading-screen").style.display = "none";
        } catch (err) {
            console.error("LIFF Init Error:", err);
            document.getElementById("loading-screen").innerHTML = '<p style="color:#ef4444; padding:20px;">การยืนยันตัวตน LINE ล้มเหลว กรุณาเปิดใหม่อีกครั้ง</p>';
        }
    }

    function switchMainTab(targetSection, element) {
        var buttons = document.querySelectorAll('.nav-tab-btn');
        buttons.forEach(b => b.classList.remove('active'));
        element.classList.add('active');

        var sections = document.querySelectorAll('.view-section');
        sections.forEach(s => s.classList.remove('active'));

        if (targetSection === 'community') document.getElementById('view-community').classList.add('active');
        if (targetSection === 'promotions') document.getElementById('view-promotions').classList.add('active');
        if (targetSection === 'reviews') document.getElementById('view-reviews').classList.add('active');
    }

    // ฟังก์ชันในการเรนเดอร์คอมมูนิตี้ฟีด พร้อมระบบดึงสถานะกดถูกใจแบบถาวร
    function renderCommunityFeedUI() {
        var container = document.getElementById("box-community-feed");
        container.innerHTML = "";

        localMemoryFeed.forEach(function(post) {
            // ดึงสถานะถาวรจากเครื่องผู้ใช้รายบุคคล (ล็อกร่วมกับ LINE User ID เพื่อป้องกันบั๊กสลับบัญชี)
            var permanentLikeKey = `perm_like_${lineUserId}_${post.id}`;
            var permanentHeartKey = `perm_heart_${lineUserId}_${post.id}`;

            var hasLiked = localStorage.getItem(permanentLikeKey) === "YES";
            var hasHearted = localStorage.getItem(permanentHeartKey) === "YES";

            // คำนวณยอดแสดงผลแบบ Real-time ผสมผสานค่าเริ่มต้นบวกกับผลต่างของการกดถาวร
            var displayLikesCount = post.likes + (hasLiked ? 1 : 0);
            var displayHeartsCount = post.hearts + (hasHearted ? 1 : 0);

            var commentsHtml = "";
            post.comments.forEach(function(cmt) {
                commentsHtml += `
                    <div class="comment-item">
                        <span class="comment-user">${cmt.user}:</span>
                        <span class="comment-text">${cmt.text}</span>
                    </div>
                `;
            });

            var card = document.createElement("div");
            card.className = "feed-card";
            card.innerHTML = `
                <div class="author-info">
                    <img class="author-avatar" src="${post.avatar}" alt="avatar">
                    <div>
                        <div class="author-name">
                            ${post.author}
                            ${post.isOfficial ? `<span class="badge-official"><i class="fa-solid fa-circle-check"></i> ร้านค้า</span>` : ''}
                        </div>
                        <div class="post-time">${post.timeStr}</div>
                    </div>
                </div>

                <div class="post-content">${post.content}</div>
                ${post.mediaUrl ? `<img class="post-media" src="${post.mediaUrl}" alt="media">` : ''}

                <div class="interaction-bar">
                    <button class="action-btn ${hasLiked ? 'liked' : ''}" onclick="executePermanentInteraction('${post.id}', 'like')">
                        <i class="${hasLiked ? 'fa-solid' : 'fa-regular'} fa-thumbs-up"></i> ถูกใจ (${displayLikesCount})
                    </button>
                    <button class="action-btn ${hasHearted ? 'hearted' : ''}" onclick="executePermanentInteraction('${post.id}', 'heart')">
                        <i class="${hasHearted ? 'fa-solid' : 'fa-regular'} fa-heart"></i> หัวใจ (${displayHeartsCount})
                    </button>
                </div>

                <div class="comments-section">
                    <div id="comments-box-${post.id}">
                        ${commentsHtml || '<p style="font-size:11px; color:#a0aec0; text-align:center; padding:4px 0;">เขียนคอมเมนต์คนแรกของโพสต์นี้เลย...</p>'}
                    </div>
                    <div class="comment-input-box">
                        <input type="text" id="input-${post.id}" class="comment-input" placeholder="พิมพ์ข้อความตอบกลับที่นี่...">
                        <button class="comment-submit-btn" onclick="executeSubmitComment('${post.id}')">ส่ง</button>
                    </div>
                </div>
            `;
            container.appendChild(card);
        });
    }

    // ฟังก์ชันระดับสูงจัดเก็บการปฏิสัมพันธ์โพสต์แบบถาวร (100% ไม่หายเมื่อออก LINE)
    function executePermanentInteraction(postId, actionType) {
        if (!lineUserId) return;

        var permanentLikeKey = `perm_like_${lineUserId}_${postId}`;
        var permanentHeartKey = `perm_heart_${lineUserId}_${postId}`;

        if (actionType === "like") {
            var isCurrentlyLiked = localStorage.getItem(permanentLikeKey) === "YES";
            if (isCurrentlyLiked) {
                localStorage.removeItem(permanentLikeKey); // ถอนไลค์ออกถาวร
            } else {
                localStorage.setItem(permanentLikeKey, "YES"); // บันทึกไลค์ลงเครื่องถาวร
            }
        } else if (actionType === "heart") {
            var isCurrentlyHearted = localStorage.getItem(permanentHeartKey) === "YES";
            if (isCurrentlyHearted) {
                localStorage.removeItem(permanentHeartKey); // ถอนหัวใจออกถาวร
            } else {
                localStorage.setItem(permanentHeartKey, "YES"); // บันทึกหัวใจลงเครื่องถาวร
            }
        }

        // รีเรนเดอร์ UI ทันที ยอดตัวเลขจะผูกติดกับ Local Storage ตัวนี้อย่างปลอดภัยแม่นยำ
        renderCommunityFeedUI();
    }

    // ฟังก์ชันส่งข้อความแสดงความคิดเห็นคอมเมนต์
    function executeSubmitComment(postId) {
        var inputElement = document.getElementById("input-" + postId);
        var txt = inputElement.value.trim();
        if (!txt) return;

        var post = localMemoryFeed.find(p => p.id === postId);
        if (post) {
            post.comments.push({
                user: lineDisplayName,
                text: txt
            });
        }

        inputElement.value = "";
        renderCommunityFeedUI();
    }

    // ฟังก์ชันเรนเดอร์ส่วนโปรโมชั่นและรีวิว
    function renderPromotionsAndReviews() {
        var promoBox = document.getElementById("box-promotions-list");
        var reviewBox = document.getElementById("box-reviews-list");

        promoBox.innerHTML = "";
        reviewBox.innerHTML = "";

        masterPromotions.forEach(function(p) {
            promoBox.innerHTML += `
                <div class="promo-card">
                    <div class="promo-img-wrap">
                        <img class="promo-img" src="${p.imgUrl}" alt="promo">
                        <div class="promo-tag">${p.tag}</div>
                    </div>
                    <div class="promo-body">
                        <div class="promo-title">${p.title}</div>
                        <div class="promo-desc">${p.desc}</div>
                    </div>
                </div>
            `;
        });

        masterReviews.forEach(function(r) {
            reviewBox.innerHTML += `
                <div class="promo-card">
                    <div class="promo-img-wrap">
                        <img class="promo-img" src="${r.imgUrl}" alt="review">
                        <div class="promo-tag" style="background:#eab308; color:#1a202c;">${r.tag}</div>
                    </div>
                    <div class="promo-body">
                        <div class="promo-title">${r.title}</div>
                        <div class="promo-desc">${r.desc}</div>
                    </div>
                </div>
            `;
        });
    }

    // เรียกทำงานระบบเมื่อหน้าจอพร้อม
    initializeLIFF();
</script>
</body>
</html>
