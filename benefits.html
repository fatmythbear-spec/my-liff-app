<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>สิทธิพิเศษ - Fat Myth Bear</title>
    <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Kanit', sans-serif; background: #f0f0f0; min-height: 100vh; }

        #loading {
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            height: 100vh; gap: 12px; color: #666;
        }
        .spinner {
            width: 40px; height: 40px; border: 4px solid #ddd;
            border-top-color: #06c755; border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        #app { display: none; padding: 16px; }

        .header {
            background: linear-gradient(135deg, #1a1a2e, #2d3561);
            color: white; border-radius: 16px; padding: 20px;
            margin-bottom: 16px;
        }
        .header-title { font-size: 22px; font-weight: 700; }
        .header-sub { font-size: 13px; opacity: 0.7; margin-top: 4px; }

        .current-tier {
            background: white; border-radius: 16px; padding: 16px;
            margin-bottom: 16px; text-align: center;
        }
        .tier-badge {
            display: inline-block; padding: 6px 16px;
            border-radius: 99px; font-size: 14px; font-weight: 700;
            margin-bottom: 8px;
        }
        .badge-bronze   { background: #cd7f3220; color: #a0522d; }
        .badge-silver   { background: #a8a9ad20; color: #666; }
        .badge-gold     { background: #ffd70020; color: #b8860b; }
        .badge-platinum { background: #667eea20; color: #534AB7; }

        .current-tier-label { font-size: 12px; color: #999; }
        .current-tier-val { font-size: 20px; font-weight: 700; color: #333; margin: 8px 0; }
        .exp-progress {
            background: #f0f0f0; border-radius: 10px; padding: 8px;
            margin-top: 12px;
        }
        .exp-bar {
            background: linear-gradient(90deg, #06c755, #00a843);
            height: 8px; border-radius: 99px; margin: 4px 0;
        }
        .exp-text { font-size: 11px; color: #666; text-align: center; }

        .section-title {
            font-size: 16px; font-weight: 700; color: #333;
            margin: 20px 0 12px 0;
        }

        .tier-container {
            display: flex; flex-direction: column; gap: 12px;
        }

        .tier-card {
            border-radius: 16px; padding: 16px; color: white;
            position: relative; overflow: hidden;
        }
        .tier-bronze   { background: linear-gradient(135deg, #cd7f32, #a0522d); }
        .tier-silver   { background: linear-gradient(135deg, #a8a9ad, #d6d6d6); }
        .tier-gold     { background: linear-gradient(135deg, #ffd700, #daa520); }
        .tier-platinum { background: linear-gradient(135deg, #667eea, #764ba2); }

        .tier-header {
            font-size: 18px; font-weight: 700; margin-bottom: 12px;
        }
        .tier-exp { font-size: 12px; opacity: 0.9; margin-bottom: 8px; }
        .perk-list { margin-top: 10px; }
        .perk-item {
            display: flex; align-items: flex-start; gap: 8px;
            font-size: 13px; margin-bottom: 6px;
        }
        .perk-dot { font-size: 12px; flex-shrink: 0; }

        .news-section {
            background: white; border-radius: 16px;
            padding: 16px; margin-bottom: 16px;
        }
        .news-title { font-size: 16px; font-weight: 700; color: #333; margin-bottom: 12px; }
        .news-item {
            border-left: 4px solid #06c755; padding-left: 12px;
            margin-bottom: 12px;
        }
        .news-item:last-child { margin-bottom: 0; }
        .news-date { font-size: 11px; color: #999; }
        .news-text { font-size: 13px; color: #333; margin-top: 4px; }

        .empty { text-align: center; color: #999; padding: 20px; font-size: 14px; }
    </style>
</head>
<body>

<div id="loading">
    <div class="spinner"></div>
    <p>กำลังโหลดสิทธิพิเศษ...</p>
</div>

<div id="app">
    <div class="header">
        <div class="header-title">👑 สิทธิพิเศษสมาชิก</div>
        <div class="header-sub">Fat Myth Bear Bingsu Cafe</div>
    </div>

    <!-- Current Tier -->
    <div class="current-tier">
        <div class="tier-badge" id="current-tier-badge">Bronze</div>
        <div class="current-tier-label">ระดับปัจจุบัน</div>
        <div class="current-tier-val" id="current-tier-name">Bronze</div>
        <div class="exp-progress">
            <div class="exp-bar" id="exp-progress-bar" style="width: 0%"></div>
            <div class="exp-text" id="exp-text">0 / 1,000 EXP</div>
        </div>
    </div>

    <!-- Tier Benefits -->
    <div class="section-title">📋 สิทธิ์ตามระดับยศ</div>
    <div class="tier-container" id="tier-list"></div>

    <!-- News & Promotions -->
    <div class="news-section">
        <div class="news-title">📢 ข่าวสารและโปรโมชัน</div>
        <div id="news-list"></div>
    </div>
</div>

<script>
    var LIFF_ID = "2010298031-TOsCbkzl";
    var SUPABASE_URL = "https://iberkiyorordyculsjyu.supabase.co";
    var SUPABASE_KEY = "sb_publishable_f3Knp7KLRxfHiOJQXaXU1w_uylu5zov";

    var { createClient } = supabase;
    var db = createClient(SUPABASE_URL, SUPABASE_KEY);

    var TIER_DATA = {
        Bronze: {
            min: 0,
            next: 1000,
            perks: [
                "ส่วนลด 10% ในเดือนเกิด",
                "สะสมแต้มทุกครั้งที่ซื้อ"
            ]
        },
        Silver: {
            min: 1000,
            next: 3000,
            perks: [
                "เครื่องดื่ม/ท็อปปิงฟรี 1 สิทธิ์ทุกเดือน",
                "Early Access เมนูใหม่ก่อนใคร",
                "ส่วนลด 5% ทุกบิล"
            ]
        },
        Gold: {
            min: 3000,
            next: 5000,
            perks: [
                "ส่วนลดถาวร 5% ทุกบิล",
                "คูปองบิงซูฟรีรายไตรมาส",
                "สิทธิ์ลดราคาเพิ่มเติมในวันพิเศษ",
                "ลูกค้าพิเศษของร้าน"
            ]
        },
        Platinum: {
            min: 5000,
            next: null,
            perks: [
                "ส่วนลดถาวร 10% ทุกบิล",
                "สิทธิ์สำรองโต๊ะ VIP",
                "คูปองของขวัญพิเศษประจำปี",
                "ส่วนลดเพิ่มเติมสำหรับเพื่อน",
                "ลูกค้า VIP ของร้าน"
            ]
        }
    };

    var BADGES = {
        Bronze: "badge-bronze",
        Silver: "badge-silver",
        Gold: "badge-gold",
        Platinum: "badge-platinum"
    };

    var TIER_COLORS = {
        Bronze: "tier-bronze",
        Silver: "tier-silver",
        Gold: "tier-gold",
        Platinum: "tier-platinum"
    };

    var currentUserId = "";
    var userData = null;

    async function init() {
        try {
            await liff.init({ liffId: LIFF_ID });
            if (!liff.isLoggedIn()) {
                liff.login();
                return;
            }

            var profile = await liff.getProfile();
            currentUserId = profile.userId;

            var { data, error } = await db
                .from("profiles")
                .select("full_name, line_user_id, current_exp, tier")
                .eq("line_user_id", currentUserId)
                .single();

            if (error || !data) {
                window.location.href = "https://liff.line.me/2010298031-TOsCbkzl";
                return;
            }

            userData = data;
            document.getElementById("loading").style.display = "none";
            document.getElementById("app").style.display = "block";

            renderCurrentTier();
            renderTierBenefits();
            renderNews();

        } catch (err) {
            document.getElementById("loading").innerHTML =
                '<p style="color:red">เกิดข้อผิดพลาด: ' + err.message + '</p>';
        }
    }

    function renderCurrentTier() {
        var tier = userData.tier || "Bronze";
        var exp = userData.current_exp || 0;
        var tierData = TIER_DATA[tier];
        var expMin = tierData.min;
        var expNext = tierData.next || tierData.min + 1000;
        var pct = Math.min(100, Math.round((exp - expMin) / (expNext - expMin) * 100));

        document.getElementById("current-tier-badge").className = 
            "tier-badge " + BADGES[tier];
        document.getElementById("current-tier-badge").textContent = tier;
        document.getElementById("current-tier-name").textContent = tier;
        document.getElementById("exp-progress-bar").style.width = pct + "%";
        document.getElementById("exp-text").textContent = 
            exp.toLocaleString() + " / " + expNext.toLocaleString() + " EXP";
    }

    function renderTierBenefits() {
        var html = "";
        var tiers = ["Bronze", "Silver", "Gold", "Platinum"];
        var currentTier = userData.tier || "Bronze";

        for (var i = 0; i < tiers.length; i++) {
            var tier = tiers[i];
            var data = TIER_DATA[tier];
            var isCurrent = tier === currentTier;
            var expRange = data.min + " - " + (data.next || "∞") + " EXP";

            html += '<div class="tier-card ' + TIER_COLORS[tier] + '" style="' + 
                (isCurrent ? 'border: 3px solid #ffd700;' : '') + '">';
            html += '<div class="tier-header">' + (isCurrent ? '✓ ' : '') + tier + '</div>';
            html += '<div class="tier-exp">' + expRange + '</div>';
            html += '<div class="perk-list">';

            for (var j = 0; j < data.perks.length; j++) {
                html += '<div class="perk-item">';
                html += '<span class="perk-dot">✓</span>';
                html += '<span>' + data.perks[j] + '</span>';
                html += '</div>';
            }

            html += '</div></div>';
        }

        document.getElementById("tier-list").innerHTML = html;
    }

    function renderNews() {
        var news = [
            {
                date: "เมื่อ 3 วันที่แล้ว",
                title: "โปรโมชั่น Birthday Month",
                desc: "สมาชิก Bronze ได้ส่วนลด 10% ในเดือนเกิด"
            },
            {
                date: "เมื่อ 1 สัปดาห์ที่แล้ว",
                title: "เมนูใหม่ Mochi Bingsu",
                desc: "สมาชิก Silver สามารถสั่งได้ก่อนใคร"
            },
            {
                date: "เมื่อ 2 สัปดาห์ที่แล้ว",
                title: "โปรแกรมแนะนำเพื่อน",
                desc: "แนะนำเพื่อนสมัครสมาชิก ได้ 50 แต้มพิเศษ"
            }
        ];

        var html = "";
        for (var i = 0; i < news.length; i++) {
            var item = news[i];
            html += '<div class="news-item">';
            html += '<div class="news-date">' + item.date + '</div>';
            html += '<div class="news-text"><strong>' + item.title + '</strong><br>' + item.desc + '</div>';
            html += '</div>';
        }

        if (news.length === 0) {
            html = '<div class="empty">ยังไม่มีข่าวสาร</div>';
        }

        document.getElementById("news-list").innerHTML = html;
    }

    init();
</script>
</body>
</html>
