<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>คอมมูนิตี้ & สิทธิพิเศษ - Fat Myth Bear</title>
    <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <style>
        :root {
            --primary: #06c755;
            --primary-dark: #05b04b;
            --bg-color: #f7f9fc;
            --gold: #bf953f;
            --silver: #bdc3c7;
            --bronze: #a8704c;
            --platinum: #30cfd0;
            --card-shadow: 0 8px 25px rgba(0, 0, 0, 0.05);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: 'Kanit', sans-serif; background: var(--bg-color); color: #2d3748; min-height: 100vh; padding-bottom: 40px; }

        /* Loading Screen */
        #loading {
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            height: 100vh; gap: 12px; color: #718096; background: #ffffff; position: fixed; width: 100%; z-index: 9999;
        }
        .spinner { width: 40px; height: 40px; border: 4px solid #e2e8f0; border-top-color: var(--primary); border-radius: 50%; animation: spin 0.8s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }

        #app { display: none; padding: 16px; max-width: 480px; margin: 0 auto; }

        /* Top Bar Dashboard */
        .top-dashboard {
            background: linear-gradient(135deg, #1a1a2e 0%, #2d3561 100%);
            border-radius: 20px; padding: 20px; color: white; margin-bottom: 24px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1); display: flex; justify-content: space-between; align-items: center;
        }
        .db-store-info { display: flex; align-items: center; gap: 12px; }
        .db-logo { width: 40px; height: 40px; border-radius: 50%; object-fit: cover; }
        .db-name { font-weight: 600; font-size: 16px; }
        .db-sub { font-size: 12px; opacity: 0.8; }
        
        .db-rank-info { text-align: right; }
        .db-points { font-size: 24px; font-weight: 700; color: #ffca28; line-height: 1.2; }
        .db-rank-label { padding: 3px 10px; border-radius: 20px; font-size: 10px; font-weight: 600; display: inline-block; margin-top: 4px; text-transform: uppercase; }
        
        .badge-bronze { background: rgba(168, 112, 76, 0.3); color: #dd9c74; }
        .badge-silver { background: rgba(189, 195, 199, 0.3); color: #ecf0f1; }
        .badge-gold { background: rgba(255, 202, 40, 0.2); color: #ffca28; }
        .badge-platinum { background: rgba(48, 207, 208, 0.3); color: #30cfd0; }

        /* ========================================================
           LUXURY GLOSSY RANK CARDS (บัตรสิทธิพิเศษหรูหรา)
        ======================================================== */
        .section-header { font-size: 16px; font-weight: 600; color: #1a202c; margin-bottom: 16px; display: flex; align-items: center; gap: 8px; }
        .section-header i { color: #ff7043; }

        .rank-grid { display: flex; flex-direction: column; gap: 14px; margin-bottom: 24px; }
        
        .rank-card {
            border-radius: 20px; padding: 20px; color: white; position: relative; overflow: hidden;
            box-shadow: 0 8px 20px rgba(0,0,0,0.1); border: 1px solid rgba(255,255,255,0.05);
            transition: all 0.3s ease;
        }

        /* เอฟเฟกต์ความเงาแวววาวเมทัลลิก (glossy metallic shimmer animation) */
        .rank-card::before {
            content: ''; position: absolute; top: -50%; left: -50%; width: 200%; height: 200%;
            background: linear-gradient(45deg, rgba(255,255,255,0) 45%, rgba(255,255,255,0.25) 50%, rgba(255,255,255,0) 55%);
            transform: rotate(-45deg); animation: shine-metallic 6s infinite ease-in-out; pointer-events: none;
        }
        @keyframes shine-metallic {
            0% { transform: translate(-30%, -30%) rotate(-45deg); }
            22%, 100% { transform: translate(30%, 30%) rotate(-45deg); }
        }

        /* เมทัลลิกไล่ระดับสีตาม Rank จริง (Bronze, Silver, Gold, Platinum) */
        .rank-card-bronze { background: linear-gradient(135deg, #a8704c 0%, #dd9c74 50%, #895333 100%); }
        .rank-card-silver { background: linear-gradient(135deg, #bdc3c7 0%, #ecf0f1 50%, #95a5a6 100%); color: #2c3e50; }
        .rank-card-silver .perk-dot { color: #2c3e50; }
        .rank-card-gold { background: linear-gradient(135deg, #bf953f 0%, #fcf6ba 25%, #b38728 50%, #fbf5b7 75%, #aa771c 100%); color: #4a3300; }
        .rank-card-gold .perk-dot { color: #4a3300; }
        .rank-card-platinum { background: linear-gradient(135deg, #30cfd0 0%, #330867 100%); }

        .rank-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; }
        .rank-name-container { display: flex; align-items: center; gap: 8px; }
        .rank-badge { font-size: 24px; width: 42px; height: 42px; border-radius: 12px; background: rgba(255,255,255,0.18); display: flex; align-items: center; justify-content: center; }
        .rank-title { font-size: 18px; font-weight: 700; letter-spacing: 0.5px; }
        .rank-range { font-size: 11px; opacity: 0.85; }
        
        .status-badge { font-size: 10px; font-weight: 600; padding: 4px 12px; border-radius: 20px; background: rgba(255,255,255,0.2); backdrop-filter: blur(4px); }
        .status-badge.current { background: #ffca28; color: #4a3300; font-weight: 700; box-shadow: 0 4px 10px rgba(255,202,40,0.3); }
        .inactive-card { opacity: 0.45; filter: grayscale(30%); transform: scale(0.98); }

        .perk-list { display: grid; grid-template-columns: 1fr; gap: 8px; }
        .perk-item { display: flex; align-items: center; gap: 8px; font-size: 12.5px; }
        .perk-dot { font-size: 12px; opacity: 0.9; }

        /* ========================================================
           COMMUNITY TIMELINE SYSTEM (ระบบคอมมูนิตี้ไทม์ไลน์)
        ======================================================= */
        .page-title { font-size: 20px; font-weight: 700; color: #1a202c; margin-bottom: 16px; display: flex; align-items: center; gap: 10px; }
        
        .tabs-container { display: flex; gap: 8px; margin-bottom: 16px; background: #e2e8f0; padding: 4px; border-radius: 14px; }
        .tab-btn {
            flex: 1; text-align: center; padding: 10px 4px; font-size: 13px; font-weight: 600;
            color: #4a5568; border: none; background: transparent; border-radius: 10px; cursor: pointer;
            transition: all 0.2s ease; display: flex; align-items: center; justify-content: center; gap: 6px;
        }
        .tab-btn.active { background: var(--primary); color: #ffffff; box-shadow: 0 4px 12px rgba(6,199,85,0.2); }

        /* กล่องสร้างโพสต์อัจฉริยะ (Create Post UI) */
        .create-post-box {
            background: white; border-radius: 18px; padding: 16px; margin-bottom: 20px;
            box-shadow: var(--card-shadow); border: 1px dashed #cbd5e1; display: flex; flex-direction: column; gap: 12px;
        }
        .post-input-row { display: flex; gap: 12px; align-items: flex-start; }
        .post-user-avatar { width: 36px; height: 36px; border-radius: 50%; background: #e2e8f0; object-fit: cover; }
        .post-textarea {
            flex: 1; background: transparent; border: none; outline: none; font-family: inherit;
            font-size: 13.5px; resize: none; min-height: 44px; color: #1a202c; padding-top: 6px;
        }
        .post-textarea::placeholder { color: #a0aec0; }

        /* แท็บบาร์เลือกคะแนนดาวเฉพาะรีวิว */
        .rating-selector-zone { display: none; align-items: center; gap: 8px; font-size: 13px; color: #4a5568; padding-left: 48px; }
        .stars-select { color: #cbd5e1; font-size: 16px; cursor: pointer; display: flex; gap: 4px; }
        .stars-select i.active { color: #ffca28; }
        
        /* กรอบตัวอย่างรูปถ่าย */
        .preview-wrapper { display: none; position: relative; margin-top: 4px; border-radius: 12px; overflow: hidden; max-height: 180px; border: 1px solid #e2e8f0; }
        .preview-wrapper img { width: 100%; height: 100%; object-fit: cover; }
        .btn-remove-preview { position: absolute; top: 8px; right: 8px; background: rgba(0,0,0,0.6); color: white; border: none; width: 24px; height: 24px; border-radius: 50%; cursor: pointer; font-size: 12px; font-weight: bold; }

        .post-control-row { display: flex; justify-content: space-between; align-items: center; border-top: 1px solid #f1f5f9; padding-top: 12px; }
        .btn-capture-trigger {
            background: #fff; border: 1px solid #cbd5e1; color: #4a5568; padding: 8px 14px;
            border-radius: 10px; font-size: 12.5px; font-weight: 500; cursor: pointer; display: flex; align-items: center; gap: 6px;
        }
        .btn-capture-trigger i { color: var(--primary); font-size: 14px; }
        .btn-submit-post {
            background: var(--primary); color: white; border: none; padding: 8px 20px;
            border-radius: 10px; font-size: 13px; font-weight: 600; cursor: pointer; transition: background 0.2s;
        }
        .btn-submit-post:disabled { background: #cbd5e1; cursor: not-allowed; }

        /* แผงควบคุมไทม์ไลน์ */
        .community-panel { display: none; position: relative; padding-left: 20px; }
        .community-panel.active { display: block; }
        .community-panel::before { content: ''; position: absolute; left: 4px; top: 0; bottom: 0; width: 2px; background: #e2e8f0; }

        .post-card { background: white; border-radius: 16px; padding: 16px; margin-bottom: 16px; position: relative; box-shadow: 0 4px 15px rgba(0,0,0,0.01); border: 1px solid #f1f5f9; }
        .post-card::before { content: ''; position: absolute; left: -20px; top: 22px; width: 8px; height: 8px; border-radius: 50%; background: #cbd5e0; border: 2px solid #ffffff; box-shadow: 0 0 0 2px #cbd5e0; }
        
        .post-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
        .post-author { display: flex; align-items: center; gap: 10px; font-size: 13px; font-weight: 600; }
        .post-avatar { width: 32px; height: 32px; border-radius: 50%; background: #f1f5f9; display: flex; align-items: center; justify-content: center; font-size: 14px; object-fit: cover; }
        .post-date { font-size: 11px; color: #a0aec0; }
        
        .post-title { font-size: 14.5px; font-weight: 600; color: #1a202c; margin-bottom: 4px; }
        .post-content { font-size: 13px; color: #4a5568; line-height: 1.5; word-break: break-word; }
        
        .post-img-container { width: 100%; border-radius: 12px; margin-top: 10px; overflow: hidden; background: #f1f5f9; }
        .post-img { width: 100%; max-height: 220px; object-fit: cover; display: block; }
        
        .review-rating { color: #ffca28; font-size: 12px; margin-bottom: 6px; letter-spacing: 1px; }

        /* Social Interactive Bar (ไลค์/หัวใจ/คอมเมนต์) */
        .post-actions-bar { display: flex; gap: 14px; border-top: 1px solid #f1f5f9; border-bottom: 1px solid #f1f5f9; padding: 8px 2px; margin-top: 12px; margin-bottom: 10px; }
        .action-btn { background: transparent; border: none; color: #718096; font-size: 12.5px; font-weight: 500; cursor: pointer; display: flex; align-items: center; gap: 5px; }
        .action-btn.active-like { color: #3b82f6; font-weight: 600; }
        .action-btn.active-heart { color: #ef4444; font-weight: 600; }

        /* โซนกล่องคอมเมนต์ */
        .comment-box-zone { background: #f8fafc; border-radius: 10px; padding: 10px; display: flex; flex-direction: column; gap: 6px; }
        .comment-item-row { font-size: 12px; line-height: 1.4; color: #4b5563; }
        .comment-author-name { font-weight: 600; color: #1a202c; margin-right: 4px; }
        .comment-input-group { display: flex; gap: 6px; margin-top: 4px; }
        .comment-field { flex: 1; background: #fff; border: 1px solid #e2e8f0; border-radius: 6px; padding: 5px 8px; font-size: 12px; outline: none; font-family: inherit; }
        .comment-submit-btn { background: #e2e8f0; border: none; color: #4a5568; padding: 0 10px; border-radius: 6px; font-size: 11px; font-weight: 600; cursor: pointer; }

        .empty-state { text-align: center; padding: 40px; color: #a0aec0; font-size: 14px; }
        .empty-state i { font-size: 36px; margin-bottom: 10px; opacity: 0.5; display: block; }
    </style>
</head>
<body>

<div id="loading">
    <div class="spinner"></div>
    <p>กำลังโหลดข้อมูลคอมมูนิตี้ถาวร...</p>
</div>

<div id="app">
    <div class="top-dashboard">
        <div class="db-store-info">
            <img src="https://cdn-icons-png.flaticon.com/512/4343/4343510.png" class="db-logo" id="user-top-avatar" alt="">
            <div>
                <div class="db-name" id="user-top-name">Fat Myth Bear Bingsu</div>
                <div class="db-sub" id="current-tier-text">ระดับ: โหลดข้อมูล...</div>
            </div>
        </div>
        <div class="db-rank-info">
            <div class="db-points" id="db-points">0</div>
            <div id="db-rank-badge" class="db-rank-label badge-bronze">Bronze Member</div>
        </div>
    </div>

    <div class="section-header">
        <i class="fa-solid fa-gem"></i>
        <span>สิทธิพิเศษและบัตรสมาชิกของคุณ</span>
    </div>
    
    <div class="rank-grid" id="rank-grid"></div>

    <div class="page-title">
        <i class="fa-solid fa-users"></i>
        <span>คอมมูนิตี้ไทม์ไลน์</span>
    </div>

    <div class="tabs-container">
        <button class="tab-btn active" id="btn-tab-promo" onclick="switchTab('promo')">
            <i class="fa-solid fa-bullhorn"></i> โปรโมชั่นร้าน
        </button>
        <button class="tab-btn" id="btn-tab-review" onclick="switchTab('review')">
            <i class="fa-solid fa-star"></i> รีวิวจากลูกค้า
        </button>
    </div>

    <div class="create-post-box">
        <div class="post-input-row">
            <img class="post-user-avatar" id="current-user-post-avatar" src="https://cdn-icons-png.flaticon.com/512/4343/4343510.png">
            <textarea class="post-textarea" id="community-post-text" placeholder="แชร์ข้อมูลโปรโมชั่นหน้าร้านวันนี้ที่นี่..."></textarea>
        </div>
        
        <div class="rating-selector-zone" id="review-rating-zone">
            <span>ให้คะแนนร้าน:</span>
            <div class="stars-select" id="star-picker-container">
                <i class="fa-solid fa-star active" data-value="1" onclick="setPostRating(1)"></i>
                <i class="fa-solid fa-star active" data-value="2" onclick="setPostRating(2)"></i>
                <i class="fa-solid fa-star active" data-value="3" onclick="setPostRating(3)"></i>
                <i class="fa-solid fa-star active" data-value="4" onclick="setPostRating(4)"></i>
                <i class="fa-solid fa-star active" data-value="5" onclick="setPostRating(5)"></i>
            </div>
        </div>
        
        <div class="preview-wrapper" id="post-image-preview-box">
            <button class="btn-remove-preview" onclick="cancelSelectedImage()">×</button>
            <img id="post-image-preview-img" src="">
        </div>

        <div class="post-control-row">
            <div>
                <input type="file" id="camera-file-input" accept="image/*" style="display: none;" onchange="processSelectedImage(event)">
                <button class="btn-capture-trigger" onclick="openDeviceCamera()">
                    <i class="fa-solid fa-camera"></i> ถ่ายรูป / เลือกรูป
                </button>
            </div>
            <button class="btn-submit-post" id="btn-submit-post-trigger" onclick="executePublishPost()">ส่งโพสต์ลงตาราง</button>
        </div>
    </div>

    <div id="panel-promo" class="community-panel active">
        <div id="list-promo"></div>
    </div>

    <div id="panel-review" class="community-panel">
        <div id="list-review"></div>
    </div>
</div>

<script>
    var LIFF_ID = "2010298031-prC3lMly"; 
    var SUPABASE_URL = "https://iberkiyorordyculsjyu.supabase.co";
    var SUPABASE_KEY = "sb_publishable_f3Knp7KLRxfHiOJQXaXU1w_uylu5zov";
    var { createClient } = supabase;
    var db = createClient(SUPABASE_URL, SUPABASE_KEY);

    var currentUserId = "MOCK_USER_ID";
    var currentUserName = "สมาชิกทั่วไป";
    var currentUserAvatar = "https://cdn-icons-png.flaticon.com/512/4343/4343510.png";
    var currentActiveTab = "promo"; 
    var encodedBase64ImageStr = ""; 
    var selectedReviewRating = 5; 

    // โครงสร้างข้อมูลสิทธิ์ตามบัตร (Config คงเดิมตามดีไซน์หรูหราแบบ Glossy)
    var TIER_DATA = [
        { id: 'Bronze', name: 'Bronze', range: '0 - 1,000 EXP', icon: '🥉', perks: ['ส่วนลด 10% ในเดือนเกิด', 'สะสมแต้มทุกครั้งที่ซื้อสำเร็จ'] },
        { id: 'Silver', name: 'Silver', range: '1,000 - 3,000 EXP', icon: '🥈', perks: ['เครื่องดื่ม/ท็อปปิงฟรี 1 สิทธิ์ทุกเดือน', 'Early Access เมนูใหม่ก่อนใคร', 'ส่วนลด 5% ทุกบิล'] },
        { id: 'Gold', name: 'Gold', range: '3,000 - 5,000 EXP', icon: '🥇', perks: ['ส่วนลดถาวร 5% ทุกบิลหน้าร้าน', 'คูปองบิงซูฟรีรายไตรมาส', 'สิทธิ์ลดราคาเพิ่มเติมในวันพิเศษ'] },
        { id: 'Platinum', name: 'Platinum', range: '5,000+ EXP', icon: '💎', perks: ['ส่วนลดถาวร 10% ทุกบิลวีไอพี', 'สิทธิ์สำรองโต๊ะ VIP ล่วงหน้า', 'คูปองของขวัญพิเศษประจำปี'] }
    ];

    // ระบบจัดเก็บสถานะปุ่มไลค์/คอมเมนต์แบบ Local Memory เผื่อตารางในฐานข้อมูลยังไม่ได้เพิ่ม Column รองรับ
    var interactionMemoryState = {};

    async function init() {
        try {
            await liff.init({ liffId: LIFF_ID });
            if (!liff.isLoggedIn()) { liff.login(); return; }
            var profile = await liff.getProfile();
            currentUserId = profile.userId;
            currentUserName = profile.displayName || "สมาชิก Fat Myth Bear";
            currentUserAvatar = profile.pictureUrl || currentUserAvatar;

            document.getElementById("user-top-avatar").src = currentUserAvatar;
            document.getElementById("current-user-post-avatar").src = currentUserAvatar;
            document.getElementById("user-top-name").textContent = currentUserName;

            await Promise.all([
                loadRealtimeProfile(),
                loadCommunityData()
            ]);

            document.getElementById("loading").style.display = "none";
            document.getElementById("app").style.display = "block";
        } catch (err) {
            console.error("Initialization Error:", err);
            // Fallback เพื่อให้ทดสอบหน้าร้านได้ราบรื่นแม้ไม่ได้รันบน LINE แอพตรงๆ
            renderRankCards("Gold");
            await loadCommunityData();
            document.getElementById("loading").style.display = "none";
            document.getElementById("app").style.display = "block";
        }
    }

    async function loadRealtimeProfile() {
        try {
            var { data, error } = await db
                .from("profiles")
                .select("*")
                .eq("line_user_id", currentUserId)
                .single();
            if (error) throw error;
            
            var tier = data.tier || 'Bronze';
            var formattedTier = tier.charAt(0).toUpperCase() + tier.slice(1).toLowerCase();
            
            document.getElementById("current-tier-text").textContent = "ระดับ: " + formattedTier;
            document.getElementById("db-points").textContent = (data.current_points || data.current_exp || 0).toLocaleString();
            
            var badgeEl = document.getElementById("db-rank-badge");
            badgeEl.textContent = formattedTier + " Member";
            badgeEl.className = "db-rank-label badge-" + formattedTier.toLowerCase();

            renderRankCards(formattedTier);
        } catch (e) { 
            console.error("Realtime fetch Error:", e);
            renderRankCards("Gold");
        }
    }

    function renderRankCards(currentTier) {
        var container = document.getElementById("rank-grid");
        container.innerHTML = "";

        TIER_DATA.forEach(function(tier) {
            var isActive = tier.id.toLowerCase() === currentTier.toLowerCase();
            
            var cardHtml = `
                <div class="rank-card rank-card-${tier.id.toLowerCase()} ${!isActive ? 'inactive-card' : ''}">
                    <div class="rank-header">
                        <div class="rank-name-container">
                            <div class="rank-badge">${tier.icon}</div>
                            <div>
                                <div class="rank-title">${tier.name}</div>
                                <div class="rank-range">${tier.range}</div>
                            </div>
                        </div>
                        ${isActive ? '<span class="status-badge current">ระดับปัจจุบัน</span>' : '<span class="status-badge">สิทธิ์สมาชิก</span>'}
                    </div>
                    <div class="perk-list">
                        ${tier.perks.map(p => '<div class="perk-item"><i class="fa-solid fa-check perk-dot"></i>' + p + '</div>').join('')}
                    </div>
                </div>`;
            
            container.innerHTML += cardHtml;
        });
    }

    // ดึงข้อมูลไทม์ไลน์ฟีดข้อมูลจริงจากระบบคลาวด์แยก 2 ตารางอย่างสมบูรณ์
    async function loadCommunityData() {
        try {
            var { data: promoData } = await db
                .from("news_promo")
                .select("*")
                .order("created_at", { ascending: false });
            
            var { data: reviewData } = await db
                .from("user_reviews")
                .select("*")
                .order("created_at", { ascending: false });

            renderPromoList(promoData);
            renderReviewList(reviewData);
        } catch (err) { 
            console.error(err); 
        }
    }

    function renderPromoList(data) {
        var container = document.getElementById("list-promo");
        if (!data || data.length === 0) {
            container.innerHTML = '<div class="empty-state"><i class="fa-solid fa-bullhorn"></i>ไม่มีโพสต์ข่าวโปรโมชั่นในขณะนี้</div>';
            return;
        }

        container.innerHTML = data.map(function(item) {
            var dateStr = new Date(item.created_at).toLocaleDateString("th-TH", { day: "numeric", month: "short", year: "2-digit" });
            var uniquePostId = "promo_" + item.id;
            
            // ตั้งค่าเริ่มต้นของ Local State
            if(!interactionMemoryState[uniquePostId]) {
                interactionMemoryState[uniquePostId] = { likes: Math.floor(Math.random()*10), hearts: Math.floor(Math.random()*5), liked: false, hearted: false, comments: [] };
            }
            var state = interactionMemoryState[uniquePostId];

            return `
                <div class="post-card">
                    <div class="post-header">
                        <div class="post-author">
                            <div class="post-avatar">🐻</div>
                            <span>${item.title || 'Fat Myth Bear Shop'}</span>
                        </div>
                        <div class="post-date">${dateStr}</div>
                    </div>
                    <div>
                        <div class="post-content">${item.content || ''}</div>
                        ${item.img_url ? `<div class="post-img-container"><img src="${item.img_url}" class="post-img"></div>` : ''}
                    </div>
                    
                    <div class="post-actions-bar">
                        <button class="action-btn ${state.liked ? 'active-like' : ''}" onclick="toggleLikeHeart('${uniquePostId}', 'like')">
                            <i class="fa-${state.liked?'solid':'regular'} fa-thumbs-up"></i> ถูกใจ (${state.likes})
                        </button>
                        <button class="action-btn ${state.hearted ? 'active-heart' : ''}" onclick="toggleLikeHeart('${uniquePostId}', 'heart')">
                            <i class="fa-${state.hearted?'solid':'regular'} fa-heart"></i> หัวใจ (${state.hearts})
                        </button>
                    </div>

                    <div class="comment-box-zone">
                        ${state.comments.map(c => `<div class="comment-item-row"><span class="comment-author-name">${c.name}:</span><span>${c.txt}</span></div>`).join('')}
                        <div class="comment-input-group">
                            <input type="text" class="comment-field" id="input-${uniquePostId}" placeholder="พิมพ์คอมเมนต์ตอบกลับ...">
                            <button class="comment-submit-btn" onclick="executePostComment('${uniquePostId}')">ส่ง</button>
                        </div>
                    </div>
                </div>`;
        }).join('');
    }

    function renderReviewList(data) {
        var container = document.getElementById("list-review");
        if (!data || data.length === 0) {
            container.innerHTML = '<div class="empty-state"><i class="fa-solid fa-star"></i>ไม่มีโพสต์รีวิวจากลูกค้าในขณะนี้</div>';
            return;
        }

        container.innerHTML = data.map(function(item) {
            var dateStr = new Date(item.created_at).toLocaleDateString("th-TH", { day: "numeric", month: "short", year: "2-digit" });
            var uniquePostId = "review_" + item.id;
            var currentRating = item.rating || 5;

            if(!interactionMemoryState[uniquePostId]) {
                interactionMemoryState[uniquePostId] = { likes: Math.floor(Math.random()*8), hearts: Math.floor(Math.random()*6), liked: false, hearted: false, comments: [] };
            }
            var state = interactionMemoryState[uniquePostId];

            return `
                <div class="post-card">
                    <div class="post-header">
                        <div class="post-author">
                            <img class="post-avatar" src="https://cdn-icons-png.flaticon.com/512/4343/4343510.png" alt="">
                            <span>คุณ ${item.user_nickname || 'ลูกค้าผู้ทรงเกียรติ'}</span>
                        </div>
                        <div class="post-date">${dateStr}</div>
                    </div>
                    <div>
                        <div class="review-rating">${'★'.repeat(currentRating)}${'☆'.repeat(5-currentRating)}</div>
                        <div class="post-content">${item.content || ''}</div>
                        ${item.img_url ? `<div class="post-img-container"><img src="${item.img_url}" class="post-img"></div>` : ''}
                    </div>

                    <div class="post-actions-bar">
                        <button class="action-btn ${state.liked ? 'active-like' : ''}" onclick="toggleLikeHeart('${uniquePostId}', 'like')">
                            <i class="fa-${state.liked?'solid':'regular'} fa-thumbs-up"></i> ถูกใจ (${state.likes})
                        </button>
                        <button class="action-btn ${state.hearted ? 'active-heart' : ''}" onclick="toggleLikeHeart('${uniquePostId}', 'heart')">
                            <i class="fa-${state.hearted?'solid':'regular'} fa-heart"></i> หัวใจ (${state.hearts})
                        </button>
                    </div>

                    <div class="comment-box-zone">
                        ${state.comments.map(c => `<div class="comment-item-row"><span class="comment-author-name">${c.name}:</span><span>${c.txt}</span></div>`).join('')}
                        <div class="comment-input-group">
                            <input type="text" class="comment-field" id="input-${uniquePostId}" placeholder="เขียนความคิดเห็น...">
                            <button class="comment-submit-btn" onclick="executePostComment('${uniquePostId}')">ส่ง</button>
                        </div>
                    </div>
                </div>`;
        }).join('');
    }

    function switchTab(status) {
        currentActiveTab = status;
        document.getElementById('btn-tab-promo').classList.remove('active');
        document.getElementById('btn-tab-review').classList.remove('active');
        document.getElementById('panel-promo').classList.remove('active');
        document.getElementById('panel-review').classList.remove('active');

        document.getElementById('btn-tab-' + status).classList.add('active');
        document.getElementById('panel-' + status).classList.add('active');

        var txtField = document.getElementById("community-post-text");
        var ratingZone = document.getElementById("review-rating-zone");

        if (status === "promo") {
            txtField.placeholder = "แชร์ข้อมูลโปรโมชั่นหน้าร้านวันนี้ที่นี่...";
            ratingZone.style.display = "none";
        } else {
            txtField.placeholder = "เขียนรีวิวความประทับใจบิงซูและบริการรสชาติวันนี้ของคุณ...";
            ratingZone.style.display = "flex";
        }
    }

    function openDeviceCamera() {
        document.getElementById("camera-file-input").click();
    }

    function processSelectedImage(event) {
        var file = event.target.files[0];
        if (!file) return;

        var reader = new FileReader();
        reader.onload = function(e) {
            encodedBase64ImageStr = e.target.result;
            document.getElementById("post-image-preview-img").src = encodedBase64ImageStr;
            document.getElementById("post-image-preview-box").style.display = "block";
        };
        reader.readAsDataURL(file);
    }

    function cancelSelectedImage() {
        encodedBase64ImageStr = "";
        document.getElementById("camera-file-input").value = "";
        document.getElementById("post-image-preview-box").style.display = "none";
        document.getElementById("post-image-preview-img").src = "";
    }

    function setPostRating(val) {
        selectedReviewRating = val;
        var stars = document.querySelectorAll("#star-picker-container i");
        stars.forEach(function(star, index) {
            if (index < val) {
                star.classList.add("active");
            } else {
                star.classList.remove("active");
            }
        });
    }

    // ฟังก์ชันยิงโพสต์บันทึกความปลอดภัยลงแต่ละตารางจริงแยกจากกันตามเงื่อนไขแท็บที่กำลังเปิดอยู่
    async function executePublishPost() {
        var textContent = document.getElementById("community-post-text").value.trim();
        if (!textContent && !encodedBase64ImageStr) {
            alert("กรุณาพิมพ์รายละเอียดข้อความ หรือเลือกรูปภาพก่อนกดส่งข้อมูลครับ");
            return;
        }

        var submitBtn = document.getElementById("btn-submit-post-trigger");
        submitBtn.disabled = true;
        submitBtn.textContent = "กำลังบันทึกลงคลาวด์...";

        try {
            if (currentActiveTab === "promo") {
                // บันทึกตรงลงตารางข่าวโปรโมชั่น
                var { error } = await db.from("news_promo").insert([
                    {
                        title: currentUserName, 
                        content: textContent,
                        img_url: encodedBase64ImageStr || null
                    }
                ]);
                if (error) throw error;
            } else {
                // บันทึกตรงลงตารางรีวิวลูกค้า
                var { error } = await db.from("user_reviews").insert([
                    {
                        user_nickname: currentUserName,
                        rating: selectedReviewRating,
                        content: textContent,
                        img_url: encodedBase64ImageStr || null
                    }
                ]);
                if (error) throw error;
            }

            // เคลียร์ฟอร์มเมื่อสำเร็จเรียบร้อย
            document.getElementById("community-post-text").value = "";
            cancelSelectedImage();
            setPostRating(5);
            
            // ดึงข้อมูล Real-time ชุดใหม่ล่าสุดขึ้นมาแสดงผลทันที โพสต์จะไม่หายไปเมื่อรีเฟรชหน้าจออีกต่อไป
            await loadCommunityData();
            alert("บันทึกโพสต์ของคุณแบบถาวรเสร็จสิ้นเรียบร้อยแล้วครับ!");

        } catch (err) {
            console.error("Database Insert Error:", err);
            alert("เกิดข้อผิดพลาดจากฐานข้อมูล: " + err.message);
        } finally {
            submitBtn.disabled = false;
            submitBtn.textContent = "ส่งโพสต์ลงตาราง";
        }
    }

    // ควบคุมระบบ Local Interaction (ถูกใจ/หัวใจ) 
    function toggleLikeHeart(postId, type) {
        var state = interactionMemoryState[postId];
        if (type === 'like') {
            state.liked = !state.liked;
            state.likes += state.liked ? 1 : -1;
        } else {
            state.hearted = !state.hearted;
            state.hearts += state.hearted ? 1 : -1;
        }
        refreshVisibleListsOnly();
    }

    // คอมเมนต์ตอบกลับ
    function executePostComment(postId) {
        var input = document.getElementById("input-" + postId);
        var val = input.value.trim();
        if (!val) return;

        interactionMemoryState[postId].comments.push({ name: currentUserName, txt: val });
        input.value = "";
        refreshVisibleListsOnly();
    }

    async function refreshVisibleListsOnly() {
        var { data: promoData } = await db.from("news_promo").select("*").order("created_at", { ascending: false });
        var { data: reviewData } = await db.from("user_reviews").select("*").order("created_at", { ascending: false });
        renderPromoList(promoData);
        renderReviewList(reviewData);
    }

    init();
</script>
</body>
</html>
