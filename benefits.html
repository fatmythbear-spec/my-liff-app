<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>คอมมูนิตี้ & สิทธิพิเศษ - Fat Myth Bear</title>
    <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <style>
        :root {
            --primary: #06c755;
            --bg-color: #f7f9fc;
            --gold: #bf953f;
            --silver: #bdc3c7;
            --bronze: #a8704c;
            --platinum: #30cfd0;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Kanit', sans-serif; background: var(--bg-color); color: #2d3748; min-height: 100vh; padding-bottom: 40px; }

        /* Loading Screen */
        #loading {
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            height: 100vh; gap: 12px; color: #718096; background: #ffffff;
        }
        .spinner { width: 40px; height: 40px; border: 4px solid #e2e8f0; border-top-color: var(--primary); border-radius: 50%; animation: spin 0.8s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }

        #app { display: none; padding: 16px; }

        /* Top Bar Dashboard */
        .top-dashboard {
            background: linear-gradient(135deg, #1a1a2e 0%, #2d3561 100%);
            border-radius: 20px; padding: 20px; color: white; margin-bottom: 24px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1); display: flex; justify-content: space-between; align-items: center;
        }
        .db-store-info { display: flex; align-items: center; gap: 12px; }
        .db-logo { width: 40px; }
        .db-name { font-weight: 600; font-size: 16px; }
        .db-sub { font-size: 12px; opacity: 0.8; }
        
        .db-rank-info { text-align: right; }
        .db-points { font-size: 24px; font-weight: 700; color: #ffca28; line-height: 1.2; }
        .db-rank-label { padding: 3px 10px; border-radius: 20px; font-size: 10px; font-weight: 600; }

        /* ========================================================
           LUXURY GLOSSY RANK CARDS (บัตรสิทธิพิเศษหรูหรา)
        ======================================================== */
        .section-header { font-size: 16px; font-weight: 600; color: #1a202c; margin-bottom: 16px; display: flex; align-items: center; gap: 8px; }
        .section-header i { color: #ff7043; }

        .rank-grid { display: flex; flex-direction: column; gap: 14px; margin-bottom: 24px; }
        
        .rank-card {
            border-radius: 20px; padding: 20px; color: white; position: relative; overflow: hidden;
            box-shadow: 0 8px 20px rgba(0,0,0,0.1); border: 1px solid rgba(255,255,255,0.05);
            transition: all 0.3s ease;
        }

        /* เอฟเฟกต์ความเงาแวววาวเมทัลลิก (glossy metallic shimmer animation) */
        .rank-card::before {
            content: ''; position: absolute; top: -50%; left: -50%; width: 200%; height: 200%;
            background: linear-gradient(45deg, rgba(255,255,255,0) 45%, rgba(255,255,255,0.2) 50%, rgba(255,255,255,0) 55%);
            transform: rotate(-45deg); animation: shine-metallic 6s infinite ease-in-out; pointer-events: none;
        }
        @keyframes shine-metallic {
            0% { transform: translate(-30%, -30%) rotate(-45deg); }
            20%, 100% { transform: translate(30%, 30%) rotate(-45deg); }
        }

        /* เมทัลลิกไล่ระดับสีตาม Rank จริง (Bronze, Silver, Gold, Platinum) */
        .rank-card-bronze { background: linear-gradient(135deg, #a8704c 0%, #dd9c74 50%, #895333 100%); }
        .rank-card-silver { background: linear-gradient(135deg, #bdc3c7 0%, #ecf0f1 50%, #95a5a6 100%); color: #2c3e50; }
        .rank-card-gold { background: linear-gradient(135deg, #bf953f 0%, #fcf6ba 25%, #b38728 50%, #fbf5b7 75%, #aa771c 100%); color: #4a3300; }
        .rank-card-platinum { background: linear-gradient(135deg, #30cfd0 0%, #330867 100%); }

        .rank-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; }
        .rank-name-container { display: flex; align-items: center; gap: 8px; }
        .rank-badge { font-size: 28px; width: 45px; height: 45px; border-radius: 12px; background: rgba(255,255,255,0.15); display: flex; align-items: center; justify-content: center; }
        .rank-title { font-size: 20px; font-weight: 700; }
        .rank-range { font-size: 11px; opacity: 0.8; }
        
        .status-badge { font-size: 10px; font-weight: 600; padding: 4px 10px; border-radius: 20px; background: rgba(255,255,255,0.2); }
        .status-badge.current { background: #ffca28; color: #4a3300; }

        .perk-list { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .perk-item { display: flex; align-items: center; gap: 8px; font-size: 12px; }
        .perk-dot { font-size: 12px; opacity: 0.7; }

        /* ========================================================
           COMMUNITY TIMELINE SYSTEM (ระบบคอมมูนิตี้ไทม์ไลน์)
        ======================================================= */
        .page-title { font-size: 22px; font-weight: 700; color: #1a202c; margin-bottom: 16px; display: flex; align-items: center; gap: 10px; }
        
        .tabs-container { display: flex; gap: 8px; margin-bottom: 20px; }
        .tab-btn {
            flex: 1; text-align: center; padding: 10px 4px; font-size: 13px; font-weight: 500;
            color: #4a5568; border: none; background: #e2e8f0; border-radius: 12px; cursor: pointer;
            transition: all 0.2s ease;
        }
        .tab-btn i { margin-right: 6px; }
        .tab-btn.active { background: var(--primary); color: #ffffff; font-weight: 600; box-shadow: 0 4px 12px rgba(6,199,85,0.25); }

        .community-panel { display: none; position: relative; padding-left: 20px; }
        .community-panel.active { display: block; }
        .community-panel::before { content: ''; position: absolute; left: 4px; top: 0; bottom: 0; width: 2px; background: #e2e8f0; }

        .post-card { background: white; border-radius: 16px; padding: 16px; margin-bottom: 16px; position: relative; }
        .post-card::before { content: ''; position: absolute; left: -20px; top: 12px; width: 10px; height: 10px; border-radius: 50%; background: #cbd5e0; border: 2px solid #ffffff; box-shadow: 0 0 0 2px #cbd5e0; }
        
        .post-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
        .post-author { display: flex; align-items: center; gap: 10px; font-size: 12px; }
        .post-avatar { width: 32px; height: 32px; border-radius: 50%; background: #edf2f7; display: flex; align-items: center; justify-content: center; font-weight: 600; color: #718096; }
        .post-date { font-size: 11px; color: #a0aec0; }
        
        .post-title { font-size: 15px; font-weight: 600; color: #1a202c; margin-bottom: 4px; }
        .post-content { font-size: 13px; color: #4a5568; line-height: 1.5; }
        
        .post-img-container { width: 100%; border-radius: 12px; margin-top: 10px; overflow: hidden; }
        .post-img { width: 100%; height: 150px; object-fit: cover; }
        
        .review-rating { color: #ffca28; font-size: 13px; margin-bottom: 6px; }

        .empty-state { text-align: center; padding: 40px; color: #a0aec0; font-size: 14px; }
        .empty-state i { font-size: 40px; margin-bottom: 10px; opacity: 0.5; }

        /* สไตล์สีเมื่อคูปองถูกใช้แล้ว/Inactive */
        .inactive-card .perk-dot { color: rgba(255,255,255,0.4); }
    </style>
</head>
<body>

<div id="loading">
    <div class="spinner"></div>
    <p>กำลังโหลดข้อมูลคอมมูนิตี้...</p>
</div>

<div id="app">
    <div class="top-dashboard">
        <div class="db-store-info">
            <img src="https://cdn-icons-png.flaticon.com/512/4343/4343510.png" class="db-logo" alt="">
            <div>
                <div class="db-name">Fat Myth Bear Bingsu</div>
                <div class="db-sub" id="current-tier-text">ระดับ: Gold</div>
            </div>
        </div>
        <div class="db-rank-info">
            <div class="db-points" id="db-points">3,420</div>
            <div id="db-rank-badge" class="db-rank-label">pts</div>
        </div>
    </div>

    <div class="section-header">
        <i class="fa-solid fa-gem"></i>
        <span>สิทธิพิเศษของคุณ</span>
    </div>
    
    <div class="rank-grid" id="rank-grid">
        </div>

    <div class="page-title">
        <i class="fa-solid fa-users"></i>
        <span>คอมมูนิตี้</span>
    </div>

    <div class="tabs-container">
        <button class="tab-btn active" onclick="switchTab('promo')">
            <i class="fa-solid fa-bullhorn"></i> โปรโมชั่น
        </button>
        <button class="tab-btn" onclick="switchTab('review')">
            <i class="fa-solid fa-star"></i> รีวิว
        </button>
    </div>

    <div id="panel-promo" class="community-panel active">
        <div id="list-promo"></div>
    </div>

    <div id="panel-review" class="community-panel">
        <div id="list-review"></div>
    </div>
</div>

<script>
    var LIFF_ID = "2010298031-prC3lMly"; // LIFF ID คงเดิมจากไฟล์หลักของคุณ
    var SUPABASE_URL = "https://iberkiyorordyculsjyu.supabase.co";
    var SUPABASE_KEY = "sb_publishable_f3Knp7KLRxfHiOJQXaXU1w_uylu5zov";
    var { createClient } = supabase;
    var db = createClient(SUPABASE_URL, SUPABASE_KEY);

    var currentUserId = "";

    // ข้อมูลระดับยศและสิทธิประโยชน์จำเพาะ (config ตามภาพตัวอย่าง)
    var TIER_DATA = [
        { id: 'Bronze', name: 'Bronze', range: '0 - 1000 EXP', icon: '🥉', perks: ['ส่วนลด 10% ในเดือนเกิด', 'สะสมแต้มทุกครั้งที่ซื้อ'] },
        { id: 'Silver', name: 'Silver', range: '1000 - 3000 EXP', icon: '🥈', perks: ['เครื่องดื่ม/ท็อปปิงฟรี 1 สิทธิ์ทุกเดือน', 'Early Access เมนูใหม่ก่อนใคร', 'ส่วนลด 5% ทุกบิล'] },
        { id: 'Gold', name: 'Gold', range: '3000 - 5000 EXP', icon: '🥇', perks: ['ส่วนลดถาวร 5% ทุกบิล', 'คูปองบิงซูฟรีรายไตรมาส', 'สิทธิ์ลดราคาในวันพิเศษ'] },
        { id: 'Platinum', name: 'Platinum', range: '5000+ EXP', icon: '💎', perks: ['ส่วนลดถาวร 10% ทุกบิล', 'สิทธิ์สำรองโต๊ะ VIP', 'คูปองของขวัญพิเศษประจำปี'] }
    ];

    async function init() {
        try {
            await liff.init({ liffId: LIFF_ID });
            if (!liff.isLoggedIn()) { liff.login(); return; }
            var profile = await liff.getProfile();
            currentUserId = profile.userId;

            // โหลดข้อมูลโปรไฟล์ (ระดับแรงค์และคะแนน Real-time) และคอมมูนิตี้
            await Promise.all([
                loadRealtimeProfile(),
                loadCommunityData()
            ]);

            document.getElementById("loading").style.display = "none";
            document.getElementById("app").style.display = "block";
        } catch (err) {
            console.error("Initialization Error:", err);
            document.getElementById("loading").innerHTML = '<p style="color:red; padding:20px;">เกิดข้อผิดพลาดในการโหลดระบบคอมมูนิตี้</p>';
        }
    }

    // ฟังก์ชันดึงโปรไฟล์และ EXP/Points Real-time มาสลักบนแดชบอร์ดด้านบนสุด
    async function loadRealtimeProfile() {
        try {
            var { data, error } = await db
                .from("profiles")
                .select("*")
                .eq("line_user_id", currentUserId)
                .single();
            if (error) throw error;
            
            var tier = data.tier || 'Bronze';
            document.getElementById("current-tier-text").textContent = "ระดับ: " + tier;
            document.getElementById("db-points").textContent = (data.current_points || 0).toLocaleString();
            
            // ปรับสี Badge ฝั่งขวาบนตามแรงค์
            var badgeEl = document.getElementById("db-rank-badge");
            badgeEl.textContent = tier + " Member";
            badgeEl.className = "db-rank-label badge-" + tier.toLowerCase();

            // เรนเดอร์การ์ดสิทธิพิเศษตามลำดับแรงค์จริง
            renderRankCards(tier);

        } catch (e) { console.error("Realtime fetch Error:", e); }
    }

    // ฟังก์ชันเรนเดอร์การ์ดสิทธิพิเศษตามลำดับยศหรูหราแบบ real-time
    function renderRankCards(currentTier) {
        var container = document.getElementById("rank-grid");
        container.innerHTML = "";

        TIER_DATA.forEach(function(tier) {
            var isActive = tier.id === currentTier;
            
            htmlAvailable = `
                <div class="rank-card rank-card-${tier.id.toLowerCase()} ${!isActive ? 'inactive-card' : ''}">
                    <div class="rank-header">
                        <div class="rank-name-container">
                            <div class="rank-badge">${tier.icon}</div>
                            <div>
                                <div class="rank-title">${tier.name}</div>
                                <div class="rank-range">${tier.range}</div>
                            </div>
                        </div>
                        ${isActive ? '<span class="status-badge current">ระดับปัจจุบัน</span>' : '<span class="status-badge">ปลดล็อกแล้ว</span>'}
                    </div>
                    <div class="perk-list">
                        ${tier.perks.map(p => '<div class="perk-item"><i class="fa-solid fa-check perk-dot"></i>' + p + '</div>').join('')}
                    </div>
                </div>`;
            
            container.innerHTML += htmlAvailable;
        });
    }

    // ฟังก์ชันดึงและเรนเดอร์ข้อมูลแยกข่าวสารและรีวิว
    async function loadCommunityData() {
        try {
            // โหลดข่าวสารโปรโมชั่น (สมมติว่าดึงจากฐานข้อมูล "news_promo")
            var { data: promoData, error: promoError } = await db
                .from("news_promo")
                .select("*")
                .order("created_at", { ascending: false })
                .limit(10);
            
            // โหลดรีวิวลูกค้า (สมมติว่าดึงจากฐานข้อมูล "user_reviews")
            var { data: reviewData, error: reviewError } = await db
                .from("user_reviews")
                .select("*")
                .order("created_at", { ascending: false })
                .limit(10);

            renderPromoList(promoData);
            renderReviewList(reviewData);

        } catch (err) { console.error(err); }
    }

    // เรนเดอร์ข่าวสารโปรโมชั่นจากทางร้าน
    function renderPromoList(data) {
        var container = document.getElementById("list-promo");
        if (!data || data.length === 0) {
            container.innerHTML = '<div class="empty-state"><i class="fa-solid fa-bullhorn"></i>ไม่มีข่าวสารในขณะนี้</div>';
            return;
        }

        container.innerHTML = data.map(function(item) {
            var dateStr = new Date(item.created_at).toLocaleDateString("th-TH", { day: "numeric", month: "short", year: "2-digit" });
            return `
                <div class="post-card">
                    <div class="post-header">
                        <div class="post-author">
                            <div class="post-avatar">🐻</div>
                            <span>Fat Myth Bear Shop</span>
                        </div>
                        <div class="post-date">${dateStr}</div>
                    </div>
                    <div>
                        <div class="post-title">${item.title || 'ประกาศจากทางร้าน'}</div>
                        <div class="post-content">${item.content || 'ข้อมูลประกาศทางร้าน'}</div>
                        ${item.img_url ? `<div class="post-img-container"><img src="${item.img_url}" class="post-img"></div>` : ''}
                    </div>
                </div>`;
        }).join('');
    }

    // เรนเดอร์รีวิวลูกค้าจากทางบ้าน
    function renderReviewList(data) {
        var container = document.getElementById("list-review");
        if (!data || data.length === 0) {
            container.innerHTML = '<div class="empty-state"><i class="fa-solid fa-star"></i>ยังไม่มีรีวิวในขณะนี้</div>';
            return;
        }

        container.innerHTML = data.map(function(item) {
            var dateStr = new Date(item.created_at).toLocaleDateString("th-TH", { day: "numeric", month: "short", year: "2-digit" });
            
            return `
                <div class="post-card">
                    <div class="post-header">
                        <div class="post-author">
                            <div class="post-avatar">👤</div>
                            <span>คุณ${item.user_nickname || 'สมาชิกผู้ทรงเกียรติ'}</span>
                        </div>
                        <div class="post-date">${dateStr}</div>
                    </div>
                    <div>
                        <div class="review-rating">${'★'.repeat(item.rating)}${'☆'.repeat(5-item.rating)}</div>
                        <div class="post-content">${item.content || 'ความคิดเห็นเพิ่มเติม'}</div>
                        ${item.img_url ? `<div class="post-img-container"><img src="${item.img_url}" class="post-img"></div>` : ''}
                    </div>
                </div>`;
        }).join('');
    }

    // ฟังก์ชันสลับเมนูหน้าต่างแท็บคอมมูนิตี้
    function switchTab(status) {
        var buttons = document.querySelectorAll('.tab-btn');
        buttons.forEach(b => b.classList.remove('active'));
        
        var panels = document.querySelectorAll('.community-panel');
        panels.forEach(p => p.classList.remove('active'));

        // คืนค่าความ Active ให้กับเป้าหมายที่ถูกคลิกเข้ามาใหม่
        event.currentTarget.classList.add('active');
        document.getElementById('panel-' + status).classList.add('active');
    }

    init();
</script>
</body>
</html>
