<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard - Fat Myth Bear</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Kanit', sans-serif; background: #f0f0f0; padding: 20px; }

        .header {
            background: #1a1a2e; color: white;
            border-radius: 16px; padding: 20px 24px;
            margin-bottom: 20px;
            display: flex; justify-content: space-between; align-items: center;
        }
        .header-title { font-size: 20px; font-weight: 700; }
        .header-sub   { font-size: 13px; opacity: 0.6; margin-top: 2px; }
        .admin-badge  { background: #e74c3c; color: white; padding: 4px 14px; border-radius: 99px; font-size: 13px; }

        /* Stats Row */
        .stats-row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; margin-bottom: 20px; }
        .stat-card {
            background: white; border-radius: 14px; padding: 16px 20px; text-align: center;
        }
        .stat-label { font-size: 12px; color: #999; margin-bottom: 6px; }
        .stat-val   { font-size: 26px; font-weight: 700; color: #1a1a2e; }
        .stat-val.bronze  { color: #cd7f32; }
        .stat-val.silver  { color: #a8a9ad; }
        .stat-val.gold    { color: #daa520; }
        .stat-val.platinum{ color: #667eea; }

        /* Toolbar */
        .toolbar {
            background: white; border-radius: 14px; padding: 16px 20px;
            margin-bottom: 16px; display: flex; gap: 10px; flex-wrap: wrap; align-items: center;
        }
        input[type="text"] {
            padding: 9px 14px; border: 1px solid #ddd; border-radius: 8px;
            font-size: 14px; flex: 1; min-width: 200px; outline: none;
        }
        input[type="text"]:focus { border-color: #06c755; }
        select {
            padding: 9px 14px; border: 1px solid #ddd; border-radius: 8px;
            font-size: 14px; background: white; cursor: pointer;
        }
        .btn {
            padding: 9px 18px; border: none; border-radius: 8px;
            font-size: 14px; cursor: pointer; font-weight: 600;
        }
        .btn-export { background: #27ae60; color: white; }
        .btn-export:hover { background: #219150; }

        /* Table */
        .table-wrap { background: white; border-radius: 14px; overflow: hidden; }
        table { width: 100%; border-collapse: collapse; }
        th {
            background: #f8f8f8; padding: 12px 16px; text-align: left;
            font-size: 13px; color: #666; border-bottom: 1px solid #eee;
        }
        td { padding: 12px 16px; font-size: 14px; border-bottom: 1px solid #f0f0f0; color: #333; }
        tr:last-child td { border-bottom: none; }
        tr:hover td { background: #fafafa; }

        .tier-badge {
            display: inline-block; padding: 3px 10px;
            border-radius: 99px; font-size: 12px; font-weight: 600;
        }
        .tier-Bronze   { background: #cd7f3220; color: #a0522d; }
        .tier-Silver   { background: #a8a9ad20; color: #666; }
        .tier-Gold     { background: #ffd70025; color: #b8860b; }
        .tier-Platinum { background: #667eea20; color: #534AB7; }

        .role-badge {
            display: inline-block; padding: 3px 10px;
            border-radius: 99px; font-size: 12px;
        }
        .role-Customer { background: #e8f5e9; color: #2e7d32; }
        .role-Staff    { background: #e3f2fd; color: #1565c0; }
        .role-Admin    { background: #fce4ec; color: #c62828; }

        .btn-delete {
            background: #fce4ec; color: #c62828;
            border: none; padding: 5px 12px; border-radius: 6px;
            font-size: 12px; cursor: pointer;
        }
        .btn-delete:hover { background: #e74c3c; color: white; }

        .btn-role {
            background: #e3f2fd; color: #1565c0;
            border: none; padding: 5px 12px; border-radius: 6px;
            font-size: 12px; cursor: pointer; margin-right: 4px;
        }
        .btn-role:hover { background: #1565c0; color: white; }

        .no-data { padding: 40px; text-align: center; color: #aaa; }

        /* Tab */
        .tabs { display: flex; gap: 8px; margin-bottom: 16px; }
        .tab-btn {
            padding: 9px 20px; border: none; border-radius: 8px;
            font-size: 14px; cursor: pointer; background: white; color: #666;
        }
        .tab-btn.active { background: #1a1a2e; color: white; }

        /* Transaction Table */
        .tx-earn   { color: #27ae60; font-weight: 600; }
        .tx-redeem { color: #e74c3c; font-weight: 600; }
    </style>
</head>
<body>

<div class="header">
    <div>
        <div class="header-title">Admin Dashboard</div>
        <div class="header-sub">Fat Myth Bear Loyalty System</div>
    </div>
    <span class="admin-badge">ADMIN</span>
</div>

<!-- Stats -->
<div class="stats-row">
    <div class="stat-card">
        <div class="stat-label">สมาชิกทั้งหมด</div>
        <div class="stat-val" id="stat-total">-</div>
    </div>
    <div class="stat-card">
        <div class="stat-label">Bronze</div>
        <div class="stat-val bronze" id="stat-bronze">-</div>
    </div>
    <div class="stat-card">
        <div class="stat-label">Silver</div>
        <div class="stat-val silver" id="stat-silver">-</div>
    </div>
    <div class="stat-card">
        <div class="stat-label">Gold+</div>
        <div class="stat-val gold" id="stat-gold">-</div>
    </div>
</div>

<!-- Tabs -->
<div class="tabs">
    <button class="tab-btn active" onclick="switchTab('members')">สมาชิก</button>
    <button class="tab-btn" onclick="switchTab('transactions')">ประวัติแต้ม</button>
</div>

<!-- Members Tab -->
<div id="tab-members">
    <div class="toolbar">
        <input type="text" id="search-input" placeholder="🔍 ค้นหาชื่อสมาชิก..." oninput="filterMembers()" />
        <select id="tier-filter" onchange="filterMembers()">
            <option value="">ทุก Tier</option>
            <option value="Bronze">Bronze</option>
            <option value="Silver">Silver</option>
            <option value="Gold">Gold</option>
            <option value="Platinum">Platinum</option>
        </select>
        <button class="btn btn-export" onclick="exportCSV()">📥 Export CSV</button>
    </div>

    <div class="table-wrap">
        <table>
            <thead>
                <tr>
                    <th>ชื่อ-นามสกุล</th>
                    <th>เบอร์โทร</th>
                    <th>ระดับ</th>
                    <th>แต้ม</th>
                    <th>EXP</th>
                    <th>สิทธิ์</th>
                    <th>จัดการ</th>
                </tr>
            </thead>
            <tbody id="member-list"></tbody>
        </table>
    </div>
</div>

<!-- Transactions Tab -->
<div id="tab-transactions" style="display:none;">
    <div class="table-wrap">
        <table>
            <thead>
                <tr>
                    <th>ชื่อสมาชิก</th>
                    <th>ประเภท</th>
                    <th>แต้ม</th>
                    <th>รายละเอียด</th>
                    <th>วันที่</th>
                </tr>
            </thead>
            <tbody id="tx-list"></tbody>
        </table>
    </div>
</div>

<script>
    const SUPABASE_URL = "https://iberkiyorordyculsjyu.supabase.co";
    const SUPABASE_KEY = "sb_publishable_f3Knp7KLRxfHiOJQXaXU1w_uylu5zov";
    const { createClient } = supabase;
    const db = createClient(SUPABASE_URL, SUPABASE_KEY);

    let allMembers = [];

    // ── Tabs ──
    function switchTab(tab) {
        document.getElementById("tab-members").style.display      = tab === "members" ? "block" : "none";
        document.getElementById("tab-transactions").style.display = tab === "transactions" ? "block" : "none";
        document.querySelectorAll(".tab-btn").forEach((b, i) => {
            b.classList.toggle("active", (i === 0 && tab === "members") || (i === 1 && tab === "transactions"));
        });
        if (tab === "transactions") fetchTransactions();
    }

    // ── Fetch Members ──
    async function fetchMembers() {
        const { data, error } = await db
            .from("profiles")
            .select("line_user_id, full_name, tel, role, current_points, current_exp, tier")
            .order("current_exp", { ascending: false });

        if (error) { console.error(error); return; }
        allMembers = data || [];

        // Stats
        document.getElementById("stat-total").textContent  = allMembers.length;
        document.getElementById("stat-bronze").textContent = allMembers.filter(m => m.tier === "Bronze").length;
        document.getElementById("stat-silver").textContent = allMembers.filter(m => m.tier === "Silver").length;
        document.getElementById("stat-gold").textContent   = allMembers.filter(m => m.tier === "Gold" || m.tier === "Platinum").length;

        renderMembers(allMembers);
    }

    // ── Render Members ──
    function renderMembers(members) {
        const list = document.getElementById("member-list");
        if (!members.length) {
            list.innerHTML = `<tr><td colspan="7" class="no-data">ไม่พบข้อมูลสมาชิก</td></tr>`;
            return;
        }
        list.innerHTML = members.map(m => `
            <tr id="row-${m.line_user_id}">
                <td>${m.full_name || '-'}</td>
                <td>${m.tel || '-'}</td>
                <td><span class="tier-badge tier-${m.tier}">${m.tier}</span></td>
                <td>${(m.current_points || 0).toLocaleString()}</td>
                <td>${(m.current_exp || 0).toLocaleString()}</td>
                <td><span class="role-badge role-${m.role}">${m.role}</span></td>
                <td>
                    <button class="btn-role" onclick="changeRole('${m.line_user_id}', '${m.role}')">เปลี่ยนสิทธิ์</button>
                    <button class="btn-delete" onclick="deleteMember('${m.line_user_id}', '${m.full_name}')">ลบ</button>
                </td>
            </tr>
        `).join("");
    }

    // ── Filter ──
    function filterMembers() {
        const keyword = document.getElementById("search-input").value.toLowerCase();
        const tier    = document.getElementById("tier-filter").value;
        const filtered = allMembers.filter(m =>
            (m.full_name || "").toLowerCase().includes(keyword) &&
            (tier === "" || m.tier === tier)
        );
        renderMembers(filtered);
    }

    // ── Change Role ──
    async function changeRole(lineUserId, currentRole) {
        const roles   = ["Customer", "Staff", "Admin"];
        const next    = roles[(roles.indexOf(currentRole) + 1) % roles.length];
        if (!confirm(`เปลี่ยนสิทธิ์เป็น "${next}" ใช่ไหม?`)) return;

        const { error } = await db
            .from("profiles")
            .update({ role: next })
            .eq("line_user_id", lineUserId);

        if (error) { alert("เกิดข้อผิดพลาด: " + error.message); return; }
        allMembers = allMembers.map(m => m.line_user_id === lineUserId ? { ...m, role: next } : m);
        renderMembers(allMembers);
    }

    // ── Delete ──
    async function deleteMember(lineUserId, name) {
        if (!confirm(`ยืนยันลบ "${name}" ออกจากระบบ?`)) return;
        const { error } = await db.from("profiles").delete().eq("line_user_id", lineUserId);
        if (error) { alert("ลบไม่สำเร็จ: " + error.message); return; }
        allMembers = allMembers.filter(m => m.line_user_id !== lineUserId);
        fetchMembers();
    }

    // ── Transactions ──
    async function fetchTransactions() {
        const { data, error } = await db
            .from("point_transactions")
            .select("line_user_id, points, type, description, created_at")
            .order("created_at", { ascending: false })
            .limit(100);

        if (error) { console.error(error); return; }

        // หาชื่อสมาชิก
        const memberMap = {};
        allMembers.forEach(m => memberMap[m.line_user_id] = m.full_name);

        const list = document.getElementById("tx-list");
        if (!data.length) {
            list.innerHTML = `<tr><td colspan="5" class="no-data">ยังไม่มีประวัติแต้ม</td></tr>`;
            return;
        }

        list.innerHTML = data.map(tx => {
            const date = new Date(tx.created_at).toLocaleString("th-TH");
            const cls  = tx.type === "earn" ? "tx-earn" : "tx-redeem";
            const sign = tx.type === "earn" ? "+" : "-";
            return `<tr>
                <td>${memberMap[tx.line_user_id] || tx.line_user_id.slice(-8)}</td>
                <td>${tx.type === "earn" ? "รับแต้ม" : "ใช้แต้ม"}</td>
                <td class="${cls}">${sign}${tx.points}</td>
                <td>${tx.description || "-"}</td>
                <td>${date}</td>
            </tr>`;
        }).join("");
    }

    // ── Export CSV ──
    function exportCSV() {
        if (!allMembers.length) { alert("ไม่มีข้อมูล"); return; }
        const header = "ชื่อ-นามสกุล,เบอร์โทร,ระดับ,แต้ม,EXP,สิทธิ์";
        const rows = allMembers.map(m =>
            `"${m.full_name || ""}","${m.tel || ""}","${m.tier}","${m.current_points}","${m.current_exp}","${m.role}"`
        );
        const csv  = "\uFEFF" + header + "\n" + rows.join("\n");
        const blob = new Blob([csv], { type: "text/csv;charset=utf-8;" });
        const url  = URL.createObjectURL(blob);
        const a    = document.createElement("a");
        a.href = url; a.download = "members_fatmythbear.csv"; a.click();
        URL.revokeObjectURL(url);
    }

    fetchMembers();
</script>
</body>
</html>
