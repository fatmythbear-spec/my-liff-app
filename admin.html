<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard - Fat Myth Bear</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Kanit', sans-serif; background: #f0f0f0; padding: 20px; }

        .header {
            background: #1a1a2e; color: white;
            border-radius: 16px; padding: 20px 24px;
            margin-bottom: 20px;
            display: flex; justify-content: space-between; align-items: center;
        }
        .header-title { font-size: 20px; font-weight: 700; }
        .header-sub   { font-size: 12px; opacity: 0.6; margin-top: 2px; }

        /* Stats */
        .stats-grid {
            display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 12px; margin-bottom: 20px;
        }
        .stat-card {
            background: white; border-radius: 12px; padding: 16px; text-align: center;
        }
        .stat-val   { font-size: 28px; font-weight: 700; color: #1a1a2e; }
        .stat-label { font-size: 12px; color: #999; margin-top: 4px; }

        /* Toolbar */
        .toolbar {
            background: white; border-radius: 12px; padding: 14px 16px;
            margin-bottom: 16px;
            display: flex; gap: 10px; flex-wrap: wrap; align-items: center;
        }
        input[type="text"] {
            flex: 1; min-width: 200px; padding: 8px 12px;
            border: 1px solid #ddd; border-radius: 8px; font-size: 14px;
        }
        select {
            padding: 8px 12px; border: 1px solid #ddd;
            border-radius: 8px; font-size: 14px; background: white;
        }
        .btn {
            padding: 8px 16px; border: none; border-radius: 8px;
            font-size: 14px; cursor: pointer; font-weight: 600;
        }
        .btn-green  { background: #06c755; color: white; }
        .btn-dark   { background: #1a1a2e; color: white; }

        /* Table */
        .table-wrap { background: white; border-radius: 12px; overflow: hidden; }
        table { width: 100%; border-collapse: collapse; }
        th {
            background: #f8f8f8; padding: 12px 14px;
            text-align: left; font-size: 13px; color: #666;
            border-bottom: 1px solid #eee;
        }
        td { padding: 12px 14px; font-size: 13px; border-bottom: 1px solid #f0f0f0; }
        tr:last-child td { border-bottom: none; }
        tr:hover td { background: #fafafa; }

        .tier-badge {
            display: inline-block; padding: 2px 10px;
            border-radius: 99px; font-size: 11px; font-weight: 700;
        }
        .tier-Bronze   { background: #cd7f3220; color: #a0522d; }
        .tier-Silver   { background: #a8a9ad20; color: #555; }
        .tier-Gold     { background: #ffd70030; color: #b8860b; }
        .tier-Platinum { background: #667eea20; color: #534AB7; }

        .btn-tx {
            padding: 4px 10px; font-size: 11px; border: none;
            border-radius: 6px; background: #f0f0f0; cursor: pointer;
        }
        .btn-tx:hover { background: #e0e0e0; }
        .btn-del {
            padding: 4px 10px; font-size: 11px; border: none;
            border-radius: 6px; background: #ffe0e0; color: #c0392b; cursor: pointer;
        }
        .btn-del:hover { background: #ffcccc; }

        /* Modal */
        .modal-overlay {
            display: none; position: fixed; inset: 0;
            background: rgba(0,0,0,0.5); z-index: 999;
            align-items: center; justify-content: center;
        }
        .modal-overlay.show { display: flex; }
        .modal-box {
            background: white; border-radius: 16px;
            padding: 24px; width: 90%; max-width: 560px;
            max-height: 80vh; overflow-y: auto;
        }
        .modal-title {
            font-size: 16px; font-weight: 700; margin-bottom: 16px;
            display: flex; justify-content: space-between; align-items: center;
        }
        .modal-close {
            background: none; border: none; font-size: 20px;
            cursor: pointer; color: #999;
        }

        .tx-item {
            display: flex; justify-content: space-between; align-items: center;
            padding: 10px 0; border-bottom: 1px solid #f0f0f0; font-size: 13px;
        }
        .tx-item:last-child { border-bottom: none; }
        .tx-earn   { color: #06c755; font-weight: 700; }
        .tx-redeem { color: #e74c3c; font-weight: 700; }

        .empty { text-align: center; color: #999; padding: 30px; font-size: 14px; }
    </style>
</head>
<body>

<div class="header">
    <div>
        <div class="header-title">Admin Dashboard</div>
        <div class="header-sub">Fat Myth Bear Loyalty System</div>
    </div>
    <button class="btn btn-green" onclick="exportCSV()">📥 Export CSV</button>
</div>

<!-- Stats -->
<div class="stats-grid">
    <div class="stat-card">
        <div class="stat-val" id="stat-total">-</div>
        <div class="stat-label">สมาชิกทั้งหมด</div>
    </div>
    <div class="stat-card">
        <div class="stat-val" style="color:#cd7f32" id="stat-bronze">-</div>
        <div class="stat-label">Bronze</div>
    </div>
    <div class="stat-card">
        <div class="stat-val" style="color:#888" id="stat-silver">-</div>
        <div class="stat-label">Silver</div>
    </div>
    <div class="stat-card">
        <div class="stat-val" style="color:#b8860b" id="stat-gold">-</div>
        <div class="stat-label">Gold</div>
    </div>
    <div class="stat-card">
        <div class="stat-val" style="color:#534AB7" id="stat-platinum">-</div>
        <div class="stat-label">Platinum</div>
    </div>
</div>

<!-- Toolbar -->
<div class="toolbar">
    <input type="text" id="search-input" placeholder="🔍 ค้นหาชื่อสมาชิก..." oninput="filterMembers()">
    <select id="tier-filter" onchange="filterMembers()">
        <option value="">ทุก Tier</option>
        <option value="Bronze">Bronze</option>
        <option value="Silver">Silver</option>
        <option value="Gold">Gold</option>
        <option value="Platinum">Platinum</option>
    </select>
    <button class="btn btn-dark" onclick="runTierUpdate()">🔄 อัปเดต Tier ทั้งหมด</button>
</div>

<!-- Table -->
<div class="table-wrap">
    <table>
        <thead>
            <tr>
                <th>#</th>
                <th>ชื่อ-นามสกุล</th>
                <th>เบอร์โทร</th>
                <th>Tier</th>
                <th>แต้ม</th>
                <th>EXP</th>
                <th>สิทธิ์</th>
                <th>จัดการ</th>
            </tr>
        </thead>
        <tbody id="member-list"></tbody>
    </table>
</div>

<!-- Transaction Modal -->
<div class="modal-overlay" id="tx-modal">
    <div class="modal-box">
        <div class="modal-title">
            <span id="tx-modal-title">ประวัติแต้ม</span>
            <button class="modal-close" onclick="closeTxModal()">✕</button>
        </div>
        <div id="tx-list"></div>
    </div>
</div>

<script>
    const SUPABASE_URL = "https://iberkiyorordyculsjyu.supabase.co";
    const SUPABASE_KEY = "sb_publishable_f3Knp7KLRxfHiOJQXaXU1w_uylu5zov";
    const { createClient } = supabase;
    const db = createClient(SUPABASE_URL, SUPABASE_KEY);

    let allMembers = [];

    // ── โหลดข้อมูล ──
    async function fetchMembers() {
        document.getElementById("member-list").innerHTML =
            `<tr><td colspan="8" class="empty">กำลังโหลด...</td></tr>`;
        try {
            const { data, error } = await db
                .from("profiles")
                .select("line_user_id, full_name, tel, role, current_points, current_exp, tier")
                .order("current_exp", { ascending: false });

            if (error) throw error;
            allMembers = data || [];
            renderStats(allMembers);
            renderTable(allMembers);
        } catch (err) {
            document.getElementById("member-list").innerHTML =
                `<tr><td colspan="8" class="empty">เกิดข้อผิดพลาด: ${err.message}</td></tr>`;
        }
    }

    // ── Stats ──
    function renderStats(members) {
        document.getElementById("stat-total").textContent    = members.length;
        document.getElementById("stat-bronze").textContent   = members.filter(m => m.tier === "Bronze").length;
        document.getElementById("stat-silver").textContent   = members.filter(m => m.tier === "Silver").length;
        document.getElementById("stat-gold").textContent     = members.filter(m => m.tier === "Gold").length;
        document.getElementById("stat-platinum").textContent = members.filter(m => m.tier === "Platinum").length;
    }

    // ── Table ──
    function renderTable(members) {
        const list = document.getElementById("member-list");
        if (members.length === 0) {
            list.innerHTML = `<tr><td colspan="8" class="empty">ไม่พบข้อมูลสมาชิก</td></tr>`;
            return;
        }
        list.innerHTML = members.map((m, i) => `
            <tr>
                <td style="color:#999">${i + 1}</td>
                <td style="font-weight:600">${m.full_name || '-'}</td>
                <td>${m.tel || '-'}</td>
                <td><span class="tier-badge tier-${m.tier}">${m.tier}</span></td>
                <td style="font-weight:700;color:#06c755">${(m.current_points || 0).toLocaleString()}</td>
                <td style="color:#534AB7">${(m.current_exp || 0).toLocaleString()}</td>
                <td>
                    <select onchange="changeRole('${m.line_user_id}', this.value)"
                        style="padding:4px 8px;border:1px solid #ddd;border-radius:6px;font-size:12px;">
                        <option ${m.role === 'Customer' ? 'selected' : ''}>Customer</option>
                        <option ${m.role === 'Staff'    ? 'selected' : ''}>Staff</option>
                        <option ${m.role === 'Admin'    ? 'selected' : ''}>Admin</option>
                    </select>
                </td>
                <td style="display:flex;gap:6px;">
                    <button class="btn-tx" onclick="showTx('${m.line_user_id}','${m.full_name}')">📜 ประวัติ</button>
                    <button class="btn-del" onclick="deleteMember('${m.line_user_id}','${m.full_name}')">🗑️</button>
                </td>
            </tr>
        `).join("");
    }

    // ── Filter ──
    function filterMembers() {
        const keyword = document.getElementById("search-input").value.toLowerCase();
        const tier    = document.getElementById("tier-filter").value;
        const filtered = allMembers.filter(m =>
            (m.full_name || "").toLowerCase().includes(keyword) &&
            (tier === "" || m.tier === tier)
        );
        renderTable(filtered);
    }

    // ── Change Role ──
    async function changeRole(lineUserId, newRole) {
        const { error } = await db
            .from("profiles")
            .update({ role: newRole })
            .eq("line_user_id", lineUserId);
        if (error) alert("เปลี่ยนสิทธิ์ไม่สำเร็จ: " + error.message);
        else allMembers.find(m => m.line_user_id === lineUserId).role = newRole;
    }

    // ── Delete ──
    async function deleteMember(lineUserId, name) {
        if (!confirm(`ยืนยันลบ "${name}" ออกจากระบบ?`)) return;
        const { error } = await db
            .from("profiles").delete().eq("line_user_id", lineUserId);
        if (error) alert("ลบไม่สำเร็จ: " + error.message);
        else {
            allMembers = allMembers.filter(m => m.line_user_id !== lineUserId);
            renderStats(allMembers);
            renderTable(allMembers);
        }
    }

    // ── Transactions Modal ──
    async function showTx(lineUserId, name) {
        document.getElementById("tx-modal-title").textContent = `ประวัติแต้ม: ${name}`;
        document.getElementById("tx-list").innerHTML = "<p class='empty'>กำลังโหลด...</p>";
        document.getElementById("tx-modal").classList.add("show");

        const { data, error } = await db
            .from("point_transactions")
            .select("type, points, description, created_at")
            .eq("line_user_id", lineUserId)
            .order("created_at", { ascending: false })
            .limit(50);

        if (error || !data || data.length === 0) {
            document.getElementById("tx-list").innerHTML = "<p class='empty'>ยังไม่มีประวัติ</p>";
            return;
        }

        document.getElementById("tx-list").innerHTML = data.map(tx => {
            const date = new Date(tx.created_at).toLocaleDateString("th-TH", {
                day: "numeric", month: "short", year: "numeric",
                hour: "2-digit", minute: "2-digit"
            });
            const isEarn = tx.type === "earn";
            return `<div class="tx-item">
                <div>
                    <div style="font-weight:600">${tx.description || "-"}</div>
                    <div style="color:#999;font-size:11px">${date}</div>
                </div>
                <span class="${isEarn ? 'tx-earn' : 'tx-redeem'}">
                    ${isEarn ? "+" : "-"}${tx.points} แต้ม
                </span>
            </div>`;
        }).join("");
    }

    function closeTxModal() {
        document.getElementById("tx-modal").classList.remove("show");
    }

    // ── Tier Update (Manual Cron) ──
    async function runTierUpdate() {
        if (!confirm("อัปเดต Tier สมาชิกทุกคนตาม EXP ปัจจุบัน?")) return;
        let updated = 0;
        for (const m of allMembers) {
            const newTier = calcTier(m.current_exp || 0);
            if (newTier !== m.tier) {
                await db.from("profiles")
                    .update({ tier: newTier })
                    .eq("line_user_id", m.line_user_id);
                m.tier = newTier;
                updated++;
            }
        }
        renderStats(allMembers);
        renderTable(allMembers);
        alert(`อัปเดตสำเร็จ! เปลี่ยน Tier ${updated} คน`);
    }

    function calcTier(exp) {
        if (exp >= 5000) return "Platinum";
        if (exp >= 3000) return "Gold";
        if (exp >= 1000) return "Silver";
        return "Bronze";
    }

    // ── Export CSV ──
    function exportCSV() {
        if (allMembers.length === 0) { alert("ไม่มีข้อมูล"); return; }
        const header = "ชื่อ-นามสกุล,เบอร์โทร,Tier,แต้ม,EXP,สิทธิ์";
        const rows = allMembers.map(m =>
            `"${m.full_name}","${m.tel}","${m.tier}","${m.current_points}","${m.current_exp}","${m.role}"`
        );
        const csv = "\uFEFF" + header + "\n" + rows.join("\n");
        const blob = new Blob([csv], { type: "text/csv;charset=utf-8;" });
        const url  = URL.createObjectURL(blob);
        const a    = document.createElement("a");
        a.href = url; a.download = "members_fatmythbear.csv"; a.click();
        URL.revokeObjectURL(url);
    }

    fetchMembers();
</script>
</body>
</html>
