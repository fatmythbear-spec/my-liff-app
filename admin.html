<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <title>Admin Dashboard - สมาชิกทั้งหมด</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { font-family: sans-serif; padding: 20px; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { border: 1px solid #ddd; padding: 10px; text-align: left; }
        th { background-color: #f4f4f4; }
    </style>
</head>
<body>
    <h2>รายชื่อสมาชิก Fat Myth Bear</h2>
    <table>
        <thead>
            <tr>
                <th>ชื่อ-นามสกุล</th>
                <th>เบอร์โทรศัพท์</th>
                <th>วันที่สมัคร</th>
            </tr>
        </thead>
        <tbody id="member-list"></tbody>
    </table>

    <script>
        const supabaseUrl = 'https://iberkiyorordyculsjyu.supabase.co';
        const supabaseAnonKey = 'sb_publishable_f3Knp7KLRxfHiOJQXaXU1w_uylu5zov';

        // ✅ แก้ตรงนี้: ใช้ supabase.createClient แทนการประกาศชื่อซ้ำ
        const { createClient } = supabase;
        const supabaseClient = createClient(supabaseUrl, supabaseAnonKey);

        async function fetchMembers() {
            try {
                const { data, error } = await supabaseClient
                    .from('profiles')
                    .select('full_name, tel, created_at');

                if (error) throw error;

                const list = document.getElementById('member-list');
                list.innerHTML = "";

                if (data && data.length > 0) {
                    data.forEach(member => {
                        const date = member.created_at
                            ? new Date(member.created_at).toLocaleDateString('th-TH')
                            : '-';
                        list.innerHTML += `<tr>
                            <td>${member.full_name || '-'}</td>
                            <td>${member.tel || '-'}</td>
                            <td>${date}</td>
                        </tr>`;
                    });
                } else {
                    list.innerHTML = "<tr><td colspan='3'>ยังไม่มีข้อมูลสมาชิก</td></tr>";
                }
            } catch (err) {
                console.error("เกิดข้อผิดพลาดในการดึงข้อมูล:", err.message);
                document.getElementById('member-list').innerHTML =
                    "<tr><td colspan='3'>เกิดข้อผิดพลาด: " + err.message + "</td></tr>";
            }
        }

        fetchMembers();
    </script>
</body>
</html>
