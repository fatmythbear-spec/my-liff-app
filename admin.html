<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Admin Dashboard - Fat Myth Bear</title>
    <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html5-qrcode/2.3.4/html5-qrcode.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: system-ui, 'Kanit', sans-serif; background: #f5f5f5; }
        #loading { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; gap: 12px; color: #666; }
        .spinner { width: 40px; height: 40px; border: 4px solid #ddd; border-top-color: #06c755; border-radius: 50%; animation: spin 0.8s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
        #app { display: none; padding: 16px; max-width: 1400px; margin: 0 auto; }
        .header { background: linear-gradient(135deg, #1e293b, #0f172a); color: white; border-radius: 24px; padding: 20px 24px; margin-bottom: 24px; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 16px; }
        .header-title { font-size: 28px; font-weight: 700; }
        .btn-export { background: #06c755; border: none; padding: 12px 20px; border-radius: 40px; color: white; font-weight: 700; cursor: pointer; }
        .tabs { display: flex; gap: 10px; margin-bottom: 24px; overflow-x: auto; }
        .tab-btn { background: white; border: none; padding: 10px 20px; border-radius: 40px; font-weight: 600; cursor: pointer; }
        .tab-btn.active { background: #06c755; color: white; }
        .tab-content { display: none; }
        .tab-content.show { display: block; }
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 16px; margin-bottom: 24px; }
        .stat-card { background: white; border-radius: 20px; padding: 20px; text-align: center; }
        .stat-number { font-size: 32px; font-weight: 800; color: #06c755; }
        .card { background: white; border-radius: 20px; padding: 20px; margin-bottom: 24px; }
        .search-input, .form-input, .filter-select { padding: 12px 16px; border: 1.5px solid #e2e8f0; border-radius: 16px; font-size: 14px; width: 100%; margin-bottom: 12px; }
        .table-container { overflow-x: auto; border-radius: 20px; background: white; }
        table { width: 100%; border-collapse: collapse; font-size: 13px; min-width: 700px; }
        th { background: #f8fafc; padding: 14px 12px; text-align: left; }
        td { padding: 12px; border-bottom: 1px solid #f1f5f9; }
        .tier-badge { display: inline-block; padding: 4px 12px; border-radius: 40px; font-size: 11px; font-weight: 700; }
        .tier-Bronze { background: #fde68a; color: #b45309; }
        .tier-Silver { background: #e2e8f0; color: #475569; }
        .tier-Gold { background: #fed7aa; color: #b76e0e; }
        .tier-Platinum { background: #c7d2fe; color: #4338ca; }
        .action-btn-sm { border: none; padding: 6px 12px; border-radius: 30px; font-size: 12px; font-weight: 600; cursor: pointer; margin: 0 2px; }
        .btn-info { background: #3b82f6; color: white; }
        .btn-delete { background: #ef4444; color: white; }
        .btn-primary { background: #06c755; color: white; border: none; padding: 12px; border-radius: 40px; font-weight: 700; cursor: pointer; width: 100%; }
        .message { padding: 14px 18px; border-radius: 16px; margin-bottom: 20px; display: none; }
        .error { background: #fee2e2; color: #dc2626; }
        .success { background: #e0f2e9; color: #06c755; }
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.7); align-items: center; justify-content: center; z-index: 1000; }
        .modal.show { display: flex; }
        .modal-content { background: white; border-radius: 32px; padding: 24px; width: 90%; max-width: 400px; }
        .modal-buttons { display: flex; gap: 12px; margin-top: 20px; }
        .modal-btn { flex: 1; padding: 12px; border-radius: 40px; border: none; font-weight: 700; cursor: pointer; }
        .modal-btn-cancel { background: #e2e8f0; }
        .modal-btn-confirm { background: #ef4444; color: white; }
        #qr-reader { width: 100%; margin: 12px 0; }
    </style>
</head>
<body>
<div id="loading"><div class="spinner"></div><p>กำลังโหลด Dashboard...</p></div>
<div id="app">
    <div class="header"><div><div class="header-title">📊 Admin Dashboard</div><div class="header-sub">Fat Myth Bear</div></div><button class="btn-export" id="export-btn" onclick="exportToCSV()">📎 Export CSV</button></div>
    <div class="tabs">
        <button class="tab-btn active" onclick="switchTab(event,'members')">👥 สมาชิก</button>
        <button class="tab-btn" onclick="switchTab(event,'scanner')">📷 สแกน QR</button>
        <button class="tab-btn" onclick="switchTab(event,'add-points')">➕ เพิ่มแต้ม</button>
        <button class="tab-btn" onclick="switchTab(event,'analytics')">📊 วิเคราะห์</button>
        <button class="tab-btn" onclick="switchTab(event,'admins')">👨‍💼 แอดมิน</button>
    </div>
    <div id="error-msg" class="message error"></div><div id="success-msg" class="message success"></div>
    <div id="members" class="tab-content show">... content ...</div>
    <div id="scanner" class="tab-content">...</div>
    <div id="add-points" class="tab-content">...</div>
    <div id="analytics" class="tab-content">...</div>
    <div id="admins" class="tab-content">...</div>
</div>
<div class="modal" id="delete-modal"><div class="modal-content"><div class="modal-title">⚠️ ยืนยันการลบ</div><div class="modal-text">ต้องการลบสมาชิก <b id="delete-name">-</b> ออกจากระบบ?</div><div class="modal-buttons"><button class="modal-btn modal-btn-cancel" onclick="closeModal()">ยกเลิก</button><button class="modal-btn modal-btn-confirm" onclick="confirmDelete()">ลบเลย</button></div></div></div>

<script>
    (function(){
        const SUPABASE_URL = "https://iberkiyorordyculsjyu.supabase.co";
        const SUPABASE_KEY = "sb_publishable_f3Knp7KLRxfHiOJQXaXU1w_uylu5zov";
        const LIFF_ID = "2010298031-TOsCbkzl";

        let supabase;
        if(window.__supabaseClient){
            supabase = window.__supabaseClient;
        } else {
            supabase = supabaseJs.createClient(SUPABASE_URL, SUPABASE_KEY);
            window.__supabaseClient = supabase;
        }

        let allMembers = [], deleteTargetId = "", selectedMemberId = "", qrScanner = null, scannerActive = false;

        function getTierFromExp(exp) {
            if(exp >= 5000) return "Platinum";
            if(exp >= 3000) return "Gold";
            if(exp >= 1000) return "Silver";
            return "Bronze";
        }

        async function loadMembers(){
            const {data, error} = await supabase.from("profiles").select("*").order("created_at", {ascending:false});
            if(error) throw error;
            allMembers = data || [];
            for(let m of allMembers){
                const correct = getTierFromExp(m.current_exp||0);
                if(m.tier !== correct){
                    await supabase.from("profiles").update({tier:correct}).eq("line_user_id", m.line_user_id);
                    m.tier = correct;
                }
            }
            renderStatsAndTable();
            loadAnalytics();
        }

        function renderStatsAndTable(){
            const bronze = allMembers.filter(m=>m.tier==="Bronze").length;
            const silver = allMembers.filter(m=>m.tier==="Silver").length;
            const gold = allMembers.filter(m=>m.tier==="Gold").length;
            const platinum = allMembers.filter(m=>m.tier==="Platinum").length;
            document.getElementById("total-members").innerText = allMembers.length;
            document.getElementById("bronze-count").innerText = bronze;
            document.getElementById("silver-count").innerText = silver;
            document.getElementById("gold-count").innerText = gold;
            document.getElementById("platinum-count").innerText = platinum;
            const tbody = document.getElementById("members-table");
            if(!allMembers.length) { tbody.innerHTML='<tr><td colspan="8" class="empty">ไม่มีข้อมูล</td></tr>'; return; }
            tbody.innerHTML = allMembers.map((m,i)=>`<tr><td>${i+1}</td><td><b>${escapeHtml(m.full_name)}</b></td><td>${escapeHtml(m.tel)}</td><td><span class="tier-badge tier-${m.tier}">${m.tier}</span></td><td>${m.current_points||0}</td><td>${m.current_exp||0}</td><td><select onchange="updateRole('${m.line_user_id}',this.value)"><option ${m.role==='Customer'?'selected':''}>Customer</option><option ${m.role==='Staff'?'selected':''}>Staff</option><option ${m.role==='Admin'?'selected':''}>Admin</option></select></td><td><button class="action-btn-sm btn-info" onclick="viewHistory('${m.line_user_id}')">📜</button><button class="action-btn-sm btn-delete" onclick="showDeleteModal('${m.line_user_id}','${escapeHtml(m.full_name)}')">🗑️</button></td></tr>`).join("");
        }

        window.updateRole = async function(id,role){
            await supabase.from("profiles").update({role}).eq("line_user_id",id);
            showSuccess("อัปเดตบทบาทแล้ว");
            loadMembers();
        };
        window.viewHistory = async function(id){
            const {data} = await supabase.from("point_transactions").select("*").eq("line_user_id",id).order("created_at",{ascending:false}).limit(10);
            if(!data?.length) { alert("ไม่มีประวัติ"); return; }
            alert(data.map(t=>`${new Date(t.created_at).toLocaleDateString()} ${t.type==='earn'?'➕':'➖'} ${t.points}`).join("\n"));
        };
        window.showDeleteModal = function(id,name){ deleteTargetId=id; document.getElementById("delete-name").innerText=name; document.getElementById("delete-modal").classList.add("show"); };
        window.closeModal = function(){ document.getElementById("delete-modal").classList.remove("show"); };
        window.confirmDelete = async function(){ await supabase.from("profiles").delete().eq("line_user_id",deleteTargetId); showSuccess("ลบสำเร็จ"); closeModal(); loadMembers(); };
        window.filterMembers = function(){
            const search = document.getElementById("search-input")?.value.toLowerCase()||"";
            const tier = document.getElementById("tier-filter")?.value||"";
            const filtered = allMembers.filter(m=>(m.full_name?.toLowerCase().includes(search)||m.tel?.includes(search)||m.line_user_id.includes(search)) && (!tier||m.tier===tier));
            const tbody = document.getElementById("members-table");
            if(!filtered.length) { tbody.innerHTML='<tr><td colspan="8" class="empty">ไม่พบข้อมูล</td></tr>'; return; }
            tbody.innerHTML = filtered.map((m,i)=>`<tr><td>${i+1}</td><td><b>${escapeHtml(m.full_name)}</b></td><td>${escapeHtml(m.tel)}</td><td><span class="tier-badge tier-${m.tier}">${m.tier}</span></td><td>${m.current_points||0}</td><td>${m.current_exp||0}</td><td><select onchange="updateRole('${m.line_user_id}',this.value)"><option ${m.role==='Customer'?'selected':''}>Customer</option><option ${m.role==='Staff'?'selected':''}>Staff</option><option ${m.role==='Admin'?'selected':''}>Admin</option></select></td><td><button class="action-btn-sm btn-info" onclick="viewHistory('${m.line_user_id}')">📜</button><button class="action-btn-sm btn-delete" onclick="showDeleteModal('${m.line_user_id}','${escapeHtml(m.full_name)}')">🗑️</button></td></tr>`).join("");
        };
        window.searchMemberForPoints = function(){
            const kw = document.getElementById("add-points-search").value.trim().toLowerCase();
            const m = allMembers.find(m=>m.full_name?.toLowerCase().includes(kw)||m.tel?.includes(kw)||m.line_user_id.includes(kw));
            if(!m){ showError("ไม่พบสมาชิก"); return; }
            selectedMemberId = m.line_user_id;
            document.getElementById("member-name").innerText = m.full_name;
            document.getElementById("member-current-points").innerText = m.current_points||0;
            document.getElementById("member-current-exp").innerText = m.current_exp||0;
            document.getElementById("add-points-result").style.display = "block";
        };
        window.updateExpPreview = function(){
            const pts = parseInt(document.getElementById("points-amount")?.value)||0;
            document.getElementById("exp-preview").innerText = pts;
        };
        window.addPointsConfirm = async function(){
            const amount = parseInt(document.getElementById("points-amount").value)||0;
            if(amount<=0){ showError("กรุณากรอกจำนวนแต้ม"); return; }
            const member = allMembers.find(m=>m.line_user_id===selectedMemberId);
            if(!member) return;
            if(!confirm(`เพิ่ม ${amount} แต้ม ให้ ${member.full_name}?`)) return;
            await supabase.from("point_transactions").insert({line_user_id:member.line_user_id, points:amount, exp:amount, type:"earn", description:"Admin add"});
            const newPoints = (member.current_points||0)+amount;
            const newExp = (member.current_exp||0)+amount;
            const newTier = getTierFromExp(newExp);
            await supabase.from("profiles").update({current_points:newPoints, current_exp:newExp, tier:newTier}).eq("line_user_id",member.line_user_id);
            showSuccess(`เพิ่ม ${amount} แต้ม แล้ว`);
            loadMembers();
            document.getElementById("add-points-result").style.display = "none";
            document.getElementById("add-points-search").value = "";
        };
        window.startQRScanner = function(){ /* ย่อ */ alert("เปิดกล้องสแกน (ฟังก์ชันพร้อมใช้)"); };
        window.stopQRScanner = function(){};
        async function loadAnalytics(){
            const {data:trans} = await supabase.from("point_transactions").select("points,type");
            const pointsUsed = (trans||[]).filter(t=>t.type==="redeem").reduce((a,b)=>a+(b.points||0),0);
            const {data:coupons} = await supabase.from("user_coupons").select("status");
            document.getElementById("total-points-used").innerText = pointsUsed.toLocaleString();
            document.getElementById("total-coupons").innerText = coupons?.length||0;
            document.getElementById("coupons-used").innerText = (coupons||[]).filter(c=>c.status==="used").length;
            const avg = allMembers.length ? Math.round(allMembers.reduce((s,m)=>s+(m.current_points||0),0)/allMembers.length) : 0;
            document.getElementById("avg-points").innerText = avg;
        }
        window.exportToCSV = function(){
            let csv = "\uFEFFลำดับ,ชื่อ,เบอร์โทร,Tier,แต้ม,EXP,บทบาท\n";
            allMembers.forEach((m,i)=> csv += `${i+1},"${escapeCsv(m.full_name)}","${escapeCsv(m.tel||"")}",${m.tier},${m.current_points||0},${m.current_exp||0},"${m.role||"Customer"}"\n`);
            const blob = new Blob([csv],{type:"text/csv;charset=utf-8;"});
            const a = document.createElement("a"); a.href = URL.createObjectURL(blob); a.download = "members.csv"; a.click(); URL.revokeObjectURL(a.href);
            showSuccess("ส่งออก CSV สำเร็จ");
        };
        window.switchTab = function(ev, tabName){
            document.querySelectorAll(".tab-content").forEach(t=>t.classList.remove("show"));
            document.querySelectorAll(".tab-btn").forEach(b=>b.classList.remove("active"));
            document.getElementById(tabName).classList.add("show");
            if(ev && ev.target) ev.target.classList.add("active");
            if(tabName==="analytics") loadAnalytics();
        };
        function escapeHtml(str){ if(!str) return ""; return str.replace(/[&<>]/g, function(m){if(m==='&') return '&amp;'; if(m==='<') return '&lt;'; if(m==='>') return '&gt;'; return m;}); }
        function escapeCsv(str){ return String(str||"").replace(/"/g,'""'); }
        function showError(msg){ let el = document.getElementById("error-msg"); el.innerText=msg; el.style.display="block"; setTimeout(()=>el.style.display="none",4000); }
        function showSuccess(msg){ let el = document.getElementById("success-msg"); el.innerText=msg; el.style.display="block"; setTimeout(()=>el.style.display="none",3000); }
        
        async function init(){
            try{
                await Promise.race([liff.init({liffId:LIFF_ID}), new Promise((_,rej)=>setTimeout(()=>rej("LIFF timeout"),10000))]);
                if(!liff.isLoggedIn()){ liff.login(); return; }
                const profile = await liff.getProfile();
                const {data,error} = await supabase.from("profiles").select("role").eq("line_user_id",profile.userId).single();
                if(error || !data || data.role !== "Admin"){
                    document.getElementById("loading").innerHTML = "<div style='color:red'>⛔ เฉพาะ Admin เท่านั้น</div>";
                    return;
                }
                document.getElementById("loading").style.display = "none";
                document.getElementById("app").style.display = "block";
                await loadMembers();
                document.getElementById("points-amount")?.addEventListener("input", updateExpPreview);
            } catch(err){
                document.getElementById("loading").innerHTML = `<div style='color:red'>${err.message}</div>`;
            }
        }
        init();
    })();
</script>
</body>
</html>
