<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard - Fat Myth Bear</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Kanit', sans-serif; background: #f0f0f0; padding: 20px; }

        .header {
            background: #1a1a2e; color: white;
            border-radius: 16px; padding: 20px 24px;
            margin-bottom: 20px;
            display: flex; justify-content: space-between; align-items: center;
        }
        .header-title { font-size: 20px; font-weight: 700; }
        .header-sub   { font-size: 13px; opacity: 0.6; margin-top: 2px; }
        .admin-badge  { background: #e74c3c; color: white; padding: 4px 14px; border-radius: 99px; font-size: 13px; }

        /* Stats Row */
        .stats-row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; margin-bottom: 20px; }
        .stat-card {
            background: white; border-radius: 14px; padding: 16px 20px; text-align: center;
        }
        .stat-label { font-size: 12px; color: #999; margin-bottom: 6px; }
        .stat-val   { font-size: 26px; font-weight: 700; color: #1a1a2e; }
        .stat-val.bronze  { color: #cd7f32; }
        .stat-val.silver  { color: #a8a9ad; }
        .stat-val.gold    { color: #daa520; }
        .stat-val.platinum{ color: #667eea; }

        /* Toolbar */
        .toolbar {
            background: white; border-radius: 14px; padding: 16px 20px;
            margin-bottom: 16px; display: flex; gap: 10px; flex-wrap: wrap; align-items: center;
        }
        input[type="text"] {
            padding: 9px 14px; border: 1px solid #ddd; border-radius: 8px;
            font-size: 14px; flex: 1; min-width: 200px; outline: none;
        }
        input[type="text"]:focus { border-color: #06c755; }
        select {
            padding: 9px 14px; border: 1px solid #ddd; border-radius: 8px;
            font-size: 14px; background: white; cursor: pointer;
        }
        .btn {
            padding: 9px 18px; border: none; border-radius: 8px;
            font-size: 14px; cursor: pointer; font-weight: 600;
        }
        .btn-export { background: #27ae60; color: white; }
        .btn-export:hover { background: #219150; }

        /* Table */
        .table-wrap { background: white; border-radius: 14px; overflow: hidden; }
        table { width: 100%; border-collapse: collapse; }
        th {
            background: #f8f8f8; padding: 12px 16px; text-align: left;
            font-size: 13px; color: #666; border-bottom: 1px solid #eee;
        }
        td { padding: 12px 16px; font-size: 14px; border-bottom: 1px solid #f0f0f0; color: #333; }
        tr:last-child td { border-bottom: none; }
        tr:hover td { background: #fafafa; }

        .tier-badge {
            display: inline-block; padding: 3px 10px;
            border-radius: 99px; font-size: 12px; font-weight: 600;
        }
        .tier-Bronze   { background: #cd7f3220; color: #a0522d; }
        .tier-Silver   { background: #a8a9ad20; color: #666; }
        .tier-Gold     { background: #ffd70025; color: #b8860b; }
        .tier-Platinum { background: #667eea20; color: #534AB7; }

        .role-badge {
            display: inline-block; padding: 3px 10px;
            border-radius: 99px; font-size: 12px;
        }
        .role-Customer { background: #e8f5e9; color: #2e7d32; }
        .role-Staff    { background: #e3f2fd; color: #1565c0; }
        .role-Admin    { background: #fce4ec; color: #c62828; }

        .btn-delete {
            background: #fce4ec; color: #c62828;
            border: none; padding: 5px 12px; border-radius: 6px;
            font-size: 12px; cursor: pointer;
        }
        .btn-delete:hover { background: #e74c3c; color: white; }

        .btn-role {
            background: #e3f2fd; color: #1565c0;
            border: none; padding: 5px 12px; border-radius: 6px;
            font-size: 12px; cursor: pointer; margin-right: 4px;
        }
        .btn-role:hover { background: #1565c0; color: white; }

        .no-data { padding: 40px; text-align: center; color: #aaa; }

        .tabs { display: flex; gap: 8px; margin-bottom: 16px; }
