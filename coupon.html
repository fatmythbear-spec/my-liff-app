<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>คูปองส่วนลด - Fat Myth Bear</title>
    <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Kanit', sans-serif; background: #f7f9fc; color: #2d3748; min-height: 100vh; padding-bottom: 30px; }

        /* Loading Screen */
        #loading {
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            height: 100vh; gap: 12px; color: #718096; background: #ffffff;
        }
        .spinner {
            width: 40px; height: 40px; border: 4px solid #e2e8f0;
            border-top-color: #06c755; border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        #app { display: none; padding: 16px; }

        /* ========================================================
           REAL-TIME POINTS & COUPON COUNT DASHBOARD (แดชบอร์ดแต้ม)
        ======================================================== */
        .dashboard-card {
            background: linear-gradient(135deg, #111827 0%, #1f2937 100%);
            border-radius: 20px; padding: 20px; color: white; margin-bottom: 20px;
            box-shadow: 0 10px 25px rgba(17, 24, 39, 0.15); display: flex;
            justify-content: space-between; align-items: center; position: relative; overflow: hidden;
        }
        .dashboard-card::after {
            content: ''; position: absolute; right: -20px; bottom: -20px; width: 120px; height: 120px;
            background: rgba(6, 199, 85, 0.12); border-radius: 50%; filter: blur(20px);
        }
        .db-left .db-label { font-size: 11px; color: #9ca3af; text-transform: uppercase; letter-spacing: 1px; }
        .db-left .db-pts-value { font-size: 30px; font-weight: 700; color: #06c755; line-height: 1.2; margin-top: 2px; }
        .db-left .db-pts-unit { font-size: 14px; font-weight: 400; color: #9ca3af; }
        
        .db-right { text-align: right; background: rgba(255,255,255,0.06); padding: 10px 16px; border-radius: 14px; border: 1px solid rgba(255,255,255,0.08); }
        .db-right .db-count-label { font-size: 11px; color: #cbd5e1; }
        .db-right .db-count-value { font-size: 24px; font-weight: 700; color: #ffffff; }

        /* ========================================================
           5 TABS SCROLLABLE NAVIGATION BAR (บาร์แถบเมนู 5 ช่อง)
        ======================================================== */
        .tabs-wrapper {
            margin-bottom: 18px; overflow-x: auto; white-space: nowrap;
            -webkit-overflow-scrolling: touch; padding-bottom: 4px;
        }
        .tabs-wrapper::-webkit-scrollbar { display: none; } /* ซ่อนบาร์เลื่อนเพื่อความสวยงาม */
        
        .tabs-container { display: inline-flex; gap: 8px; width: 100%; }
        .tab-btn {
            flex: 1; min-width: 75px; text-align: center; padding: 10px 4px; font-size: 13px;
            font-weight: 500; color: #4a5568; border: none; background: #edf2f7;
            border-radius: 12px; cursor: pointer; transition: all 0.2s ease;
        }
        .tab-btn.active {
            background: #06c755; color: #ffffff; font-weight: 600;
            box-shadow: 0 4px 12px rgba(6, 199, 85, 0.25);
        }

        /* ========================================================
           PREMIUM TICKET COUPON LIST DESIGN (รายการคูปองทรงตั๋ว)
        ======================================================== */
        .coupon-list-container { min-height: 150px; }
        
        .coupon-card {
            background: #ffffff; border-radius: 16px; display: flex; margin-bottom: 14px;
            position: relative; overflow: hidden; box-shadow: 0 4px 15px rgba(0,0,0,0.02);
            border: 1px solid #edf2f7; min-height: 110px;
            animation: fadeIn 0.35s ease-in-out;
        }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }

        /* รอยเจาะปรุฉีกตั๋วครึ่งวงกลมซ้าย-ขวา */
        .coupon-card::before, .coupon-card::after {
            content: ''; position: absolute; top: 50%; width: 16px; height: 16px;
            background: #f7f9fc; border-radius: 50%; transform: translateY(-50%); z-index: 2;
            border: 1px solid #edf2f7;
        }
        .coupon-card::before { left: -8px; }
        .coupon-card::after { right: -8px; }

        /* ฝั่งซ้าย: โซนไอคอนจำแนกสีตามหมวดหมู่ */
        .cp-left-zone {
            width: 90px; display: flex; flex-direction: column; align-items: center; 
            justify-content: center; border-right: 1.5px dashed #e2e8f0; flex-shrink: 0; gap: 4px;
        }
        .cp-left-zone i { font-size: 30px; }
        .cp-category-label { font-size: 10px; font-weight: 500; padding: 2px 6px; border-radius: 6px; }

        /* ชุดโทนสีไอคอนตามประเภทคูปอง */
        .cate-discount { background: #fff5f5; color: #ff4d4f; }
        .cate-discount .cp-category-label { background: #ffe3e3; color: #ff4d4f; }
        
        .cate-free { background: #f0fff4; color: #38a169; }
        .cate-free .cp-category-label { background: #c6f6d5; color: #38a169; }
        
        .cate-topping { background: #f0f5ff; color: #2f54eb; }
        .cate-topping .cp-category-label { background: #d6e4ff; color: #2f54eb; }
        
        .cate-special { background: #fffb8f; color: #ad8b00; }
        .cate-special .cp-category-label { background: #feffe6; color: #ad8b00; }

        /* ฝั่งขวา: รายละเอียดข้อความ คอนเทนต์ และปุ่มกดสะท้อนความหรู */
        .cp-right-zone {
            flex-grow: 1; padding: 14px 16px; display: flex; flex-direction: column; justify-content: space-between;
        }
        .cp-title { font-size: 15px; font-weight: 600; color: #1a202c; line-height: 1.35; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
        .cp-expiry { font-size: 11px; color: #718096; margin-top: 4px; display: flex; align-items: center; gap: 4px; }
        
        .cp-action-row { display: flex; justify-content: flex-end; align-items: center; margin-top: 10px; }
        .cp-use-btn {
            padding: 7px 16px; background: #06c755; color: white; border: none; border-radius: 10px;
            font-size: 12px; font-weight: 600; cursor: pointer; transition: background 0.2s;
            box-shadow: 0 4px 10px rgba(6, 199, 85, 0.15);
        }
        .cp-use-btn:active { transform: scale(0.96); }

        /* สัญลักษณ์หน้าต่างคูปองว่างเปล่า */
        .empty-box { text-align: center; padding: 50px 20px; color: #a0aec0; font-size: 14px; width: 100%; }
        .empty-box i { font-size: 44px; margin-bottom: 12px; display: block; opacity: 0.4; color: #cbd5e0; }

        /* ========================================================
           MODAL SLIDE-UP DISPLAY CODE WINDOW (กล่องสแกนคิวอาร์)
        ======================================================== */
        .modal-overlay {
            display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.6);
            backdrop-filter: blur(4px); z-index: 1000; align-items: center; justify-content: center;
        }
        .modal-overlay.show { display: flex; }
        .modal-box { background: white; border-radius: 24px; padding: 26px; text-align: center; width: 90%; max-width: 320px; box-shadow: 0 25px 50px rgba(0,0,0,0.15); }
        .modal-title { font-size: 16px; font-weight: 600; color: #1a202c; }
        .modal-subtitle { font-size: 11px; color: #718096; margin-top: 4px; margin-bottom: 16px; font-family: monospace; font-weight: 600; background: #f1f5f9; padding: 3px 8px; border-radius: 6px; display: inline-block; }
        .qr-wrapper { background: #f8fafc; padding: 16px; border-radius: 16px; margin-bottom: 16px; display: flex; justify-content: center; border: 1px dashed #e2e8f0; }
        .modal-close { width: 100%; padding: 12px; background: #edf2f7; border: none; border-radius: 12px; font-size: 14px; font-weight: 600; cursor: pointer; color: #4a5568; transition: background 0.2s; }
        .modal-close:hover { background: #e2e8f0; }
    </style>
</head>
<body>

<div id="loading">
    <div class="spinner"></div>
    <p>กำลังดึงคูปองส่วนลดแบบ Real-time...</p>
</div>

<div id="app">
    <div class="dashboard-card">
        <div class="db-left">
            <div class="db-label"><i class="fa-solid fa-bolt"></i> คะแนนคงเหลือของคุณ</div>
            <div class="db-pts-value"><span id="user-pts">0</span> <span class="db-pts-unit">pts</span></div>
        </div>
        <div class="db-right">
            <div class="db-count-label">คูปองใช้ได้ทั้งหมด</div>
            <div class="db-count-value" id="user-coupon-count">0 ใบ</div>
        </div>
    </div>

    <div class="tabs-wrapper">
        <div class="tabs-container">
            <button class="tab-btn active" id="tab-all" onclick="filterCategory('all')">ทั้งหมด</button>
            <button class="tab-btn" id="tab-discount" onclick="filterCategory('discount')">ส่วนลด</button>
            <button class="tab-btn" id="tab-free" onclick="filterCategory('free')">ฟรี</button>
            <button class="tab-btn" id="tab-topping" onclick="filterCategory('topping')">ท็อปปิ้ง</button>
            <button class="tab-btn" id="tab-special" onclick="filterCategory('special')">พิเศษ</button>
        </div>
    </div>

    <div class="coupon-list-container" id="coupon-list">
        </div>
</div>

<div class="modal-overlay" id="qr-modal">
    <div class="modal-box">
        <div class="modal-title" id="md-title">คูปองสิทธิพิเศษ</div>
        <div class="modal-subtitle" id="md-code">COUPON ID: ------</div>
        <div class="qr-wrapper">
            <div id="qr-canvas"></div>
        </div>
        <p style="font-size: 12px; color: #718096; line-height: 1.4; margin-bottom: 16px;">ยื่นหน้าจอนี้ให้พนักงานแคชเชียร์สแกนรหัสเพื่อใช้สิทธิ์รับของรางวัล</p>
        <button class="modal-close" onclick="closeQR()">ปิดหน้าต่าง</button>
    </div>
</div>

<script>
    var LIFF_ID = "2010298031-TOsCbkzl"; 
    var SUPABASE_URL = "https://iberkiyorordyculsjyu.supabase.co";
    var SUPABASE_KEY = "sb_publishable_f3Knp7KLRxfHiOJQXaXU1w_uylu5zov";
    var { createClient } = supabase;
    var db = createClient(SUPABASE_URL, SUPABASE_KEY);

    var currentUserId = "";
    var allCouponsList = []; // ถังเก็บคูปองหลักเพื่อกระจายฟิลเตอร์ 5 แท็บแบบทันทีไม่ต้องดึงข้อมูลซ้ำ
    var currentFilter = "all";

    async function init() {
        try {
            await liff.init({ liffId: LIFF_ID });
            if (!liff.isLoggedIn()) { liff.login(); return; }
            var profile = await liff.getProfile();
            currentUserId = profile.userId;

            // โหลดข้อมูลโปรไฟล์ (แต้ม Real-time) และคูปองทั้งหมด
            await Promise.all([
                loadRealtimePoints(),
                fetchUserCoupons()
            ]);

            document.getElementById("loading").style.display = "none";
            document.getElementById("app").style.display = "block";
        } catch (err) {
            console.error("Initialization error:", err);
            document.getElementById("loading").innerHTML = '<p style="color:red; padding:20px;">เกิดข้อผิดพลาดในการโหลดระบบคูปอง</p>';
        }
    }

    // 1. ฟังก์ชันดึงแต้ม Real-time มาสลักบนแดชบอร์ดการ์ดดำด้านบนสุด
    async function loadRealtimePoints() {
        try {
            var { data, error } = await db
                .from("profiles")
                .select("current_points")
                .eq("line_user_id", currentUserId)
                .single();
            if (error) throw error;
            document.getElementById("user-pts").textContent = (data.current_points || 0).toLocaleString();
        } catch (e) {
            console.error("Error fetching realtime points:", e);
        }
    }

    // 2. ฟังก์ชันหลักในการดึงข้อมูลเฉพาะคูปองที่สเตตัสพร้อมใช้งาน ('available')
    async function fetchUserCoupons() {
        try {
            var { data, error } = await db
                .from("user_coupons")
                .select("*")
                .eq("line_user_id", currentUserId)
                .eq("status", "available") // กรองเฉพาะใบที่ยังไม่ถูกพนักงานสแกนตัดสิทธิ์
                .order("created_at", { ascending: false });

            if (error) throw error;

            // ตรองเช็กสิทธิ์กรองเฉพาะใบที่ยังไม่หมดกำหนดเวลาปัจจุบัน
            var now = new Date();
            allCouponsList = (data || []).filter(function(cp) {
                if (!cp.expiry_date) return true;
                return new Date(cp.expiry_date) >= now;
            });

            // อัปเดตตัวเลขรวมยอดคูปองที่ใช้ได้บน Dashboard ขวารับสิทธิ์ทันที
            document.getElementById("user-coupon-count").textContent = allCouponsList.length + " ใบ";

            // เรนเดอร์ลงอินเตอร์เฟซหลัก
            renderCouponsMarkup();
        } catch (err) {
            console.error("Error load coupons:", err);
        }
    }

    // 3. ฟังก์ชันจัดแจงประกอบโครงสร้าง HTML แปลงตามหมวดหมู่ประเภทที่ตั้งไว้
    function renderCouponsMarkup() {
        var container = document.getElementById("coupon-list");
        container.innerHTML = "";

        // ตัวกรองเลือกคัดแยกประเภทคูปองตามคลิกบาร์แท็บ
        var filtered = allCouponsList.filter(function(cp) {
            if (currentFilter === "all") return true;
            
            // แนะนำกำหนดประเภทคูปองในคอลัมน์ชื่อ 'category' เช่น 'discount', 'free', 'topping', 'special'
            // หากไม่มีคอลัมน์นี้ ระบบจะจับคู่คำจากชื่อคูปองอัตโนมัติ (Fallback Smart Match) เพื่อไม่ให้บั๊ก
            var category = cp.category || guessCategoryFromTitle(cp.coupon_title);
            return category === currentFilter;
        });

        if (filtered.length === 0) {
            container.innerHTML = '<div class="empty-box"><i class="fa-solid fa-ticket-simple"></i>ไม่มีคูปองประเภทนี้ในกระเป๋าของคุณ</div>';
            return;
        }

        var html = filtered.map(function(cp) {
            var cat = cp.category || guessCategoryFromTitle(cp.coupon_title);
            var styleClass = "cate-special";
            var iconHTML = '<i class="fa-solid fa-gift"></i>';
            var catLabelText = "พิเศษ";

            if (cat === "discount") {
                styleClass = "cate-discount";
                iconHTML = '<i class="fa-solid fa-tags"></i>';
                catLabelText = "ส่วนลด";
            } else if (cat === "free") {
                styleClass = "cate-free";
                iconHTML = '<i class="fa-solid fa-ice-cream"></i>';
                catLabelText = "ฟรี";
            } else if (cat === "topping") {
                styleClass = "cate-topping";
                iconHTML = '<i class="fa-solid fa-cookie-bite"></i>';
                catLabelText = "ท็อปปิ้ง";
            }

            var expStr = "ไม่มีวันหมดอายุ";
            if (cp.expiry_date) {
                var d = new Date(cp.expiry_date);
                expStr = "ใช้ได้ถึง: " + d.toLocaleDateString("th-TH", { day: "numeric", month: "short", year: "numeric" });
            }

            return `
                <div class="coupon-card">
                    <div class="cp-left-zone ${styleClass}">
                        ${iconHTML}
                        <span class="cp-category-label">${catLabelText}</span>
                    </div>
                    <div class="cp-right-zone">
                        <div>
                            <div class="cp-title">${cp.coupon_title || 'สิทธิ์รางวัลคูปองพรีเมียม'}</div>
                            <div class="cp-expiry"><i class="fa-regular fa-calendar-check"></i> ${expStr}</div>
                        </div>
                        <div class="cp-action-row">
                            <button class="cp-use-btn" onclick="openQR('${cp.id}', '${cp.coupon_title || 'คูปองรางวัล'}')">กดใช้งาน</button>
                        </div>
                    </div>
                </div>`;
        }).join("");

        container.innerHTML = html;
    }

    // ฟังก์ชันช่วยเดาหมวดหมู่คูปองจากคีย์เวิร์ดในชื่อ (ในกรณีตารางฐานข้อมูลไม่มีคอลัมน์คัดแยกโดยตรง)
    function guessCategoryFromTitle(title) {
        if (!title) return "special";
        var t = title.toLowerCase();
        if (t.includes("ส่วนลด") || t.includes("ลดราคา") || t.includes("%") || t.includes("บาท")) return "discount";
        if (t.includes("ฟรี") || t.includes("แถม")) return "free";
        if (t.includes("ท็อปปิ้ง") || t.includes("topping") || t.includes("ไข่มุก") || t.includes("เจลลี่")) return "topping";
        return "special";
    }

    // ฟังก์ชันเมื่อกดคลิกสลับแถบบาร์ฟิลเตอร์ 5 ช่องด้านบน
    function filterCategory(categoryType) {
        currentFilter = categoryType;
        
        // เคลียร์ปุ่มแท็บสว่างตัวเก่าออกทั้งหมดและนำมาแปะลงตัวที่คลิกล่าสุด
        var buttons = document.querySelectorAll('.tab-btn');
        buttons.forEach(b => b.classList.remove('active'));
        
        event.currentTarget.classList.add('active');
        
        // สั่งเปลี่ยนผลลัพธ์ข้อมูลทันใจ
        renderCouponsMarkup();
    }

    // ฟังก์ชันเปิดแสดงกล่องป๊อปอัปสแกนคิวอาร์โค้ดสิทธิ์คูปอง (ส่งค่า Coupon ID ไปยังฝั่งแอดมินหลังบ้านสแกนตัดสิทธิ์)
    function openQR(couponId, title) {
        document.getElementById("qr-modal").classList.add("show");
        document.getElementById("md-title").textContent = title;
        document.getElementById("md-code").textContent = "COUPON ID: " + couponId.toUpperCase().slice(-8);

        var qrContainer = document.getElementById("qr-canvas");
        qrContainer.innerHTML = ""; // ล้างค่ารหัสบาร์โค้ดใบเก่าออกก่อนป้องกันการซ้อนทับกัน

        setTimeout(function() {
            new QRCode(qrContainer, {
                text: couponId, // ค่าคีย์หลักนี้ส่งไปยังแอดมินเพื่ออัปเดตสเตตัสใน Supabase จาก available ➡️ used ทันที
                width: 170,
                height: 170,
                colorDark : "#1f2937",
                colorLight : "#ffffff",
                correctLevel : QRCode.CorrectLevel.H
            });
        }, 80);
    }

    function closeQR() {
        document.getElementById("qr-modal").classList.remove("show");
    }

    init();
</script>
</body>
</html>
