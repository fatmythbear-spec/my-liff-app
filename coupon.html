<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>คูปองและประวัติ - Fat Myth Bear</title>
    <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Kanit', sans-serif; background: #f4f6f9; color: #2d3748; min-height: 100vh; padding-bottom: 40px; }

        /* Loading Screen */
        #loading {
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            height: 100vh; gap: 12px; color: #718096; background: #ffffff;
        }
        .spinner {
            width: 40px; height: 40px; border: 4px solid #e2e8f0;
            border-top-color: #06c755; border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        #app { display: none; padding: 16px; }

        /* Header Title */
        .page-header { display: flex; align-items: center; gap: 10px; margin-bottom: 20px; }
        .page-header i { font-size: 24px; color: #ff7043; }
        .page-header h2 { font-size: 20px; font-weight: 600; color: #1a202c; }

        /* ========================================================
           DYNAMIC TABS SYSTEM (ระบบแท็บสลับสถานะ)
        ======================================================== */
        .tabs-container {
            display: flex; background: #e2e8f0; padding: 4px; border-radius: 14px; margin-bottom: 16px;
        }
        .tab-btn {
            flex: 1; text-align: center; padding: 10px 5px; font-size: 13px; font-weight: 500;
            color: #4a5568; border: none; background: transparent; border-radius: 10px;
            cursor: pointer; transition: all 0.2s ease;
        }
        .tab-btn.active {
            background: #ffffff; color: #1a202c; font-weight: 600;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
        }

        /* Container จัดการซ่อนสลับคูปอง */
        .coupon-panel { display: none; }
        .coupon-panel.active { display: block; }

        /* ========================================================
           PREMIUM PREMIUM TICKET COUPON DESIGN (ดีไซน์ตั๋วมีรอยปรุ)
        ======================================================== */
        .coupon-card {
            background: #ffffff; border-radius: 16px; display: flex; margin-bottom: 14px;
            position: relative; overflow: hidden; filter: drop-shadow(0 4px 10px rgba(0,0,0,0.03));
            border: 1px solid #edf2f7; min-height: 105px;
        }

        /* รอยปรุครึ่งวงกลมด้านซ้ายและขวาของตั๋ว */
        .coupon-card::before, .coupon-card::after {
            content: ''; position: absolute; top: 50%; width: 14px; height: 14px;
            background: #f4f6f9; border-radius: 50%; transform: translateY(-50%); z-index: 2;
            border: 1px solid #edf2f7;
        }
        .coupon-card::before { left: -7px; box-shadow: inset -3px 0 4px rgba(0,0,0,0.02); }
        .coupon-card::after { right: -7px; box-shadow: inset 3px 0 4px rgba(0,0,0,0.02); }

        /* ส่วนฝั่งซ้าย: ไอคอนและภาพลักษณ์ของรางวัล */
        .cp-left {
            width: 95px; background: linear-gradient(135deg, #fff5f5 0%, #ffe3e3 100%);
            display: flex; align-items: center; justify-content: center; position: relative;
            border-right: 1px dashed #e2e8f0; flex-shrink: 0;
        }
        .cp-left i { font-size: 32px; color: #ff4d4f; }
        
        /* สลับสีฝั่งซ้ายเมื่อคูปองใช้ไม่ได้แล้ว */
        .status-inactive .cp-left { background: #f7fafc; }
        .status-inactive .cp-left i { color: #a0aec0; }

        /* ส่วนฝั่งขวา: รายละเอียด ชื่อ และปุ่ม Action */
        .cp-right {
            flex-grow: 1; padding: 14px 16px; display: flex; flex-direction: column; justify-content: space-between;
        }
        .cp-title { font-size: 15px; font-weight: 600; color: #1a202c; line-height: 1.3; margin-bottom: 4px; }
        .cp-expiry { font-size: 11px; color: #718096; display: flex; align-items: center; gap: 4px; }
        
        .cp-action-row { display: flex; justify-content: space-between; align-items: center; margin-top: 10px; }
        .cp-points-tag { font-size: 12px; font-weight: 600; color: #06c755; background: #f0fff4; padding: 2px 8px; border-radius: 6px; }
        
        .cp-btn {
            padding: 6px 14px; background: #06c755; color: white; border: none; border-radius: 8px;
            font-size: 12px; font-weight: 600; cursor: pointer; transition: background 0.2s;
        }
        .cp-btn:active { transform: scale(0.97); }
        
        /* สไตล์ปุ่มเมื่อถูกใช้แล้วหรือหมดอายุ */
        .btn-used { background: #cbd5e0; color: #718096; cursor: not-allowed; }
        .btn-expired { background: #e2e8f0; color: #a0aec0; cursor: not-allowed; }

        /* หน้าต่างกล่องข้อความเมื่อว่างเปล่า */
        .empty-state { text-align: center; padding: 40px 20px; color: #a0aec0; font-size: 14px; }
        .empty-state i { font-size: 40px; margin-bottom: 10px; display: block; opacity: 0.5; }

        /* ========================================================
           TIMELINE TRANSACTION HISTORY (ประวัติคะแนนด้านล่าง)
        ======================================================== */
        .history-card { background: #ffffff; border-radius: 20px; padding: 20px; margin-top: 24px; border: 1px solid #edf2f7; }
        .history-title { font-size: 15px; font-weight: 600; color: #1a202c; margin-bottom: 16px; display: flex; align-items: center; gap: 8px; }
        .history-title i { color: #42a5f5; }

        .timeline { position: relative; padding-left: 20px; }
        .timeline::before { content: ''; position: absolute; left: 4px; top: 8px; bottom: 8px; width: 2px; background: #e2e8f0; }
        
        .timeline-item { position: relative; padding-bottom: 16px; padding-left: 12px; }
        .timeline-item:last-child { padding-bottom: 0; }
        .timeline-dot { position: absolute; left: -20px; top: 6px; width: 10px; height: 10px; border-radius: 50%; background: #cbd5e0; border: 2px solid white; box-shadow: 0 0 0 2px #cbd5e0; }
        
        .tx-header { display: flex; justify-content: space-between; align-items: flex-start; }
        .tx-desc { font-size: 13px; font-weight: 500; color: #2d3748; line-height: 1.4; }
        .tx-points { font-size: 13px; font-weight: 600; white-space: nowrap; }
        .tx-earn { color: #06c755; }
        .tx-redeem { color: #e53e3e; }
        .tx-date { font-size: 11px; color: #a0aec0; margin-top: 2px; }

        /* ========================================================
           MODAL SLIDE-UP WINDOW (หน้าต่างสแกนคิวอาร์โค้ด)
        ======================================================== */
        .modal-overlay {
            display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.6);
            backdrop-filter: blur(4px); z-index: 1000; align-items: center; justify-content: center;
        }
        .modal-overlay.show { display: flex; }
        .modal-box { background: white; border-radius: 24px; padding: 24px; text-align: center; width: 90%; max-width: 320px; box-shadow: 0 20px 40px rgba(0,0,0,0.15); }
        .modal-title { font-size: 16px; font-weight: 600; color: #1a202c; }
        .modal-subtitle { font-size: 12px; color: #718096; margin-top: 4px; margin-bottom: 16px; }
        .qr-wrapper { background: #f7fafc; padding: 16px; border-radius: 16px; margin-bottom: 14px; display: flex; justify-content: center; }
        .modal-close { width: 100%; padding: 12px; background: #edf2f7; border: none; border-radius: 12px; font-size: 14px; font-weight: 600; cursor: pointer; color: #4a5568; }
    </style>
</head>
<body>

<div id="loading">
    <div class="spinner"></div>
    <p>กำลังโหลดคูปองและประวัติของคุณ...</p>
</div>

<div id="app">
    <div class="page-header">
        <i class="fa-solid fa-tags"></i>
        <h2>คูปอง & สิทธิประโยชน์</h2>
    </div>

    <div class="tabs-container">
        <button class="tab-btn active" onclick="switchTab('available')">คูปองที่ใช้ได้</button>
        <button class="tab-btn" onclick="switchTab('used')">ใช้แล้ว</button>
        <button class="tab-btn" onclick="switchTab('expired')">หมดอายุ</button>
    </div>

    <div id="panel-available" class="coupon-panel active">
        <div id="list-available"></div>
    </div>

    <div id="panel-used" class="coupon-panel">
        <div id="list-used"></div>
    </div>

    <div id="panel-expired" class="coupon-panel">
        <div id="list-expired"></div>
    </div>

    <div class="history-card">
        <div class="history-title">
            <i class="fa-solid fa-clock-rotate-left"></i> ประวัติการเคลื่อนไหวแต้ม
        </div>
        <div class="timeline" id="tx-list">
            </div>
    </div>
</div>

<div class="modal-overlay" id="qr-modal">
    <div class="modal-box">
        <div class="modal-title" id="md-title">คูปองสิทธิพิเศษ</div>
        <div class="modal-subtitle" id="md-code">CODE: ------</div>
        <div class="qr-wrapper">
            <div id="qr-canvas"></div>
        </div>
        <p style="font-size: 12px; color: #718096; line-height: 1.4; margin-bottom: 16px;">ยื่นคิวอาร์โค้ดนี้ให้พนักงานสแกนบันทึกสิทธิ์ที่หน้าร้านเพื่อรับรางวัล</p>
        <button class="modal-close" onclick="closeQR()">ปิดหน้าต่าง</button>
    </div>
</div>

<script>
    var LIFF_ID = "2010298031-TOsCbkzl"; // LIFF ID คงเดิมจากไฟล์หลักของคุณ
    var SUPABASE_URL = "https://iberkiyorordyculsjyu.supabase.co";
    var SUPABASE_KEY = "sb_publishable_f3Knp7KLRxfHiOJQXaXU1w_uylu5zov";
    var { createClient } = supabase;
    var db = createClient(SUPABASE_URL, SUPABASE_KEY);

    var currentUserId = "";

    async function init() {
        try {
            await liff.init({ liffId: LIFF_ID });
            if (!liff.isLoggedIn()) { liff.login(); return; }
            var profile = await liff.getProfile();
            currentUserId = profile.userId;

            // โหลดข้อมูลพร้อมกันทั้งคูปองและประวัติธุรกรรมเพื่อความเร็ว
            await Promise.all([
                loadCoupons(),
                loadTransactions()
            ]);

            document.getElementById("loading").style.display = "none";
            document.getElementById("app").style.display = "block";
        } catch (err) {
            console.error("Initialization Error:", err);
            document.getElementById("loading").innerHTML = '<p style="color:red; padding:20px;">เกิดข้อผิดพลาดในการโหลดระบบคูปอง</p>';
        }
    }

    // ฟังก์ชันจัดการดึงข้อมูลและคัดกรองประเภทคูปองลงแท็บต่างๆ
    async function loadCoupons() {
        try {
            var { data, error } = await db
                .from("user_coupons")
                .select("*")
                .eq("line_user_id", currentUserId)
                .order("created_at", { ascending: false });

            if (error) throw error;

            var htmlAvailable = "";
            var htmlUsed = "";
            var htmlExpired = "";

            if (!data || data.length === 0) {
                var noDataTemplate = '<div class="empty-state"><i class="fa-solid fa-ticket-simple"></i>ไม่มีข้อมูลคูปองในหมวดหมู่นี้</div>';
                document.getElementById("list-available").innerHTML = noDataTemplate;
                document.getElementById("list-used").innerHTML = noDataTemplate;
                document.getElementById("list-expired").innerHTML = noDataTemplate;
                return;
            }

            data.forEach(function(cp) {
                var expiryDate = cp.expiry_date ? new Date(cp.expiry_date) : null;
                var isExpired = expiryDate && expiryDate < new Date();
                var formattedDate = expiryDate ? expiryDate.toLocaleDateString("th-TH", { day: "numeric", month: "short", year: "numeric" }) : "ไม่มีวันหมดอายุ";

                // 1. หมวดคูปองใช้ได้ปกติ
                if (cp.status === "available" && !isExpired) {
                    htmlAvailable += `
                        <div class="coupon-card">
                            <div class="cp-left"><i class="fa-solid fa-ice-cream"></i></div>
                            <div class="cp-right">
                                <div>
                                    <div class="cp-title">${cp.coupon_title || 'คูปองของขวัญพิเศษ'}</div>
                                    <div class="cp-expiry"><i class="fa-regular fa-clock"></i> ใช้ได้ถึง: ${formattedDate}</div>
                                </div>
                                <div class="cp-action-row">
                                    <span class="cp-points-tag">สิทธิ์รางวัล</span>
                                    <button class="cp-btn" onclick="openQR('${cp.id}', '${cp.coupon_title || 'คูปองรางวัล'}')">ใช้งานคูปอง</button>
                                </div>
                            </div>
                        </div>`;
                } 
                // 2. หมวดคูปองที่ตัดยอดใช้ไปแล้ว
                else if (cp.status === "used") {
                    htmlUsed += `
                        <div class="coupon-card status-inactive">
                            <div class="cp-left"><i class="fa-solid fa-circle-check"></i></div>
                            <div class="cp-right">
                                <div>
                                    <div class="cp-title" style="color:#a0aec0;">${cp.coupon_title || 'คูปองของขวัญพิเศษ'}</div>
                                    <div class="cp-expiry"><i class="fa-regular fa-clock"></i> ใช้เมื่อ: ${formattedDate}</div>
                                </div>
                                <div class="cp-action-row">
                                    <span class="cp-points-tag" style="color:#718096; background:#e2e8f0;">ใช้สิทธิ์แล้ว</span>
                                    <button class="cp-btn btn-used" disabled>ใช้แล้ว</button>
                                </div>
                            </div>
                        </div>`;
                } 
                // 3. หมวดคูปองที่เลยกำหนดเวลา
                else {
                    htmlExpired += `
                        <div class="coupon-card status-inactive">
                            <div class="cp-left"><i class="fa-solid fa-triangle-exclamation"></i></div>
                            <div class="cp-right">
                                <div>
                                    <div class="cp-title" style="color:#a0aec0;">${cp.coupon_title || 'คูปองของขวัญพิเศษ'}</div>
                                    <div class="cp-expiry" style="color:#e53e3e;"><i class="fa-regular fa-clock"></i> หมดอายุเมื่อ: ${formattedDate}</div>
                                </div>
                                <div class="cp-action-row">
                                    <span class="cp-points-tag" style="color:#a0aec0; background:#edf2f7;">หมดเขต</span>
                                    <button class="cp-btn btn-expired" disabled>หมดอายุ</button>
                                </div>
                            </div>
                        </div>`;
                }
            });

            var fallback = '<div class="empty-state"><i class="fa-solid fa-ticket-simple"></i>ไม่มีข้อมูลคูปองในหมวดหมู่นี้</div>';
            document.getElementById("list-available").innerHTML = htmlAvailable || fallback;
            document.getElementById("list-used").innerHTML      = htmlUsed || fallback;
            document.getElementById("list-expired").innerHTML   = htmlExpired || fallback;

        } catch (err) {
            console.error(err);
        }
    }

    // ฟังก์ชันดึงประวัติการเคลื่อนไหวคะแนนแต้มสะสม (Timeline ย้อนหลัง)
    async function loadTransactions() {
        try {
            var { data, error } = await db
                .from("transactions")
                .select("*")
                .eq("line_user_id", currentUserId)
                .order("created_at", { ascending: false });

            if (error) throw error;

            if (!data || data.length === 0) {
                document.getElementById("tx-list").innerHTML = '<div class="empty-state">ยังไม่มีประวัติการทำรายการคะแนน</div>';
                return;
            }

            document.getElementById("tx-list").innerHTML = data.map(function(tx) {
                var date = new Date(tx.created_at).toLocaleDateString("th-TH", {
                    day: "numeric", month: "short", year: "numeric", hour: "2-digit", minute: "2-digit"
                });
                var isEarn = tx.type === "earn";
                
                return `
                    <div class="timeline-item">
                        <div class="timeline-dot" style="background: ${isEarn ? '#06c755' : '#e53e3e'}; shadow: 0 0 0 2px ${isEarn ? '#06c755' : '#e53e3e'}"></div>
                        <div class="tx-header">
                            <div class="tx-desc">${tx.description || "บันทึกแต้มจากรายการหน้าร้าน"}</div>
                            <div class="tx-points ${isEarn ? 'tx-earn' : 'tx-redeem'}">
                                ${isEarn ? '+' : '-'}${Math.abs(tx.points).toLocaleString()} แต้ม
                            </div>
                        </div>
                        <div class="tx-date">${date}</div>
                    </div>`;
            }).join("");

        } catch (err) {
            document.getElementById("tx-list").innerHTML = '<div class="empty-state" style="color:#e53e3e;">เกิดข้อผิดพลาดในการดึงไทม์ไลน์</div>';
        }
    }

    // ฟังก์ชันสลับเมนูหน้าต่างแท็บ
    function switchTab(status) {
        // เคลียร์ปุ่ม Active เก่าออกทั้งหมด
        var buttons = document.querySelectorAll('.tab-btn');
        buttons.forEach(b => b.classList.remove('active'));
        
        // เคลียร์คอนเทนต์เก่าที่โชว์ออก
        var panels = document.querySelectorAll('.coupon-panel');
        panels.forEach(p => p.classList.remove('active'));

        // คืนค่าความ Active ให้กับเป้าหมายที่ถูกคลิกเข้ามาใหม่
        event.currentTarget.classList.add('active');
        document.getElementById('panel-' + status).classList.add('active');
    }

    // ฟังก์ชันเปิดแสดงคิวอาร์โค้ดสิทธิ์คูปองแบบเจาะจงรายใบ
    function openQR(couponId, title) {
        document.getElementById("qr-modal").classList.add("show");
        document.getElementById("md-title").textContent = title;
        document.getElementById("md-code").textContent = "COUPON ID : " + couponId.toUpperCase().slice(-8);

        var qrContainer = document.getElementById("qr-canvas");
        qrContainer.innerHTML = ""; // ล้างค่า Canvas ลิสต์ตัวเก่าออกก่อนวาดตัวใหม่

        setTimeout(function() {
            new QRCode(qrContainer, {
                text: couponId,
                width: 170,
                height: 170,
                colorDark : "#1a202c",
                colorLight : "#ffffff",
                correctLevel : QRCode.CorrectLevel.H
            });
        }, 80);
    }

    function closeQR() {
        document.getElementById("qr-modal").classList.remove("show");
    }

    init();
</script>
</body>
</html>
