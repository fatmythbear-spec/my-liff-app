<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>คูปองส่วนลด - Fat Myth Bear</title>
    <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Kanit', sans-serif; background: #f7f9fc; color: #2d3748; min-height: 100vh; padding-bottom: 40px; }

        /* Loading Screen */
        #loading {
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            height: 100vh; gap: 12px; color: #718096; background: #ffffff;
        }
        .spinner {
            width: 40px; height: 40px; border: 4px solid #e2e8f0;
            border-top-color: #06c755; border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        #app { display: none; padding: 16px; }

        /* Top User Bar Header */
        .top-user-bar {
            display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px;
        }
        .profile-section { display: flex; align-items: center; gap: 12px; }
        .avatar-box { width: 44px; height: 44px; border-radius: 50%; overflow: hidden; border: 2px solid white; box-shadow: 0 2px 8px rgba(0,0,0,0.08); }
        .avatar-box img { width: 100%; height: 100%; object-fit: cover; }
        .brand-title { font-size: 16px; font-weight: 600; color: #111827; }
        .brand-sub { font-size: 11px; color: #718096; margin-top: -2px; }
        .tier-indicator { display: flex; align-items: center; gap: 6px; background: #fffbeb; border: 1px solid #fef3c7; padding: 4px 12px; border-radius: 20px; font-size: 12px; font-weight: 600; color: #d97706; }

        .section-header-title { font-size: 18px; font-weight: 700; color: #111827; margin-bottom: 14px; display: flex; align-items: center; gap: 8px; }
        .section-header-title i { color: #f87171; }

        /* REAL-TIME POINTS DASHBOARD */
        .dashboard-card {
            background: linear-gradient(135deg, #66bb6a 0%, #43a047 100%);
            border-radius: 20px; padding: 22px 20px; color: white; margin-bottom: 20px;
            box-shadow: 0 8px 24px rgba(67, 160, 71, 0.2); position: relative; overflow: hidden;
        }
        .db-left .db-label { font-size: 12px; color: rgba(255,255,255,0.85); font-weight: 400; }
        .db-left .db-pts-value { font-size: 34px; font-weight: 700; color: #ffffff; line-height: 1.2; margin-top: 2px; }
        .db-left .db-pts-unit { font-size: 16px; font-weight: 400; color: rgba(255,255,255,0.9); }
        
        .db-right-ticket { position: absolute; right: 20px; top: 50%; transform: translateY(-50%); text-align: right; display: flex; flex-direction: column; align-items: flex-end; }
        .db-right-ticket i { font-size: 32px; opacity: 0.35; margin-bottom: 12px; }
        .db-right-ticket .ticket-rate-label { font-size: 11px; color: rgba(255,255,255,0.75); background: rgba(0,0,0,0.1); padding: 2px 8px; border-radius: 6px; }

        /* TABS NAVIGATION BAR */
        .tabs-wrapper {
            margin-bottom: 18px; overflow-x: auto; white-space: nowrap;
            -webkit-overflow-scrolling: touch; padding-bottom: 4px; scrollbar-width: none;
        }
        .tabs-wrapper::-webkit-scrollbar { display: none; }
        .tabs-container { display: inline-flex; gap: 8px; width: 100%; }
        .tab-btn {
            flex: 1; padding: 8px 14px; font-size: 13px; font-weight: 500; color: #4a5568; 
            border: none; background: #e2e8f0; border-radius: 20px; cursor: pointer; 
            transition: all 0.2s ease; display: flex; align-items: center; justify-content: center; gap: 6px;
        }
        .tab-btn.active {
            background: #5d4037; color: #ffffff; font-weight: 600;
            box-shadow: 0 4px 10px rgba(93, 64, 55, 0.2);
        }

        /* COUPON LIST DESIGN */
        .coupon-list-container { min-height: 150px; }
        .coupon-card {
            background: #ffffff; border-radius: 18px; display: flex; margin-bottom: 14px;
            position: relative; overflow: hidden; box-shadow: 0 4px 14px rgba(0,0,0,0.03);
            border: 1px solid #edf2f7; min-height: 115px; animation: fadeIn 0.3s ease-in-out;
        }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: translateY(0); } }
        .coupon-card::after {
            content: ''; position: absolute; left: 16px; right: 16px; bottom: 32px;
            border-bottom: 1px dashed #e2e8f0; height: 1px; z-index: 1;
        }

        .cp-main-content { flex-grow: 1; padding: 16px 18px 42px 18px; display: flex; position: relative; gap: 14px; }
        .cp-icon-wrap { font-size: 26px; display: flex; align-items: flex-start; margin-top: 2px; }
        .cp-details { flex-grow: 1; display: flex; flex-direction: column; }
        .cp-title { font-size: 16px; font-weight: 600; color: #111827; line-height: 1.3; }
        .cp-desc { font-size: 13px; color: #718096; margin-top: 4px; font-weight: 300; }
        
        .cp-footer-bar {
            position: absolute; bottom: 0; left: 0; right: 0; height: 32px; 
            background: #fafafa; border-top: 1px solid #f1f5f9; padding: 0 18px;
            display: flex; align-items: center; justify-content: space-between;
        }
        .cp-expiry-text { font-size: 11px; color: #a0aec0; display: flex; align-items: center; gap: 4px; }
        .cp-pts-badge { font-size: 11px; color: #d97706; background: #fffbeb; padding: 1px 8px; border-radius: 6px; font-weight: 500; display: flex; align-items: center; gap: 3px; }

        .cp-action-side { width: 95px; flex-shrink: 0; display: flex; align-items: center; justify-content: center; padding-right: 14px; padding-bottom: 32px; }
        .cp-use-btn {
            width: 100%; padding: 8px 4px; color: white; border: none; border-radius: 12px;
            font-size: 12px; font-weight: 500; cursor: pointer; transition: all 0.2s; text-align: center;
        }
        
        /* ปุ่ม 3 สถานะใหม่ */
        .cp-use-btn.available { background: #78bc7c; } /* สีเขียว: พร้อมกดแลก */
        .cp-use-btn.redeemed { background: #3b82f6; box-shadow: 0 4px 10px rgba(59, 130, 246, 0.2); } /* สีฟ้า: แลกแล้ว ให้กดดู QR ซ้ำ */
        .cp-use-btn.locked { background: #cbd5e1; color: #94a3b8; cursor: not-allowed; } /* ล็อกเงื่อนไข */
        .cp-use-btn.used { background: #e2e8f0; color: #a0aec0; cursor: not-allowed; } /* พนักงานตัดสิทธิ์แล้ว */

        .empty-box { text-align: center; padding: 50px 20px; color: #a0aec0; font-size: 14px; width: 100%; }

        /* SLIDE-UP CONFIRMATION MODAL */
        .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); backdrop-filter: blur(4px); z-index: 1000; align-items: flex-end; justify-content: center; }
        .modal-overlay.show { display: flex; }
        .slide-up-box { background: white; border-top-left-radius: 26px; border-top-right-radius: 26px; padding: 24px 20px; width: 100%; max-width: 500px; text-align: center; position: relative; }
        .close-modal-btn { position: absolute; right: 20px; top: 20px; width: 30px; height: 30px; border-radius: 50%; background: #f1f5f9; border: none; color: #475569; cursor: pointer; }
        .confirm-title { font-size: 18px; font-weight: 600; color: #111827; margin-bottom: 20px; text-align: left; }
        .confirm-illustration { font-size: 55px; margin: 15px 0 10px 0; display: block; }
        .confirm-coupon-name { font-size: 19px; font-weight: 600; color: #111827; }
        .confirm-warning-text { font-size: 13px; color: #d97706; font-weight: 500; margin-top: 8px; margin-bottom: 24px; }
        .modal-btn-group { display: flex; gap: 12px; margin-top: 10px; }
        .btn-modal { flex: 1; padding: 14px 0; border-radius: 14px; font-size: 15px; font-weight: 600; cursor: pointer; border: none; }
        .btn-modal-cancel { background: #ffffff; border: 1px solid #e2e8f0; color: #6b7280; }
        .btn-modal-confirm { background: #ec4899; color: white; }

        /* QR CODE MODAL & STAFF INPUT */
        .qr-display-box { background: white; border-radius: 24px; padding: 26px; text-align: center; width: 90%; max-width: 325px; box-shadow: 0 20px 40px rgba(0,0,0,0.15); }
        .qr-wrapper-zone { background: #f8fafc; padding: 14px; border-radius: 16px; margin: 16px 0; display: flex; justify-content: center; border: 1px dashed #cbd5e1; }
        .staff-input-section { background: #f1f5f9; padding: 12px; border-radius: 14px; margin-top: 10px; margin-bottom: 10px; text-align: left; }
        .staff-input-label { font-size: 12px; font-weight: 600; color: #475569; margin-bottom: 6px; display: block; }
        .staff-amount-input { width: 100%; padding: 10px; border-radius: 8px; border: 1px solid #cbd5e1; font-size: 15px; font-weight: 600; text-align: right; margin-bottom: 8px; }
        .staff-trigger-btn { width: 100%; padding: 12px; background: #06c755; color: white; border: none; border-radius: 12px; font-size: 14px; font-weight: 600; cursor: pointer; }
    </style>
</head>
<body>

<div id="loading">
    <div class="spinner"></div>
    <p>กำลังเชื่อมต่อระบบความปลอดภัย...</p>
</div>

<div id="app">
    <div class="top-user-bar">
        <div class="profile-section">
            <div class="avatar-box"><img src="" id="user-avatar-img" alt="Profile"></div>
            <div>
                <div class="brand-title" id="user-display-name">Fat Myth Bear</div>
                <div class="brand-sub">บิงซูคาเฟ่ พรีเมียม</div>
            </div>
        </div>
        <div class="tier-indicator">
            <span id="badge-tier-icon">🥇</span> <span id="badge-tier-name">Gold</span>
        </div>
    </div>

    <div class="section-header-title"><i class="fa-solid fa-ticket"></i> คูปองสิทธิประโยชน์</div>

    <div class="dashboard-card">
        <div class="db-left">
            <div class="db-label">แต้มของคุณ</div>
            <div class="db-pts-value"><span id="user-points-val">0</span> <span class="db-pts-unit">pts</span></div>
        </div>
        <div class="db-right-ticket">
            <i class="fa-solid fa-receipt"></i>
            <span class="ticket-rate-label">25 บาท = 1 pts</span>
        </div>
    </div>

    <div class="tabs-wrapper">
        <div class="tabs-container">
            <button class="tab-btn active" onclick="switchTab('all', this)">ทั้งหมด</button>
            <button class="tab-btn" onclick="switchTab('discount', this)"><i class="fa-solid fa-money-bill-wave" style="color:#22c55e;"></i> ส่วนลด</button>
            <button class="tab-btn" onclick="switchTab('free', this)"><i class="fa-solid fa-gift" style="color:#ef4444;"></i> ฟรี</button>
            <button class="tab-btn" onclick="switchTab('topping', this)"><i class="fa-solid fa-cookie" style="color:#b45309;"></i> ท็อปปิ้ง</button>
            <button class="tab-btn" onclick="switchTab('special', this)"><i class="fa-solid fa-bolt" style="color:#eab308;"></i> พิเศษ</button>
        </div>
    </div>

    <div class="coupon-list-container" id="coupons-root"></div>
</div>

<div class="modal-overlay" id="confirm-modal">
    <div class="slide-up-box">
        <button class="close-modal-btn" onclick="closeConfirmModal()"><i class="fa-solid fa-xmark"></i></button>
        <div class="confirm-title">ยืนยันแลกรับคูปอง</div>
        <span class="confirm-illustration" id="md-illus">🎁</span>
        <div class="confirm-coupon-name" id="md-title">ชื่อคูปองรางวัล</div>
        <div class="confirm-warning-text" id="md-warn-points">จะหัก ⭐ 0 แต้ม</div>
        <div class="modal-btn-group">
            <button class="btn-modal btn-modal-cancel" onclick="closeConfirmModal()">ยกเลิก</button>
            <button class="btn-modal btn-modal-confirm" onclick="proceedToRedeem()">ยืนยัน ✓</button>
        </div>
    </div>
</div>

<div class="modal-overlay" id="qr-modal" style="align-items: center;">
    <div class="qr-display-box">
        <h3 style="font-size: 17px; font-weight: 600; color: #111827;" id="qr-modal-title">สแกนรหัสสิทธิ์</h3>
        <p style="font-size: 11px; color: #6b7280; margin-top: 4px;" id="qr-modal-id-label">VOUCHER ID: ------</p>
        
        <div class="qr-wrapper-zone">
            <div id="qr-canvas-render"></div>
        </div>
        
        <div class="staff-input-section">
            <label class="staff-input-label"><i class="fa-solid fa-calculator"></i> คำนวณแต้มเพิ่มจากบิลนี้ (25 บาท = 1 แต้ม)</label>
            <input type="number" id="staff-bill-amount" class="staff-amount-input" placeholder="0" value="0">
            <button class="staff-trigger-btn" onclick="executeStaffScanAction()">บันทึกบิล & ตัดสิทธิ์คูปอง</button>
        </div>

        <button class="btn-modal btn-modal-cancel" style="margin-top: 6px; width: 100%; padding: 10px; font-size: 13px;" onclick="closeQRModal()">ปิดหน้าต่าง (เก็บ QR ไว้ดูใหม่ได้)</button>
    </div>
</div>

<script>
    // ---------------- ข้อมูลการเชื่อมต่อ API ของแท้ ----------------
    var LIFF_ID = "2010298031-TOsCbkzl"; 
    var SUPABASE_URL = "https://iberkiyorordyculsjyu.supabase.co";
    var SUPABASE_KEY = "sb_publishable_f3Knp7KLRxfHiOJQXaXU1w_uylu5zov";
    
    var { createClient } = supabase;
    var db = createClient(SUPABASE_URL, SUPABASE_KEY);

    var currentUserId = "";
    var globalUserData = null;
    var activeCategoryFilter = "all";
    var selectedCouponData = null;
    var currentActiveCoupon = null;

    var TIER_RANKING = ["Bronze", "Silver", "Gold", "Platinum"];

    // ฐานข้อมูลคูปอง 5 หมวดหมู่ ตามเงื่อนไขที่กำหนด
    var MASTER_COUPON_SCHEMAS = [
        { 
            id: "cp_discount_50thb", tab: "discount", icon: "💸", iconColor: "#22c55e",
            title: "ส่วนลด 50 บาท", desc: "ใช้ได้ทุกสาขา ไม่มีขั้นต่ำในการสั่งซื้อ", 
            expiryStr: "หมดอายุ 30 มิ.ย. 68", pointsCost: 30, tierReq: "Bronze",
            ruleType: "points_deduct", ruleDesc: "หัก 30 แต้มจากบัตรสมาชิกทันทีเมื่อกดรับใช้งาน"
        },
        { 
            id: "cp_free_small_bingsu", tab: "free", icon: "🍓", iconColor: "#ef4444",
            title: "ฟรี Bingsu ถ้วยเล็ก", desc: "สิทธิพิเศษรายเดือนสำหรับสมาชิกระดับ Gold ขึ้นไป", 
            expiryStr: "หมดอายุ 30 มิ.ย. 68", pointsCost: 0, tierReq: "Gold",
            ruleType: "monthly_refresh", ruleDesc: "จำกัด 1 สิทธิ์/เดือน รีเฟรชอัตโนมัติ"
        },
        { 
            id: "cp_free_large_bingsu", tab: "free", icon: "🍧", iconColor: "#ec4899",
            title: "ฟรี Bingsu ถ้วยใหญ่เซ็ตใดก็ได้", desc: "เอกสิทธิ์ของรางวัลพิเศษสำหรับระดับ Platinum เท่านั้น", 
            expiryStr: "หมดอายุ 30 มิ.ย. 68", pointsCost: 0, tierReq: "Platinum",
            ruleType: "monthly_refresh", ruleDesc: "จำกัด 1 สิทธิ์/เดือน รีเฟรชอัตโนมัติ"
        },
        { 
            id: "cp_topping_free", tab: "topping", icon: "🧋", iconColor: "#b45309",
            title: "ท๊อปปิ้งฟรี 1 อย่าง", desc: "เลือกเพิ่มท็อปปิ้งฟรีเมนูใดก็ได้ 1 อย่าง", 
            expiryStr: "หมดอายุ 30 มิ.ย. 68", pointsCost: 6, tierReq: "Bronze",
            ruleType: "points_with_min_spend", ruleDesc: "ยอดบิลขั้นต่ำ 150 บาท / หัก 6 แต้ม"
        },
        { 
            id: "cp_special_bogo", tab: "special", icon: "🎁", iconColor: "#eab308",
            title: "Buy 1 Get 1 Free (บิงซูถ้วยเล็ก)", desc: "สิทธิ์ซื้อ 1 แถม 1 เฉพาะ จันทร์-พุธ-พฤหัส", 
            expiryStr: "หมดอายุ 30 มิ.ย. 68", pointsCost: 0, tierReq: "Gold",
            ruleType: "special_days_monthly", ruleDesc: "ใช้เฉพาะ จ. พ. พฤ. / รีเฟรชทุกเดือน"
        }
    ];

    async function init() {
        try {
            await liff.init({ liffId: LIFF_ID });
            if (!liff.isLoggedIn()) { liff.login(); return; }
            var profile = await liff.getProfile();
            currentUserId = profile.userId;
            document.getElementById("user-avatar-img").src = profile.pictureUrl || "https://cdn-icons-png.flaticon.com/512/847/847969.png";
            await loadUserDataAndRender();
        } catch (err) {
            console.error("LIFF Init Error:", err);
            alert("ระบบเกิดปัญหาในการยืนยันตัวตน โปรดลองใหม่อีกครั้ง");
        } finally {
            document.getElementById("loading").style.display = "none";
            document.getElementById("app").style.display = "block";
        }
    }

    async function loadUserDataAndRender() {
        var { data, error } = await db.from("profiles").select("*").eq("line_user_id", currentUserId).single();
        if (error || !data) {
            alert("ไม่พบข้อมูลบัญชีสมาชิกของคุณ โปรดลงทะเบียนก่อนเข้าใช้งานระบบคูปอง");
            globalUserData = { current_points: 0, total_exp: 0, tier: "Bronze", full_name: "ลูกค้า" };
        } else {
            globalUserData = data;
        }
        
        document.getElementById("user-display-name").textContent = globalUserData.full_name || "คุณสมาชิก VIP";
        document.getElementById("user-points-val").textContent = (globalUserData.current_points || 0).toLocaleString();
        
        var currentTier = globalUserData.tier || "Bronze";
        document.getElementById("badge-tier-name").textContent = currentTier;
        var iconMap = { "Bronze": "🥉", "Silver": "🥈", "Gold": "🥇", "Platinum": "💎" };
        document.getElementById("badge-tier-icon").textContent = iconMap[currentTier] || "🥉";

        buildCouponsLayout();
    }

    // สร้างกุญแจเก็บสถานะ: แยก "แลกแล้ว(redeemed)" ออกจาก "พนักงานใช้แล้ว(used)"
    function getKeys(coupon) {
        var currentMonthToken = `${new Date().getFullYear()}_${new Date().getMonth() + 1}`;
        var isMonthly = (coupon.ruleType === 'monthly_refresh' || coupon.ruleType === 'special_days_monthly');
        var suffix = isMonthly ? currentMonthToken : "forever";
        return {
            redeemedKey: `redeemed_${currentUserId}_${coupon.id}_${suffix}`,
            usedKey: `used_${currentUserId}_${coupon.id}_${suffix}`
        };
    }

    function switchTab(category, element) {
        document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
        element.classList.add('active');
        activeCategoryFilter = category;
        buildCouponsLayout();
    }

    // สร้างรายการคูปองพร้อมตรวจสอบ 3 สถานะ (ว่าง -> แลกแล้ว -> ถูกใช้ถาวร)
    function buildCouponsLayout() {
        var container = document.getElementById("coupons-root");
        container.innerHTML = "";

        var filteredCoupons = MASTER_COUPON_SCHEMAS.filter(cp => activeCategoryFilter === "all" || cp.tab === activeCategoryFilter);
        if (filteredCoupons.length === 0) {
            container.innerHTML = '<div class="empty-box">ไม่มีคูปองประเภทนี้ในระบบ</div>';
            return;
        }

        var userTierIdx = TIER_RANKING.indexOf(globalUserData.tier || "Bronze");
        var userPoints = globalUserData.current_points || 0;

        filteredCoupons.forEach(function(coupon) {
            var keys = getKeys(coupon);
            var isRedeemed = localStorage.getItem(keys.redeemedKey) === "TRUE";
            var isUsed = localStorage.getItem(keys.usedKey) === "TRUE";

            var reqTierIdx = TIER_RANKING.indexOf(coupon.tierReq);
            var isTierLocked = userTierIdx < reqTierIdx;
            var isPointsInsufficient = coupon.pointsCost > 0 && userPoints < coupon.pointsCost;

            var isDayLocked = false;
            if (coupon.ruleType === "special_days_monthly") {
                var dayOfWeek = new Date().getDay(); // 0=Sun, 1=Mon, 3=Wed, 4=Thu
                if (dayOfWeek !== 1 && dayOfWeek !== 3 && dayOfWeek !== 4) isDayLocked = true;
            }

            var actionBtnHtml = "";
            // ลำดับความสำคัญการแสดงปุ่ม: ใช้ถาวรแล้ว -> แลกแล้วเปิดดูซ้ำได้ -> เงื่อนไขไม่ผ่าน -> พร้อมกดแลก
            if (isUsed) {
                actionBtnHtml = `<button class="cp-use-btn used" disabled>ถูกใช้งานไปแล้ว</button>`;
            } else if (isRedeemed) {
                actionBtnHtml = `<button class="cp-use-btn redeemed" onclick="openQR('${coupon.id}')"><i class="fa-solid fa-qrcode"></i> กดดู QR Code อีกครั้ง</button>`;
            } else if (isTierLocked) {
                actionBtnHtml = `<button class="cp-use-btn locked" disabled>สิทธิ์ยศไม่ถึงขั้น</button>`;
            } else if (isPointsInsufficient) {
                actionBtnHtml = `<button class="cp-use-btn locked" disabled>แต้มสะสมไม่พอ</button>`;
            } else if (isDayLocked) {
                actionBtnHtml = `<button class="cp-use-btn locked" disabled>ใช้ได้เฉพาะ จ/พ/พฤ</button>`;
            } else {
                actionBtnHtml = `<button class="cp-use-btn available" onclick="triggerConfirmSlide('${coupon.id}')">ใช้เลย</button>`;
            }

            var cardHtml = `
                <div class="coupon-card">
                    <div class="cp-main-content">
                        <div class="cp-icon-wrap" style="color: ${coupon.iconColor};">${coupon.icon}</div>
                        <div class="cp-details">
                            <div class="cp-title">${coupon.title}</div>
                            <div class="cp-desc">${coupon.desc}</div>
                            <div style="font-size:11px; color:#ef4444; margin-top:2px;">* ${coupon.ruleDesc}</div>
                        </div>
                    </div>
                    <div class="cp-footer-bar">
                        <div class="cp-expiry-text"><i class="fa-regular fa-clock"></i> ${coupon.expiryStr}</div>
                        ${coupon.pointsCost > 0 ? `<div class="cp-pts-badge"><i class="fa-solid fa-star"></i> ${coupon.pointsCost} pts</div>` : ''}
                    </div>
                    <div class="cp-action-side">${actionBtnHtml}</div>
                </div>`;
            container.innerHTML += cardHtml;
        });
    }

    function triggerConfirmSlide(couponId) {
        selectedCouponData = MASTER_COUPON_SCHEMAS.find(c => c.id === couponId);
        if (!selectedCouponData) return;

        document.getElementById("md-illus").textContent = selectedCouponData.icon;
        document.getElementById("md-title").textContent = selectedCouponData.title;
        var warnText = document.getElementById("md-warn-points");
        
        if (selectedCouponData.pointsCost > 0) {
            warnText.textContent = `ระบบจะหัก ⭐ ${selectedCouponData.pointsCost} แต้ม ทันทีที่กดยืนยัน (สามารถเปิด QR ดูใหม่ได้ภายหลังหากยังไม่ยื่นให้พนักงาน)`;
            warnText.style.display = "block";
        } else {
            warnText.style.display = "none";
        }
        document.getElementById("confirm-modal").classList.add("show");
    }

    function closeConfirmModal() { document.getElementById("confirm-modal").classList.remove("show"); }

    // ตรรกะหักแต้มและบันทึกสถานะว่า "แลกแล้ว"
    async function proceedToRedeem() {
        if (!selectedCouponData || !globalUserData) return;
        var coupon = selectedCouponData;
        var currentBalance = parseInt(globalUserData.current_points) || 0;

        if (coupon.pointsCost > 0 && currentBalance < coupon.pointsCost) {
            alert(`ขออภัย แต้มคุณมีไม่เพียงพอ (${currentBalance} pts)`);
            closeConfirmModal(); return;
        }

        closeConfirmModal();
        document.getElementById("loading").style.display = "flex";
        document.getElementById("app").style.display = "none";

        try {
            if (coupon.pointsCost > 0) {
                var newBalance = Math.max(0, currentBalance - coupon.pointsCost);
                var { error } = await db.from("profiles").update({ current_points: newBalance }).eq("line_user_id", currentUserId);
                if (error) throw error;
            }

            // บันทึกว่า "แลกเก็บไว้ดู QR แล้ว"
            var keys = getKeys(coupon);
            localStorage.setItem(keys.redeemedKey, "TRUE");

            await loadUserDataAndRender();
            openQR(coupon.id);
        } catch (err) {
            alert("ระบบขัดข้อง ไม่สามารถแลกสิทธิ์ได้ในขณะนี้");
        } finally {
            document.getElementById("loading").style.display = "none";
            document.getElementById("app").style.display = "block";
        }
    }

    // ฟังก์ชันสร้างและเปิด QR Code ให้แสดง (เปิดซ้ำกี่ครั้งก็ได้ถ้ายังไม่ใช้สิทธิ์)
    function openQR(couponId) {
        var coupon = MASTER_COUPON_SCHEMAS.find(c => c.id === couponId);
        if (!coupon) return;
        currentActiveCoupon = coupon;

        document.getElementById("qr-modal-title").textContent = coupon.title;
        document.getElementById("qr-modal-id-label").textContent = `VOUCHER ID: ${coupon.id.toUpperCase().slice(-8)}`;
        document.getElementById("staff-bill-amount").value = "0"; 
        
        var qrTarget = document.getElementById("qr-canvas-render");
        qrTarget.innerHTML = ""; 
        var payload = `FMB_COUPON:${currentUserId}:${coupon.id}:${Date.now()}`;
        setTimeout(() => new QRCode(qrTarget, { text: payload, width: 160, height: 160, colorDark: "#1f2937", colorLight: "#ffffff", correctLevel: QRCode.CorrectLevel.H }), 100);

        document.getElementById("qr-modal").classList.add("show");
    }

    function closeQRModal() {
        document.getElementById("qr-modal").classList.remove("show");
        currentActiveCoupon = null;
    }

    // ฟังก์ชันของพนักงาน: คำนวณแต้มเพิ่ม และตัดสิทธิ์คูปองแบบถาวร (Used)
    async function executeStaffScanAction() {
        if (!currentActiveCoupon || !globalUserData) return;

        var billInput = document.getElementById("staff-bill-amount").value;
        var billAmount = parseFloat(billInput) || 0;
        var pointsEarned = Math.floor(billAmount / 25);

        var currentBalance = parseInt(globalUserData.current_points) || 0;
        var currentExp = parseInt(globalUserData.total_exp) || 0;
        
        var newBalance = currentBalance + pointsEarned;
        var newExp = currentExp + pointsEarned;

        var { error } = await db.from("profiles").update({ current_points: newBalance, total_exp: newExp }).eq("line_user_id", currentUserId);
        if (error) {
            alert("บันทึกบิลไม่สำเร็จ ระบบขัดข้อง"); return;
        }

        // ล็อกสถานะว่าพนักงาน "กดใช้งานสิทธิ์แล้ว" แบบถาวร
        var keys = getKeys(currentActiveCoupon);
        localStorage.setItem(keys.usedKey, "TRUE");

        alert(`พนักงานดำเนินการสำเร็จ!\nคูปองนี้ถูกตัดสิทธิ์เรียบร้อยแล้ว\n(ลูกค้าได้รับเพิ่ม +${pointsEarned} แต้มจากยอดบิล)`);
        
        closeQRModal();
        await loadUserDataAndRender();
    }

    init();
</script>
</body>
</html>
