    function safeParseDate(dateInput) {
        if (!dateInput) return new Date();
        if (dateInput instanceof Date) return dateInput;
        var str = dateInput.toString().replace(' ', 'T');
        return new Date(str);
    }

    function getCycleRange() {
        var now = new Date();
        var start = new Date(now);
        start.setHours(5, 0, 0, 0);
        if (now < start) {
            start.setDate(start.getDate() - 1);
        }
        var end = new Date(start);
        end.setDate(end.getDate() + 1);
        return { start: start, end: end };
    }

        if (ruleType === "monthly_refresh" || ruleType === "special_days_monthly") {
            var start = new Date(now.getFullYear(), now.getMonth(), 1, 5, 0, 0, 0);
            if (now < start) {
                start.setMonth(start.getMonth() - 1);
            }
            return start;
        } else {
            var start = new Date(now);
            start.setHours(5, 0, 0, 0);
            if (now < start) {
                start.setDate(start.getDate() - 1);
            }
            return start;
        }
    }

    function isCouponExpired(coupon) {
        if (!coupon.expiryDate) return false;
        var today = new Date();
        today.setHours(0,0,0,0);
        var exp = new Date(coupon.expiryDate);
        exp.setHours(0,0,0,0);
        return today > exp;
    }

    async function init() {
        try {
            await liff.init({ liffId: LIFF_ID });
            if (!liff.isLoggedIn()) { liff.login(); return; }
            var profile = await liff.getProfile();
            currentUserId = profile.userId;

            document.getElementById("user-avatar-img").src = profile.pictureUrl || "https://cdn-icons-png.flaticon.com/512/847/847969.png";

            await loadUserDataAndRender();

            document.getElementById("loading").style.display = "none";
            document.getElementById("app").style.display = "block";
        } catch (err) {
            console.error("LIFF Integration Failed:", err);
            document.getElementById("loading").innerHTML = '<p style="color:#ef4444; padding:20px;">เกิดข้อผิดพลาดในการเชื่อมต่อสิทธิ์สมาชิก</p>';
        }
    }

    async function loadUserDataAndRender() {
        try {
            var { data, error } = await db
                .from("profiles")
                .select("*")
                .eq("line_user_id", currentUserId)
                .single();

            if (error || !data) {
                alert("ไม่พบข้อมูลบัญชีสมาชิก VIP ของคุณ กรุณาลงทะเบียนผ่านหน้าบัตรหลักก่อนครับ");
                return;
            }

            globalUserData = data;
            
            document.getElementById("user-display-name").textContent = data.full_name || "คุณสมาชิก VIP";
            document.getElementById("user-points-val").textContent = (data.current_points || 0).toLocaleString();
            
            var currentTier = data.tier || "Bronze";
            document.getElementById("badge-tier-name").textContent = currentTier;
            
            var iconMap = { "Bronze": "🥉", "Silver": "🥈", "Gold": "🥇", "Platinum": "💎" };
            document.getElementById("badge-tier-icon").textContent = iconMap[currentTier] || "🥉";

            var cycle = getCycleRange();
            var { data: gClaims } = await db
                .from("fmb_coupon_claims")
                .select("coupon_id, created_at")
                .gte("created_at", cycle.start.toISOString());
            globalClaims = gClaims || [];

            var now = new Date();
            var monthlyLimit = new Date(now.getFullYear(), now.getMonth() - 1, 1, 5, 0, 0, 0);
            
            var { data: uClaims } = await db
                .from("fmb_coupon_claims")
                .select("*")
                .eq("line_user_id", currentUserId)
                .gte("created_at", monthlyLimit.toISOString());
            userClaims = uClaims || [];

            buildCouponsLayout();
        } catch (e) {
            console.error("Fetch profile stats error:", e);
        }
    }

    function switchTab(category, element) {
        var buttons = document.querySelectorAll('.tab-btn');
        buttons.forEach(function(btn) { btn.classList.remove('active'); });
        element.classList.add('active');
        activeCategoryFilter = category;
        buildCouponsLayout();
    }

    function buildCouponsLayout() {
        var container = document.getElementById("coupons-root");
        container.innerHTML = "";

        var filteredCoupons = MASTER_COUPON_SCHEMAS.filter(function(cp) {
            return activeCategoryFilter === "all" || cp.tab === activeCategoryFilter;
        });

        if (filteredCoupons.length === 0) {
            container.innerHTML = '<div class="empty-box"><i class="fa-solid fa-ticket-simple"></i>ไม่มีคูปองประเภทนี้ในระบบในขณะนี้</div>';
            return;
        }

        var userTier = globalUserData.tier || "Bronze";
        var userPoints = globalUserData.current_points || 0;
        var userTierIdx = TIER_RANKING.indexOf(userTier);
        var currentCycle = getCycleRange();

        var availableCouponsCounter = 0;

        filteredCoupons.forEach(function(coupon) {
            var reqTierIdx = TIER_RANKING.indexOf(coupon.tierReq);
            var cycleStart = getCouponStartCycle(coupon.ruleType);

            var globalCount = globalClaims.filter(function(c) { 
                return c.coupon_id === coupon.id && safeParseDate(c.created_at) >= currentCycle.start; 
            }).length;

            var couponUserClaims = userClaims.filter(function(c) { return c.coupon_id === coupon.id; });

            var isAlreadyUsed = couponUserClaims.some(function(c) { 
                return c.status === 'used' && safeParseDate(c.created_at) >= cycleStart; 
            });

            var activeClaim = couponUserClaims.find(function(c) {
                return c.status === 'claimed' && (new Date() - safeParseDate(c.created_at) <= 24 * 60 * 60 * 1000);
            });

            var isExpired = isCouponExpired(coupon);
            var isTierLocked = userTierIdx < reqTierIdx;
            var isPointsInsufficient = coupon.pointsCost > 0 && userPoints < coupon.pointsCost;

            var isDayLocked = false;
            if (coupon.ruleType === "special_days_monthly") {
                var dayOfWeek = new Date().getDay();
                if (dayOfWeek !== 1 && dayOfWeek !== 3 && dayOfWeek !== 4) {
                    isDayLocked = true;
                }
            }

            var actionBtnHtml = "";
            if (isAlreadyUsed) {
                actionBtnHtml = `<button class="cp-use-btn used" disabled>ใช้แล้ว</button>`;
            } else if (isExpired) {
                actionBtnHtml = `<button class="cp-use-btn locked" disabled>หมดอายุ</button>`;
            } else if (activeClaim) {
                availableCouponsCounter++;
                actionBtnHtml = `<button class="cp-use-btn view-qr" onclick="showExistingQR('${coupon.id}')">ดู QR Code</button>`;
            } else if (coupon.dailyQuota && globalCount >= coupon.dailyQuota) {
                actionBtnHtml = `<button class="cp-use-btn locked" disabled>หมดแล้ววันนี้</button>`;
            } else if (isTierLocked) {
                actionBtnHtml = `<button class="cp-use-btn locked" disabled>ยศไม่ถึง</button>`;
            } else if (isPointsInsufficient) {
                actionBtnHtml = `<button class="cp-use-btn locked" disabled>แต้มไม่พอ</button>`;
            } else if (isDayLocked) {
                actionBtnHtml = `<button class="cp-use-btn locked" disabled>ไม่ตรงวัน</button>`;
            } else {
                availableCouponsCounter++;
                actionBtnHtml = `<button class="cp-use-btn" onclick="triggerConfirmSlide('${coupon.id}')">ใช้เลย</button>`;
            }

            var cardElement = document.createElement("div");
            cardElement.className = "coupon-card";
            
            cardElement.innerHTML = `
                <div class="cp-main-content">
                    <div class="cp-icon-wrap" style="color: ${coupon.iconColor};">${coupon.icon}</div>
                    <div class="cp-details">
                        <div class="cp-title">${coupon.title}</div>
                        <div class="cp-desc">${coupon.desc}</div>
                        <div style="font-size:11px; color:#ef4444; font-weight:400; margin-top:2px;">* ${coupon.ruleDesc}</div>
                    </div>
                </div>
                <div class="cp-footer-bar">
                    <div class="cp-expiry-text"><i class="fa-regular fa-clock"></i> ${coupon.expiryStr}</div>
                    ${coupon.pointsCost > 0 ? `<div class="cp-pts-badge"><i class="fa-solid fa-star"></i> ${coupon.pointsCost} pts</div>` : ''}
                </div>
                <div class="cp-action-side">
                    ${actionBtnHtml}
                </div>
            `;
            container.appendChild(cardElement);
        });

        if (activeCategoryFilter === "all") {
            document.getElementById("user-summary-coupon-count").textContent = `คูปองใช้ได้ ${availableCouponsCounter} ใบ`;
        }
    }

    function triggerConfirmSlide(couponId) {
        var coupon = MASTER_COUPON_SCHEMAS.find(c => c.id === couponId);
        if (!coupon) {
            alert("ไม่พบคูปองในระบบโครงสร้างข้อมูลหลัก");
            return;
        }

        selectedCouponData = coupon;
        document.getElementById("md-illus").textContent = coupon.icon;
        document.getElementById("md-title").textContent = coupon.title;
        document.getElementById("md-desc").textContent = coupon.ruleDesc;
        
        var warnText = document.getElementById("md-warn-points");
        if (coupon.pointsCost > 0) {
            warnText.textContent = `จะหัก ⭐ ${coupon.pointsCost} แต้ม จากบัตรสมาชิกของท่านทันที`;
            warnText.style.display = "block";
        } else {
            warnText.textContent = "สิทธิ์โปรโมชั่นฟรีประจำวัน (ไม่มีค่าใช้จ่ายคะแนน)";
            warnText.style.display = "block";
        }

        document.getElementById("confirm-modal").classList.add("show");
    }

    function closeConfirmModal() {
        document.getElementById("confirm-modal").classList.remove("show");
    }

    async function proceedToQR() {
        if (!selectedCouponData || !globalUserData) {
            alert("ไม่พบข้อมูลคูปองที่เลือก กรุณาลองใหม่อีกครั้ง");
            return;
        }

        var coupon = selectedCouponData;
        var currentBalance = parseInt(globalUserData.current_points) || 0;

        if (coupon.pointsCost > 0 && currentBalance < coupon.pointsCost) {
            alert(`ขออภัย: แต้มคงเหลือของคุณ (${currentBalance} pts) ไม่เพียงพอต่อการแลกคูปองนี้`);
            closeConfirmModal();
            return;
        }

        var cycle = getCycleRange();
        var { data: checkClaims } = await db
            .from("fmb_coupon_claims")
            .select("id")
            .eq("coupon_id", coupon.id)
            .gte("created_at", cycle.start.toISOString());

        if (coupon.dailyQuota && checkClaims && checkClaims.length >= coupon.dailyQuota) {
            alert("ขออภัย: คูปองนี้ถูกลูกค้าท่านอื่นกดแลกครบ 30 ใบของวันนี้เต็มเรียบร้อยแล้วครับ");
            closeConfirmModal();
            await loadUserDataAndRender();
            return;
        }

        closeConfirmModal();
        
        document.getElementById("loading").style.display = "flex";
        document.getElementById("app").style.display = "none";

        var updatedPointsBalance = currentBalance - coupon.pointsCost;
        if (updatedPointsBalance < 0) updatedPointsBalance = 0;

        // 1. อัปเดตคะแนนลง Supabase
        var { error } = await db
            .from("profiles")
            .update({ current_points: updatedPointsBalance })
            .eq("line_user_id", currentUserId);

        if (error) {
            console.error("Supabase Error:", error);
            alert("ระบบ Cloud ขัดข้อง ไม่สามารถตัดแต้มสิทธิ์ได้ในขณะนี้ กรุณาลองใหม่อีกครั้ง");
            document.getElementById("loading").style.display = "none";
            document.getElementById("app").style.display = "block";
            return;
        }

        // 2. [FIXED 100%] บันทึกประวัติการเคลมสถานะ 'claimed' โดยใช้ระบบตรวจจับและดึงข้อมูลทดแทน RLS Quirk
        var compiledPayload = `FAT_MYTH_BEAR_CLAIMED:${currentUserId}:${coupon.id}:${Date.now()}`;
        activeClaimObj = null;
        
        var { data: insertedRows, error: claimErr } = await db
            .from("fmb_coupon_claims")
            .insert([{
                line_user_id: currentUserId,
                coupon_id: coupon.id,
                status: 'claimed',
                qr_payload: compiledPayload
            }])
            .select();

        // ตรวจสอบและแก้ไขกรณี RLS ยอมเขียนข้อมูลเข้า Table แต่ขัดแย้งกับคำสั่ง Returning แบบ Array
        if (!claimErr && insertedRows && insertedRows.length > 0) {
            activeClaimObj = insertedRows[0];
        } else if (!claimErr) {
            // Fallback Lookup Engine: ค้นหาประวัติล่าสุดทันทีเพื่อเชื่อม Object ดึง Voucher ID ไปเจน QR Code
            await new Promise(resolve => setTimeout(resolve, 250)); // ดีเลย์สั้นๆ เพื่อให้คลาวด์ซิงค์สมบูรณ์
            var { data: backupRows, error: backupErr } = await db
                .from("fmb_coupon_claims")
                .select("*")
                .eq("line_user_id", currentUserId)
                .eq("coupon_id", coupon.id)
                .eq("status", "claimed")
                .order("created_at", { ascending: false })
                .limit(1);

            if (!backupErr && backupRows && backupRows.length > 0) {
                activeClaimObj = backupRows[0];
            } else {
                claimErr = backupErr || new Error("RLS Fetch Timeout");
            }
        }

        if (claimErr) {
            console.error("Insert Claim Error:", claimErr);
            alert("ระบบบันทึกตั๋วขัดข้อง แต่คะแนนถูกหักแล้ว กรุณาแจ้งพนักงานหน้าร้านเพื่อตรวจสอบประวัติคะแนน");
            await loadUserDataAndRender();
            document.getElementById("loading").style.display = "none";
            document.getElementById("app").style.display = "block";
            return;
        }

        await loadUserDataAndRender();

        document.getElementById("loading").style.display = "none";
        document.getElementById("app").style.display = "block";

        // 3. แสดงผลหน้าต่าง QR Code
        document.getElementById("qr-modal-title").textContent = coupon.title;
        document.getElementById("qr-modal-id-label").textContent = `VOUCHER ID: ${coupon.id.toUpperCase().slice(-8)}`;
        document.getElementById("staff-bill-amount").value = "0"; 
        document.getElementById("qr-modal").classList.add("show");

        var qrTarget = document.getElementById("qr-canvas-render");
        qrTarget.innerHTML = ""; 

        new QRCode(qrTarget, {
            text: compiledPayload,
            width: 160,
            height: 160,
            colorDark : "#1f2937",
            colorLight : "#ffffff",
            correctLevel : QRCode.CorrectLevel.H
        });
    }

    function showExistingQR(couponId) {
        var coupon = MASTER_COUPON_SCHEMAS.find(c => c.id === couponId);
        if (!coupon) return;

        if (isCouponExpired(coupon)) {
            alert("ขออภัย: คูปองนี้หมดอายุระยะเวลาจัดรายการแล้ว ไม่สามารถดู QR Code ได้");
            loadUserDataAndRender();
            return;
        }

        selectedCouponData = coupon;

        var activeClaim = userClaims.find(function(c) {
            return c.coupon_id === couponId && c.status === 'claimed' && (new Date() - safeParseDate(c.created_at) <= 24 * 60 * 60 * 1000);
        });

        if (!activeClaim) {
            alert("ไม่พบประวัติการแลกรับสิทธิ์ หรือตั๋วของท่านหมดอายุเกิน 24 ชม. แล้ว");
            loadUserDataAndRender();
            return;
        }

        activeClaimObj = activeClaim;

        document.getElementById("qr-modal-title").textContent = coupon.title;
        document.getElementById("qr-modal-id-label").textContent = `VOUCHER ID: ${coupon.id.toUpperCase().slice(-8)}`;
        document.getElementById("staff-bill-amount").value = "0"; 
        document.getElementById("qr-modal").classList.add("show");

        var qrTarget = document.getElementById("qr-canvas-render");
        qrTarget.innerHTML = ""; 

        new QRCode(qrTarget, {
            text: activeClaim.qr_payload,
            width: 160,
            height: 160,
            colorDark : "#1f2937",
            colorLight : "#ffffff",
            correctLevel : QRCode.CorrectLevel.H
        });
    }

    async function closeQRModal() {
        document.getElementById("qr-modal").classList.remove("show");
        selectedCouponData = null;
        activeClaimObj = null;
        await loadUserDataAndRender();
    }

    async function executeStaffScanAction() {
        if (!globalUserData) {
            alert("ข้อผิดพลาด: ไม่พบโปรไฟล์ข้อมูลลูกค้ากลุ่มนี้ในระบบ");
            return;
        }

        if (!activeClaimObj) {
            alert("ไม่พบข้อมูลสิทธิ์คูปองที่กำลังใช้งาน กรุณาลองเปิด QR Code ใหม่อีกครั้ง");
            return;
        }

        document.getElementById("loading").style.display = "flex";
        document.getElementById("qr-modal").classList.remove("show");

        var { error: claimUpdateErr } = await db
            .from("fmb_coupon_claims")
            .update({ status: 'used' })
            .eq("id", activeClaimObj.id);

        if (claimUpdateErr) {
            console.error("Failed to invalidate coupon:", claimUpdateErr);
            alert("เกิดข้อผิดพลาดในการตัดสิทธิ์คูปองบนระบบ Cloud กรุณาลองใหม่อีกครั้ง");
            document.getElementById("loading").style.display = "none";
            document.getElementById("qr-modal").classList.add("show");
            return;
        }

        var billAmountInput = document.getElementById("staff-bill-amount").value;
        var billAmount = parseFloat(billAmountInput) || 0;
        
        if (billAmount <= 0) {
            alert("🎉 ดำเนินการตัดสิทธิ์คูปองหน้าร้านเรียบร้อยแล้ว! (ไม่มีการสะสมแต้มเพิ่มจากยอดบิล)");
            activeClaimObj = null;
            selectedCouponData = null;
            await loadUserDataAndRender();
            document.getElementById("loading").style.display = "none";
            return;
        }
        
        var pointsEarnedFromBill = Math.floor(billAmount / 25);

        var { data: freshProfile } = await db
            .from("profiles")
            .select("current_points, total_exp")
            .eq("line_user_id", currentUserId)
            .single();

        var currentBalance = freshProfile ? freshProfile.current_points : (parseInt(globalUserData.current_points) || 0);
        var currentTotalExp = freshProfile ? freshProfile.total_exp : (parseInt(globalUserData.total_exp) || 0);

        var finalPoints = currentBalance + pointsEarnedFromBill;
        var finalExp = currentTotalExp + pointsEarnedFromBill;

        var { error } = await db
            .from("profiles")
            .update({ 
                current_points: finalPoints,
                total_exp: finalExp
            })
            .eq("line_user_id", currentUserId);

        if (error) {
            alert("เกิดข้อผิดพลาดในการบันทึกเพิ่มคะแนนบิลลงคลาวด์ แต่คูปองถูกใช้สิทธิ์ไปแล้วเรียบร้อย");
        } else {
            alert(`🎉 ดำเนินการสำเร็จ!\nชื่อสมาชิก: ${globalUserData.full_name}\nได้รับแต้มสะสมจากยอดซื้อบิล (25 บ. = 1 แต้ม): +${pointsEarnedFromBill} แต้ม\nคะแนนสุทธิปัจจุบันคงเหลือ: ${finalPoints} แต้ม`);
        }
        
        activeClaimObj = null;
        selectedCouponData = null;
        await loadUserDataAndRender();
        document.getElementById("loading").style.display = "none";
    }

    init();
</script>
