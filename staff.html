<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Staff Scanner - Fat Myth Bear</title>
    <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Kanit', sans-serif; background: #f0f0f0; min-height: 100vh; }

        #loading {
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            height: 100vh; gap: 12px; color: #666;
        }
        .spinner {
            width: 40px; height: 40px; border: 4px solid #ddd;
            border-top-color: #06c755; border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        #app { display: none; padding: 16px; }

        .header {
            background: #1a1a2e; color: white; border-radius: 16px;
            padding: 16px 20px; margin-bottom: 16px;
            display: flex; justify-content: space-between; align-items: center;
        }
        .header-title { font-size: 18px; font-weight: 700; }
        .header-sub   { font-size: 12px; opacity: 0.7; margin-top: 2px; }
        .staff-badge  {
            background: #06c755; color: white;
            padding: 4px 12px; border-radius: 99px; font-size: 12px; font-weight: 700;
        }

        .card {
            background: white; border-radius: 16px;
            padding: 20px; margin-bottom: 16px;
        }
        .card-title {
            font-size: 15px; font-weight: 600; color: #333;
            margin-bottom: 16px;
        }

        .scan-btn {
            width: 100%; padding: 16px; background: #1a1a2e; color: white;
            border: none; border-radius: 12px; font-size: 16px; font-weight: 600;
            cursor: pointer; margin-bottom: 12px;
            display: flex; align-items: center; justify-content: center; gap: 8px;
        }
        .scan-btn:disabled { background: #aaa; cursor: not-allowed; }

        .divider {
            text-align: center; color: #999; font-size: 13px;
            margin: 12px 0; position: relative;
        }
        .divider::before, .divider::after {
            content: ""; position: absolute; top: 50%;
            width: 42%; height: 1px; background: #eee;
        }
        .divider::before { left: 0; }
        .divider::after  { right: 0; }

        .input-row { display: flex; gap: 8px; margin-top: 8px; }
        .id-input {
            flex: 1; padding: 12px; border: 1.5px solid #ddd;
            border-radius: 10px; font-size: 16px; text-transform: uppercase;
            letter-spacing: 2px; text-align: center; outline: none;
        }
        .id-input:focus { border-color: #06c755; }
        .search-btn {
            padding: 12px 16px; background: #06c755; color: white;
            border: none; border-radius: 10px; font-size: 14px;
            font-weight: 700; cursor: pointer; white-space: nowrap;
        }
        .id-hint { font-size: 11px; color: #999; text-align: center; margin-top: 6px; }

        .member-found {
            background: #f0fff4; border: 1.5px solid #06c755;
            border-radius: 12px; padding: 14px; margin-bottom: 12px;
        }
        .member-name { font-size: 16px; font-weight: 700; color: #333; }
        .member-info { font-size: 13px; color: #666; margin-top: 4px; }
        .tier-badge {
            display: inline-block; padding: 2px 10px;
            border-radius: 99px; font-size: 12px; font-weight: 600; margin-top: 6px;
        }
        .tier-Bronze   { background: #cd7f3220; color: #a0522d; }
        .tier-Silver   { background: #a8a9ad20; color: #666; }
        .tier-Gold     { background: #ffd70030; color: #b8860b; }
        .tier-Platinum { background: #667eea20; color: #534AB7; }

        .amount-label { font-size: 14px; color: #666; margin-bottom: 8px; }
        .amount-input {
            width: 100%; padding: 14px; border: 1.5px solid #ddd;
            border-radius: 12px; font-size: 28px; font-weight: 700;
            text-align: center; color: #333; outline: none;
        }
        .amount-input:focus { border-color: #06c755; }
        .amount-hint { font-size: 12px; color: #999; text-align: center; margin-top: 6px; }

        .points-preview {
            background: #f8f8f8; border-radius: 10px;
            padding: 12px; margin: 12px 0; text-align: center;
        }
        .points-preview-label { font-size: 13px; color: #666; }
        .points-preview-val   { font-size: 32px; font-weight: 700; color: #06c755; }
        .points-preview-warn  { font-size: 11px; color: #e67e22; margin-top: 4px; }

        .submit-btn {
            width: 100%; padding: 16px; background: #06c755; color: white;
            border: none; border-radius: 12px; font-size: 16px; font-weight: 700; cursor: pointer;
        }
        .submit-btn:disabled { background: #aaa; cursor: not-allowed; }

        .back-btn {
            width: 100%; padding: 10px; background: none; border: none;
            color: #999; cursor: pointer; margin-top: 8px; font-size: 13px;
        }

        #success-screen {
            display: none; text-align: center; padding: 60px 20px;
        }
        .success-icon  { font-size: 72px; margin-bottom: 16px; }
        .success-title { font-size: 24px; font-weight: 700; color: #06c755; }
        .success-sub   { font-size: 14px; color: #666; margin-top: 10px; line-height: 1.6; }
        .next-btn {
            margin-top: 28px; padding: 14px 32px;
            background: #1a1a2e; color: white; border: none;
            border-radius: 12px; font-size: 15px; cursor: pointer; font-weight: 600;
        }

        .error-msg { color: #e74c3c; font-size: 13px; text-align: center; margin-top: 8px; }
    </style>
</head>
<body>

<div id="loading">
    <div class="spinner"></div>
    <p>กำลังโหลดระบบพนักงาน...</p>
</div>

<div id="app">
    <div class="header">
        <div>
            <div class="header-title">Staff Scanner</div>
            <div class="header-sub" id="staff-name">Fat Myth Bear</div>
        </div>
        <span class="staff-badge">STAFF</span>
    </div>

    <!-- Step 1: Scan -->
    <div class="card" id="step-scan">
        <div class="card-title">📷 ค้นหาสมาชิก</div>
        <button class="scan-btn" id="scan-qr-btn" onclick="scanQR()">
            <span>📷</span> สแกน QR Code
        </button>
        <div class="divider">หรือกรอกรหัสสมาชิก</div>
        <div class="input-row">
            <input type="text" id="manual-id" class="id-input"
                placeholder="เช่น CCA86496" maxlength="34">
            <button class="search-btn" onclick="lookupManual()">ค้นหา</button>
        </div>
        <div class="id-hint">กรอกรหัส 8 หลักบนบัตรสมาชิก หรือ LINE User ID เต็ม</div>
        <p class="error-msg" id="scan-error"></p>
    </div>

    <!-- Step 2: Amount -->
    <div class="card" id="step-amount" style="display:none;">
        <div class="card-title">💰 กรอกยอดซื้อ</div>

        <div class="member-found">
            <div class="member-name" id="found-name">-</div>
            <div class="member-info">
                แต้ม: <b id="found-points">0</b> &nbsp;|&nbsp; EXP: <b id="found-exp">0</b>
            </div>
            <span class="tier-badge" id="found-tier-badge">Bronze</span>
        </div>

        <div class="amount-label">ยอดซื้อ (บาท)</div>
        <input type="number" id="amount-input" class="amount-input"
            placeholder="0" min="0" oninput="calcPoints()">
        <div class="amount-hint">ทุก 25 บาท = 1 แต้ม (ปัดเศษทิ้ง)</div>

        <div class="points-preview">
            <div class="points-preview-label">แต้มที่จะได้รับ</div>
            <div class="points-preview-val" id="preview-points">0</div>
            <div class="points-preview-warn" id="cap-warn"></div>
        </div>

        <button class="submit-btn" id="submit-btn" onclick="submitPoints()" disabled>
            บันทึกแต้ม
        </button>
        <p class="error-msg" id="submit-error"></p>
        <button class="back-btn" onclick="resetAll()">← ค้นหาใหม่</button>
    </div>
</div>

<!-- Success -->
<div id="success-screen">
    <div class="success-icon">🎉</div>
    <div class="success-title">บันทึกแต้มสำเร็จ!</div>
    <div class="success-sub" id="success-detail"></div>
    <button class="next-btn" onclick="resetAll()">สแกนลูกค้าคนต่อไป</button>
</div>

<script>
    var LIFF_ID      = "2010298031-ZjU27ew1";
    var SUPABASE_URL = "https://iberkiyorordyculsjyu.supabase.co";
    var SUPABASE_KEY = "sb_publishable_f3Knp7KLRxfHiOJQXaXU1w_uylu5zov";
    var MAX_PER_BILL = 200;
    var MAX_PER_DAY  = 400;

    var { createClient } = supabase;
    var db = createClient(SUPABASE_URL, SUPABASE_KEY);

    var foundMember = null;

    async function init() {
        try {
            await liff.init({ liffId: LIFF_ID });
            if (!liff.isLoggedIn()) {
                liff.login();
                return;
            }

            if (!liff.isInClient()) {
                document.getElementById("loading").innerHTML = 
                    '<p style="color:red;padding:20px;text-align:center">⚠️ ต้องเปิดผ่าน LINE OA เท่านั้น<br><small>กรุณากดปุ่มจาก Rich Menu</small></p>';
                return;
            }

            var profile = await liff.getProfile();
            var { data, error } = await db
                .from("profiles")
                .select("full_name, role")
                .eq("line_user_id", profile.userId)
                .single();

            if (error || !data || (data.role !== "Staff" && data.role !== "Admin")) {
                document.getElementById("loading").innerHTML =
                    '<p style="color:red;padding:20px;text-align:center">⛔ คุณไม่มีสิทธิ์เข้าถึงหน้านี้<br><small>กรุณาติดต่อ Admin</small></p>';
                return;
            }

            document.getElementById("staff-name").textContent = data.full_name;
            document.getElementById("loading").style.display = "none";
            document.getElementById("app").style.display = "block";

        } catch (err) {
            document.getElementById("loading").innerHTML =
                '<p style="color:red">เกิดข้อผิดพลาด: ' + err.message + '</p>';
        }
    }

    async function scanQR() {
        document.getElementById("scan-qr-btn").disabled = true;
        document.getElementById("scan-qr-btn").textContent = "📷 กำลังเปิดกล้อง...";
        document.getElementById("scan-error").textContent = "";

        try {
            var result = await liff.scanCodeV2();
            if (result && result.value) {
                await lookupMember(result.value);
            }
        } catch (err) {
            var errorMsg = err.message || err.toString();
            
            if (errorMsg.includes("SCAN_FAILED_USER_CANCELLED") || errorMsg.includes("cancelled")) {
                document.getElementById("scan-error").textContent = "ยกเลิกการสแกน";
            } else if (errorMsg.includes("QR_CODE_NOT_FOUND") || errorMsg.includes("not found")) {
                document.getElementById("scan-error").textContent = "ไม่พบ QR Code";
            } else if (errorMsg.includes("PERMISSION")) {
                document.getElementById("scan-error").textContent = "ต้องอนุญาตให้เข้าถึงกล้อง";
            } else {
                document.getElementById("scan-error").textContent = "สแกนไม่สำเร็จ: " + errorMsg;
            }
        } finally {
            document.getElementById("scan-qr-btn").disabled = false;
            document.getElementById("scan-qr-btn").textContent = "📷 สแกน QR Code";
        }
    }

    async function lookupManual() {
        var input = document.getElementById("manual-id").value.trim().toUpperCase();
        if (!input) {
            document.getElementById("scan-error").textContent = "กรุณากรอกรหัสสมาชิก";
            return;
        }
        document.getElementById("scan-error").textContent = "";

        try {
            var { data, error } = await db
                .from("profiles")
                .select("line_user_id, full_name, current_points, current_exp, tier")
                .ilike("line_user_id", "%" + input);

            if (error || !data || data.length === 0) {
                document.getElementById("scan-error").textContent = "ไม่พบสมาชิกในระบบ";
                return;
            }
            await lookupMember(data[0].line_user_id);
        } catch (err) {
            document.getElementById("scan-error").textContent = "เกิดข้อผิดพลาด: " + err.message;
        }
    }

    async function lookupMember(lineUserId) {
        document.getElementById("scan-error").textContent = "";
        try {
            var { data, error } = await db
                .from("profiles")
                .select("line_user_id, full_name, current_points, current_exp, tier")
                .eq("line_user_id", lineUserId)
                .single();

            if (error || !data) {
                document.getElementById("scan-error").textContent = "ไม่พบสมาชิกในระบบ";
                return;
            }

            foundMember = data;
            document.getElementById("found-name").textContent   = data.full_name;
            document.getElementById("found-points").textContent = data.current_points.toLocaleString();
            document.getElementById("found-exp").textContent    = data.current_exp.toLocaleString();
            var badge = document.getElementById("found-tier-badge");
            badge.textContent = data.tier;
            badge.className   = "tier-badge tier-" + data.tier;

            document.getElementById("step-scan").style.display   = "none";
            document.getElementById("step-amount").style.display = "block";
            document.getElementById("amount-input").focus();

        } catch (err) {
            document.getElementById("scan-error").textContent = "เกิดข้อผิดพลาด: " + err.message;
        }
    }

    async function calcPoints() {
        var amount = parseInt(document.getElementById("amount-input").value) || 0;
        var pts = Math.floor(amount / 25);
        var warn = "";

        if (pts > MAX_PER_BILL) { 
            pts = MAX_PER_BILL; 
            warn = "⚠️ จำกัดสูงสุด " + MAX_PER_BILL + " แต้ม/บิล"; 
        }

        if (foundMember && pts > 0) {
            var todayStart = new Date(); 
            todayStart.setHours(0,0,0,0);
            var { data } = await db
                .from("point_transactions")
                .select("points")
                .eq("line_user_id", foundMember.line_user_id)
                .eq("type", "earn")
                .gte("created_at", todayStart.toISOString());

            var todayTotal = (data || []).reduce(function(s, r) { return s + r.points; }, 0);
            var remaining  = Math.max(0, MAX_PER_DAY - todayTotal);
            if (pts > remaining) { 
                pts = remaining; 
                warn = "⚠️ ถึงเพดานวันนี้แล้ว เพิ่มได้อีก " + remaining + " แต้ม"; 
            }
        }

        document.getElementById("preview-points").textContent = pts;
        document.getElementById("cap-warn").textContent       = warn;
        document.getElementById("submit-btn").disabled        = pts <= 0 || amount <= 0;
    }

    async function submitPoints() {
        var amount = parseInt(document.getElementById("amount-input").value) || 0;
        var pts    = parseInt(document.getElementById("preview-points").textContent) || 0;
        if (pts <= 0 || !foundMember) return;

        document.getElementById("submit-btn").disabled    = true;
        document.getElementById("submit-btn").textContent = "กำลังบันทึก...";
        document.getElementById("submit-error").textContent = "";

        try {
            var expiresAt = new Date();
            expiresAt.setDate(expiresAt.getDate() + 180);

            var { error: txErr } = await db.from("point_transactions").insert({
                line_user_id: foundMember.line_user_id,
                points: pts, 
                exp: pts, 
                type: "earn",
                description: "ซื้อสินค้า " + amount.toLocaleString() + " บาท",
                amount_spent: amount,
                expires_at: expiresAt.toISOString()
            });
            if (txErr) throw txErr;

            var newPoints = (foundMember.current_points || 0) + pts;
            var newExp    = (foundMember.current_exp    || 0) + pts;
            var newTier   = calcTier(newExp);

            var { error: upErr } = await db.from("profiles")
                .update({ current_points: newPoints, current_exp: newExp, tier: newTier })
                .eq("line_user_id", foundMember.line_user_id);
            if (upErr) throw upErr;

            document.getElementById("app").style.display            = "none";
            document.getElementById("success-screen").style.display = "block";
            document.getElementById("success-detail").innerHTML =
                '<b>' + foundMember.full_name + '</b><br>' +
                'ได้รับ <b style="color:#06c755">' + pts + ' แต้ม</b> จากยอดซื้อ ' + amount.toLocaleString() + ' บาท<br>' +
                'แต้มรวม: ' + newPoints.toLocaleString() + ' | ระดับ: ' + newTier;

        } catch (err) {
            document.getElementById("submit-error").textContent = "บันทึกไม่สำเร็จ: " + err.message;
            document.getElementById("submit-btn").disabled    = false;
            document.getElementById("submit-btn").textContent = "บันทึกแต้ม";
        }
    }

    function calcTier(exp) {
        if (exp >= 5000) return "Platinum";
        if (exp >= 3000) return "Gold";
        if (exp >= 1000) return "Silver";
        return "Bronze";
    }

    function resetAll() {
        foundMember = null;
        document.getElementById("amount-input").value         = "";
        document.getElementById("preview-points").textContent = "0";
        document.getElementById("cap-warn").textContent       = "";
        document.getElementById("manual-id").value            = "";
        document.getElementById("scan-error").textContent     = "";
        document.getElementById("submit-error").textContent   = "";
        document.getElementById("submit-btn").disabled        = true;
        document.getElementById("submit-btn").textContent     = "บันทึกแต้ม";
        document.getElementById("scan-qr-btn").disabled       = false;
        document.getElementById("scan-qr-btn").textContent    = "📷 สแกน QR Code";
        document.getElementById("step-scan").style.display    = "block";
        document.getElementById("step-amount").style.display  = "none";
        document.getElementById("success-screen").style.display = "none";
        document.getElementById("app").style.display          = "block";
    }

    init();
</script>
</body>
</html>
